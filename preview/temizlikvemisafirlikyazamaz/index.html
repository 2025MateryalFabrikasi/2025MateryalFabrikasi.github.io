<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Avcısı - Büyük Görsel Modu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            /* Genişliği artırdık */
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .instruction {
            font-size: 1.3em;
            color: #555;
            margin-bottom: 30px;
        }

        /* Izgara yapısını büyük görsellere göre ayarladık */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .card {
            border: 5px solid #eee;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #3498db;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* Görselleri büyüten kısım */
        .card img {
            width: 100%;
            height: 250px;
            /* Yüksekliği artırdık */
            object-fit: contain;
            /* Resmin bozulmadan sığmasını sağlar */
            background: #fafafa;
            display: block;
        }

        .audio-btn {
            background-color: #ff9f43;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin-bottom: 30px;
            box-shadow: 0 4px 0 #e67e22;
        }

        .audio-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .success {
            color: #27ae60;
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
            display: none;
        }

        .wrong {
            border-color: #ff6b6b !important;
            animation: shake 0.5s;
        }

        .correct {
            border-color: #2ecc71 !important;
            background-color: #f1fff7;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            50% {
                transform: translateX(10px);
            }

            75% {
                transform: translateX(-10px);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🔊 Kelime Avcısı</h1>
        <p class="instruction">Turuncu butona bas, sesi dinle ve doğru resmi seç!</p>

        <button class="audio-btn" onclick="playCurrentAudio()">TANIMI DİNLE</button>
        <div id="feedback" class="success">Harika! 🌟</div>

        <div class="game-grid" id="gameGrid">
        </div>
    </div>

    <script>
        let currentId = 1;
        const totalItems = 7;
        let audio = new Audio();

        function initGame() {
            const grid = document.getElementById('gameGrid');
            let indices = Array.from({ length: totalItems }, (_, i) => i + 1);
            indices.sort(() => Math.random() - 0.5);

            indices.forEach(i => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="resim${i}.jpg" alt="Resim ${i}">`;
                card.onclick = () => checkAnswer(i, card);
                grid.appendChild(card);
            });
        }

        function playCurrentAudio() {
            if (currentId <= totalItems) {
                audio.src = `ses${currentId}.mp3`;
                audio.play();
            } else {
                alert("Harika! Tüm kelimeleri öğrendin.");
            }
        }

        function checkAnswer(selectedId, cardElement) {
            if (selectedId === currentId) {
                cardElement.classList.add('correct');
                document.getElementById('feedback').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('feedback').style.display = 'none';
                    cardElement.style.opacity = "0.4";
                    cardElement.onclick = null;
                    currentId++;
                    if (currentId > totalItems) {
                        alert("Oyun bitti! Muhteşem bir iş çıkardın.");
                    } else {
                        playCurrentAudio();
                    }
                }, 1200);
            } else {
                cardElement.classList.add('wrong');
                setTimeout(() => cardElement.classList.remove('wrong'), 500);
            }
        }

        window.onload = initGame;
    </script>

</body>

</html>
