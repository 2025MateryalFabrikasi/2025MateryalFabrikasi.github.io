
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ramazan Neşesi</title>
    <style>
        body {
            font-family: "Comic Sans MS", cursive, sans-serif;
            background-color: #ffffff;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* --- YÖNERGE EKRANI --- */
        #intro-screen {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 10px;
            overflow: hidden;
        }

        .falling-deco {
            position: absolute; top: -50px; font-size: 2rem;
            animation: fallDown 7s linear infinite; opacity: 0.6; z-index: -1;
        }
        @keyframes fallDown { to { transform: translateY(110vh) rotate(360deg); } }

        .intro-container {
            max-width: 600px; max-height: 95vh; padding: 25px; 
            border: 8px solid #FF9800; border-radius: 40px; 
            background: rgba(255, 255, 255, 0.9); position: relative;
        }
        .intro-img-main { 
            width: 230px; height: auto; border-radius: 30px; border: 6px solid #FF9800; 
            margin: 10px 0; animation: breathe 3s infinite; 
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        
        #btn-start {
            padding: 15px 60px; font-size: 1.8rem; background: #4CAF50; color: white;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            font-family: "Comic Sans MS", cursive;
            box-shadow: 0 6px 0 #2E7D32;
        }

        /* --- OYUN ALANI --- */
        #game-area { display: none; width: 95%; max-width: 1200px; padding: 20px; }
        .layout { display: flex; gap: 20px; justify-content: center; align-items: flex-start; }

        .img-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; flex: 1; }
        .txt-list { display: flex; flex-direction: column; gap: 10px; flex: 1; max-width: 450px; }

        .card { 
            background: #fff; border: 4px solid #FF9800; border-radius: 18px; 
            cursor: pointer; overflow: hidden;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        
        .img-card { height: 160px; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .img-card.selected { border-color: #4CAF50; transform: scale(1.02); }

        .txt-card { 
            padding: 8px 12px; font-size: 0.95rem; font-weight: bold; text-align: center; 
            min-height: 50px; display: flex; align-items: center; justify-content: center; 
            line-height: 1.2; width: 100%; box-sizing: border-box;
        }
        .txt-card.selected { border-color: #E91E63; background: #FFF0F5; }
        
        .is-matched { display: none !important; }

        /* TOAST MESAJLARI */
        #status-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 30px 60px; background: white; border-radius: 50px; text-align: center;
            display: none; z-index: 10000; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .correct { border: 10px solid #4CAF50; color: #4CAF50; font-size: 3rem; }
        .wrong { border: 10px solid #F44336; color: #F44336; font-size: 2.5rem; }

        /* BİTİŞ VE KONFETİ */
        #win-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 10005;
        }
        .win-card { 
            background: white; padding: 50px; border-radius: 40px; text-align: center; 
            border: 12px solid #FF9800; max-width: 650px; position: relative; z-index: 10010;
        }

        .confetti {
            position: absolute; width: 10px; height: 10px;
            z-index: 10008; animation: confettiFall 3s linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div id="deco-layer"></div>
        <div class="intro-container">
            <h1 style="color:#FF9800; font-size: 2.5rem; margin: 0;">Ramazan Neşesi</h1>
            <img src="12.jpg" alt="Ramazan" class="intro-img-main">
            <p style="font-size: 1.2rem; color: #444; font-weight: bold;">
                Görselleri doğru açıklamalarla eşleştirin.<br>
                Mani bitince oyun başlayacak!
            </p>
            <button id="btn-start">BAŞLA! 🚀</button>
        </div>
        <audio id="bg-audio" src="1.mp3"></audio>
    </div>

    <div id="game-area">
        <div style="font-size: 1.8rem; margin-bottom: 15px; font-weight: bold;">Puan: <span id="score" style="color:#4CAF50;">0</span></div>
        <div class="layout">
            <div id="img-container" class="img-grid"></div>
            <div id="txt-container" class="txt-list"></div>
        </div>
    </div>

    <div id="status-toast"></div>

    <div id="win-modal">
        <div class="win-card">
            <h1 style="color: #4CAF50; font-size: 3rem; margin: 0;">Tebrik ederim!</h1>
            <p style="font-size: 1.8rem; color: #333; margin: 20px 0;">Daha nice Ramazanlara kavuşmak ümidiyle...</p>
            <button onclick="location.reload()" style="padding:15px 45px; background:#FF9800; color:white; border:none; border-radius:30px; cursor:pointer; font-size: 1.2rem; font-family: 'Comic Sans MS';">Yeniden Oyna 🔄</button>
        </div>
    </div>

    <script>
        const icons = ['🌙', '🏮', '🕌', '⭐', '✨'];
        const decoLayer = document.getElementById('deco-layer');
        for(let i=0; i<15; i++) {
            let item = document.createElement('div');
            item.className = 'falling-deco';
            item.innerText = icons[Math.floor(Math.random()*icons.length)];
            item.style.left = Math.random() * 100 + "vw";
            item.style.animationDelay = Math.random() * 5 + "s";
            decoLayer.appendChild(item);
        }

        const data = [
            { id: 1, t: "Ramazan ayı boyunca, yatsı namazından sonra kılınan namaza verilen isimdir." },
            { id: 2, t: "İftar vaktinde orucu açmak için yenen kahverengi, tatlı bir meyvedir." },
            { id: 3, t: "Ramazan davulcuları tarafından insanları sahura kaldırmak için söylenen kısa şiirlerdir." },
            { id: 4, t: "Ramazan ayında her gün Kur’an’ı karşılıklı okuyup dinleyerek hatim indirmek demektir." },
            { id: 5, t: "Oruca hazırlanmak için imsak vakti girmeden önce yenilen yemektir. Sabah ezanının okunmasıyla imsak vakti başlar." },
            { id: 6, t: "Ramazan ayının sevincini halka duyurmak amacıyla camilerin iki minaresi arasına, ışıklandırılarak asılan yazıdır." },
            { id: 7, t: "Ramazan ayında özel olarak yaptırılan üstü susamlı bir ekmek çeşidi." },
            { id: 8, t: "Türk kültüründe önemli bir gölge oyunu olarak bilinir. Özellikle Ramazan ayında halkın eğlence ihtiyacını karşılamak, insanları güldürmek ve eğitmek için oynanan bir oyundur." },
            { id: 9, t: "Ramazan ayının sonunda, belli bir mala sahip her Müslümanın vermesi vacip olan sadakadır." },
            { id: 10, t: "Akşam ezanının okunmasıyla birlikte oruç açma vaktidir." },
            { id: 11, t: "İslam’ın beş şartından biridir. Sahurdan iftar vaktine kadar bir şey yemeyip içmeyerek yapılan bir ibadettir." }
        ];

        let selR = null, selT = null, score = 0, matches = 0;
        const audio = document.getElementById('bg-audio');

        document.getElementById('btn-start').onclick = function() {
            this.innerText = "Mani Dinleniyor...";
            this.disabled = true;
            audio.currentTime = 50;
            audio.play().catch(() => startGame());

            audio.ontimeupdate = function() {
                if (audio.currentTime >= 72) {
                    audio.pause();
                    startGame();
                }
            };
        };

        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            init();
        }

        function init() {
            const rDiv = document.getElementById('img-container');
            const tDiv = document.getElementById('txt-container');
            rDiv.innerHTML = ""; tDiv.innerHTML = "";
            const shR = [...data].sort(() => Math.random() - 0.5);
            const shT = [...data].sort(() => Math.random() - 0.5);
            shR.forEach(item => {
                const c = document.createElement('div');
                c.className = 'card img-card';
                c.innerHTML = `<img src="${item.id}.jpg">`;
                c.onclick = () => { if(selR) selR.classList.remove('selected'); selR = c; c.classList.add('selected'); check(); };
                c.matchId = item.id; rDiv.appendChild(c);
            });
            shT.forEach(item => {
                const c = document.createElement('div');
                c.className = 'card txt-card';
                c.innerText = item.t;
                c.onclick = () => { if(selT) selT.classList.remove('selected'); selT = c; c.classList.add('selected'); check(); };
                c.matchId = item.id; tDiv.appendChild(c);
            });
        }

        function check() {
            if(selR && selT) {
                if(selR.matchId === selT.matchId) {
                    score += 10; matches++;
                    showFeedback("Harikasın! ✨", "correct");
                    const r = selR, t = selT;
                    setTimeout(() => { r.classList.add('is-matched'); t.classList.add('is-matched'); }, 500);
                    if(matches === data.length) endOfGame();
                } else {
                    showFeedback("Tekrar Dene ✖ ☹️", "wrong");
                    selR.classList.remove('selected'); selT.classList.remove('selected');
                }
                document.getElementById('score').innerText = score;
                selR = null; selT = null;
            }
        }

        function showFeedback(msg, className) {
            const toast = document.getElementById('status-toast');
            toast.innerHTML = msg; toast.className = className;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1000);
        }

        // Konfeti parçası üretme
        function createSingleConfetti() {
            const colors = ['#FF9800', '#4CAF50', '#E91E63', '#2196F3', '#FFEB3B', '#9C27B0'];
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            c.style.width = Math.random() * 8 + 5 + 'px';
            c.style.height = c.style.width;
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }

        function endOfGame() {
            setTimeout(() => {
                audio.ontimeupdate = null;
                audio.currentTime = 0;
                audio.play();

                // Konfeti Yağmuru Başlat (Müzik süresince)
                const confettiInterval = setInterval(createSingleConfetti, 50);

                const checkEnd = setInterval(() => {
                    if (audio.currentTime >= 13) {
                        audio.pause();
                        clearInterval(confettiInterval); // Konfeti üretimini durdur
                        clearInterval(checkEnd);
                    }
                }, 100);
                
                document.getElementById('win-modal').style.display = 'flex';
            }, 1200);
        }
    </script>
</body>
</html>
