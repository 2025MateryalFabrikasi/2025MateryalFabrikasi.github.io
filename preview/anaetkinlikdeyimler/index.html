
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karagöz ve Hacivat Soru Cevap Oyunu</title>
    <style>
        :root {
            --wood-color: #5d4037;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 90%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border: 12px solid var(--wood-color);
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        #intro-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            text-align: center;
            background-image: url('1.jpg');
            background-size: cover;
            background-position: center;
            color: #fff;
            position: relative;
        }

        .intro-content {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 20px;
            max-width: 60%;
            border: 2px dashed #e67e22;
            backdrop-filter: blur(5px);
        }

        h1 { color: #f1c40f; margin-top: 0; text-shadow: 2px 2px 4px #000; }
        p { line-height: 1.6; font-size: 1.2em; margin-bottom: 20px; }

        .btn {
            background-color: #e67e22;
            color: white;
            border: 2px solid #fff;
            padding: 12px 35px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 0 #bf691d;
        }

        .btn:hover { background-color: #d35400; transform: scale(1.05); }

        #video-wrapper {
            display: none;
            position: relative;
            background-color: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        #question-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .question-box {
            background-color: #fffbe6;
            border: 5px solid #e67e22;
            border-radius: 20px;
            padding: 30px;
            max-width: 80%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .question-text {
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            font-size: 16px; 
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="intro-screen">
        <div class="intro-content">
            <h1>Hoş Geldiniz! 🎭</h1>
            <p>Haydi bakalım, Karagöz ve Hacivat'ın neşeli dünyasında bir yolculuğa çıkıyoruz!<br><br>
            Video ilerlerken karşına bazı sorular gelecek. Bu soruları dikkatlice düşün ve cevaplamaya hazır ol.</p>
            <button class="btn" onclick="startGame()">Oyunu Başlat</button>
        </div>
    </div>

    <div id="video-wrapper">
        <video id="myVideo" controls>
            <source src="1.mp4" type="video/mp4">
        </video>

        <div id="question-overlay">
            <div class="question-box">
                <div class="question-text" id="q-text">Soru Yükleniyor...</div>
                <button class="btn" onclick="continueVideo()">Düşündüm, Devam Et!</button>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('myVideo');
    const introScreen = document.getElementById('intro-screen');
    const videoWrapper = document.getElementById('video-wrapper');
    const questionOverlay = document.getElementById('question-overlay');
    const qText = document.getElementById('q-text');

    const startTime = 12;

    const questions = [
        { time: 80, text: "Hacivat 'Uyku tutmadı.' sözüyle ne anlatmak istemiştir?" }, // 1.20
        { time: 106, text: "Karagöz 'Uykum kaçtı.' sözüyle ne anlatmak istemiştir?" }, // 1.46
        { time: 126, text: "'İki lafın belini kırmak' sence ne olabilir?" },             // 2.06 (Güncellendi)
        { time: 241, text: "Karagöz hangi deyimleri öğrendi?" }                        // 4.01
    ];

    let currentQuestionIndex = 0;
    video.currentTime = startTime;

    function startGame() {
        introScreen.style.display = 'none';
        videoWrapper.style.display = 'block';
        video.play();
    }

    video.ontimeupdate = function() {
        if (currentQuestionIndex < questions.length) {
            // Zaman kontrolünü biraz daha esnek hale getirdik (>= time)
            if (video.currentTime >= questions[currentQuestionIndex].time) {
                // Sorunun tetiklendiğinden emin olmak için küçük bir kontrol
                pauseAndAsk();
            }
        }
    };

    function pauseAndAsk() {
        video.pause();
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
        qText.innerText = questions[currentQuestionIndex].text;
        questionOverlay.style.display = 'flex';
    }

    function continueVideo() {
        questionOverlay.style.display = 'none';
        currentQuestionIndex++;
        // Video devam etmeden önce, tetiklenen saniyenin biraz önüne geçiyoruz ki aynı soru tekrar açılmasın
        video.currentTime += 0.5; 
        video.play();
    }
</script>

</body>
</html>
