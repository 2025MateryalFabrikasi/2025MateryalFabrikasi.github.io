<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ramazan Sesini Bul</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fffdf5; text-align: center; padding: 20px; }
        #big-image { width: 500px; height: 350px; border: 8px solid #d35400; border-radius: 20px; margin-bottom: 20px; object-fit: cover; }
        .control-panel { display: flex; justify-content: center; gap: 20px; margin: 20px; }
        .btn { padding: 20px 30px; font-size: 18px; cursor: pointer; border-radius: 12px; border: none; background: #e67e22; color: white; transition: 0.3s; }
        .select-btn { background: #27ae60; font-weight: bold; }
        #next-btn { margin-top: 30px; padding: 20px 40px; font-size: 20px; background: #2980b9; color: white; display: none; }
    </style>
</head>
<body>

    <img id="big-image" src="" alt="Görsel">
    <p style="font-size: 1.4em;">Sesleri dinle ve görselle eşleşeni seç!</p>
    
    <div class="control-panel">
        <button class="btn" onclick="playAudio(0)">🔊 1. Sesi Dinle</button>
        <button class="btn" onclick="playAudio(1)">🔊 2. Sesi Dinle</button>
    </div>

    <div class="control-panel">
        <button class="btn select-btn" onclick="checkAnswer(0)">1. Ses Doğru</button>
        <button class="btn select-btn" onclick="checkAnswer(1)">2. Ses Doğru</button>
    </div>

    <button id="next-btn" onclick="nextQuestion()">Sıradaki Görsel</button>

    <audio id="successSound" src="https://actions.google.com/sounds/v1/ui/positive_generate.ogg"></audio>
    <audio id="errorSound" src="https://actions.google.com/sounds/v1/ui/alarm_clock.ogg"></audio>

    <script>
        let index = 0;
        let correctSlot = 0; // 0 veya 1
        let audioFiles = ["", ""]; // İki slotun ses dosyaları

        function initLevel() {
            document.getElementById('big-image').src = `${index + 1}.jpg`;
            document.getElementById('next-btn').style.display = 'none';
            
            // Doğru slotu rastgele seç (0 veya 1)
            correctSlot = Math.random() < 0.5 ? 0 : 1;
            
            // Doğru sesi ata
            audioFiles[correctSlot] = `${index + 1}.mp3`;
            
            // Yanlış sesi ata (başka bir rastgele ses dosyasından al)
            let wrongIndex = Math.floor(Math.random() * 11) + 1;
            while(wrongIndex === (index + 1)) {
                wrongIndex = Math.floor(Math.random() * 11) + 1;
            }
            audioFiles[1 - correctSlot] = `${wrongIndex}.mp3`;
        }

        function playAudio(slot) {
            new Audio(audioFiles[slot]).play();
        }

        function checkAnswer(chosenSlot) {
            if (chosenSlot === correctSlot) {
                document.getElementById('successSound').play();
                alert("Tebrikler! Doğru sesi buldun.");
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                document.getElementById('errorSound').play();
                alert("Üzgünüm, tekrar dinleyip dene!");
            }
        }

        function nextQuestion() {
            index++;
            if(index < 11) {
                initLevel();
            } else {
                alert("Tüm görselleri bitirdin!");
            }
        }

        initLevel();
    </script>
</body>
</html>
