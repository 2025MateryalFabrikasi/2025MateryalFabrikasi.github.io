<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geleneksel Türk Sporları Yarışması</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 450px;
            text-align: center;
            border-top: 8px solid #c0392b;
        }

        .hidden {
            display: none;
        }

        img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 3px solid #eee;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1em;
            color: #2c3e50;
        }

        .option-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9f9f9;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .listen-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            flex: 1;
            margin-right: 10px;
        }

        .select-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            flex: 1;
        }

        .listen-btn:hover {
            background: #2980b9;
        }

        .select-btn:hover {
            background: #219150;
        }

        .start-btn {
            background: #c0392b;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
        }

        h2 {
            color: #c0392b;
            margin-top: 0;
        }

        ul {
            text-align: left;
            padding-left: 20px;
            color: #444;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div id="start-screen">
            <h2>Nasıl Oynanır?</h2>
            <ul>
                <li>Geleneksel Türk sporları görsellerini incele.</li>
                <li>Mavi butonlara (🔊) basarak sesleri <b>dinle</b>.</li>
                <li>Hangi sesin görsele ait olduğunu bulunca yeşil butonla <b>seç</b>.</li>
                <li>Her doğru 20 puan kazandırır, yanlış ise 1 can götürür.</li>
            </ul>
            <button class="start-btn" onclick="startGame()">OYUNA BAŞLA</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="stats">
                <span>⭐ Puan: <span id="score">0</span></span>
                <span>❤️ Can: <span id="lives">3</span></span>
            </div>
            <img id="question-image" src="" alt="Spor Görseli">
            <div id="options-container">
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h2 id="result-title">Oyun Bitti!</h2>
            <p id="final-stats" style="font-size: 1.2em;"></p>
            <button class="start-btn" onclick="location.reload()">TEKRAR OYNA</button>
        </div>
    </div>

    <script>
        const questions = [
            { image: "1.jpg", correct: "1.mp3", options: ["1.mp3", "2.mp3"] },
            { image: "2.jpg", correct: "2.mp3", options: ["2.mp3", "3.mp3"] },
            { image: "3.jpg", correct: "3.mp3", options: ["3.mp3", "4.mp3"] },
            { image: "4.jpg", correct: "4.mp3", options: ["4.mp3", "5.mp3"] },
            { image: "5.jpg", correct: "5.mp3", options: ["5.mp3", "1.mp3"] }
        ];

        let currentIdx = 0;
        let score = 0;
        let lives = 3;
        let audioPlayer = new Audio();

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            if (currentIdx >= questions.length || lives <= 0) {
                endGame();
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('question-image').src = q.image;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            // Şıkları karıştır
            const shuffled = [...q.options].sort(() => Math.random() - 0.5);

            shuffled.forEach((audioFile, i) => {
                const row = document.createElement('div');
                row.className = 'option-row';

                row.innerHTML = `
                <button class="listen-btn" onclick="playPreview('${audioFile}')">Dinle 🔊</button>
                <button class="select-btn" onclick="checkAnswer('${audioFile}')">Bu Şıkkı Seç</button>
            `;
                container.appendChild(row);
            });
        }

        function playPreview(file) {
            audioPlayer.pause();
            audioPlayer = new Audio(file);
            audioPlayer.play();
        }

        function checkAnswer(selected) {
            audioPlayer.pause(); // Bir sonraki soruya geçmeden sesi durdur
            const correct = questions[currentIdx].correct;

            if (selected === correct) {
                alert("✅ Doğru! Kültürümüzü iyi tanıyorsun.");
                score += 20;
            } else {
                alert("❌ Yanlış cevap! Canın azaldı.");
                lives--;
            }

            currentIdx++;
            updateUI();
            loadQuestion();
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
        }

        function endGame() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const title = lives <= 0 ? "Canların Bitti!" : "Tebrikler, Tamamladın!";
            document.getElementById('result-title').innerText = title;
            document.getElementById('final-stats').innerText = `Puan: ${score} | Kalan Can: ${lives}`;
        }
    </script>

</body>

</html>
