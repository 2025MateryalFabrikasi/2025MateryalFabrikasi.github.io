<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyvah - İnteraktif Video</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* Ana Kapsayıcı - Her şey bunun içinde tam ekran olacak */
        #video-stage {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        video { width: 100%; display: block; }

        /* Soru ve Yönerge Katmanı - Daima videonun üstünde */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; z-index: 100;
            padding: 40px; box-sizing: border-box;
        }

        #overlay h2 { color: #d35400; font-size: 2rem; margin-bottom: 20px; }
        #overlay p { color: #2c3e50; font-size: 1.5rem; line-height: 1.6; max-width: 80%; margin-bottom: 30px; }

        button#actionBtn {
            padding: 15px 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            background-color: #27ae60; color: white; border: none; border-radius: 50px;
            transition: all 0.3s; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }
        button#actionBtn:hover { background-color: #2ecc71; transform: translateY(-2px); }

        /* Tam Ekran Kontrol Butonu */
        #fsToggle {
            position: absolute; bottom: 15px; right: 15px; z-index: 50;
            background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid #fff;
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9rem;
        }

        .hidden { display: none !important; }

        /* Tam ekran yapıldığında kapsayıcıyı tüm ekranı kaplat */
        :-webkit-full-screen #video-stage { width: 100%; max-width: 100%; }
    </style>
</head>
<body>

<div id="video-stage">
    <video id="myVideo" controls controlslist="nofullscreen">
        <source src="eyvah.mp4" type="video/mp4">
        Tarayıcınız bu videoyu desteklemiyor.
    </video>

    <button id="fsToggle">Tam Ekran / Küçük Ekran</button>

    <div id="overlay">
        <h2 id="title">Yönerge</h2>
        <p id="message">Şarkıyı dikkatle dinleyiniz. Belirlenen duraklama noktalarında size sorulacak soruları cevaplayınız.</p>
        <button id="actionBtn">Tamam, Başla</button>
    </div>
</div>

<script>
    const stage = document.getElementById('video-stage');
    const video = document.getElementById('myVideo');
    const overlay = document.getElementById('overlay');
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const actionBtn = document.getElementById('actionBtn');
    const fsToggle = document.getElementById('fsToggle');

    const questions = [
        { time: 52, text: "Sizce bu şarkıda ne olmuş olabilir? Neden 'eyvah' deniyor?" },
        { time: 86, text: "Şarkıda da belirtildiği üzere temiz olmak için neler yapmalıyız?" },
        { time: 206, text: "Peki, senin temizlik alışkanlıkların neler?" }
    ];

    let currentStep = 0;

    // Tam ekran yönetimi
    fsToggle.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            if (stage.requestFullscreen) stage.requestFullscreen();
            else if (stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
            else if (stage.msRequestFullscreen) stage.msRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    });

    // Başlat/Devam Et butonu
    actionBtn.addEventListener('click', () => {
        overlay.classList.add('hidden');
        video.play();
    });

    // Video saniye kontrolü
    video.addEventListener('timeupdate', () => {
        if (currentStep < questions.length) {
            const nextQ = questions[currentStep];
            if (video.currentTime >= nextQ.time) {
                video.pause();
                showQuestion(nextQ.text);
                currentStep++;
            }
        }
    });

    function showQuestion(text) {
        title.innerText = "Soru";
        message.innerText = text;
        actionBtn.innerText = "Devam Et";
        overlay.classList.remove('hidden');
    }
</script>

</body>
</html>
