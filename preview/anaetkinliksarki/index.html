
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Soru Oyunu</title>
    <style>
        /* Arka plan görseli ekrana tam sığdırıldı */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: "Comic Sans MS", cursive;
            background: url('1.jpg') no-repeat center center;
            background-size: 100% 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Video ve içerik alanı */
        #game-board {
            width: 640px; 
            background-color: rgba(255, 255, 255, 0.9);
            border: 4px solid #FF9800;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        #guide-screen p {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        /* Video alanı düzenlemesi */
        #video-container {
            display: none;
            position: relative;
            width: 100%;
        }

        video {
            width: 100%; 
            border-radius: 10px;
        }

        /* Soru ve Tebrik Kutusu */
        #question-box, #finish-card {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            background: white;
            border: 3px solid #4CAF50;
            border-radius: 15px;
            padding: 20px;
            z-index: 100;
        }

        /* Tebrik Kartı Özel Rengi */
        #finish-card {
            border-color: #E91E63;
        }

        /* Soru ve Tebrik Metni: 12 Punto ve Siyah */
        #current-question-text, #finish-card h2 {
            font-size: 12pt;
            color: #000000;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .game-btn {
            background-color: #FFEB3B;
            border: 2px solid #FBC02D;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-family: "Comic Sans MS", cursive;
        }

        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 50;
        }
    </style>
</head>
<body>

<div id="game-board">
    
    <div id="guide-screen">
        <p>Merhaba! Videoyu izlerken soruları cevaplamaya hazır mısın?</p>
        <button class="game-btn" onclick="startGame()">BAŞLA</button>
    </div>

    <div id="video-container">
        <div id="overlay"></div>
        <video id="gameVideo" controls>
            <source src="1.mp4" type="video/mp4">
        </video>

        <div id="question-box">
            <div id="current-question-text"></div>
            <button class="game-btn" onclick="continueVideo()">Devam Et</button>
        </div>

        <div id="finish-card">
            <h2>Tebrikler! 🎉</h2>
            <p style="font-size: 12pt; color: #000;">Tüm soruları başarıyla düşündün ve videoyu tamamladın. Harikasın!</p>
            <button class="game-btn" onclick="location.reload()">Yeniden Oyna ✨</button>
        </div>
    </div>

</div>

<script>
    const video = document.getElementById('gameVideo');
    const guideScreen = document.getElementById('guide-screen');
    const videoContainer = document.getElementById('video-container');
    const questionBox = document.getElementById('question-box');
    const finishCard = document.getElementById('finish-card');
    const questionText = document.getElementById('current-question-text');
    const overlay = document.getElementById('overlay');

    const questionData = [
        { time: 78, text: "\"Ayrılık geldi başa, katlanmak gerek.\" sözünden ne anlıyorsun?" },
        { time: 107, text: "“Sarıkız” sence hangi hayvandır?" },
        { time: 160, text: "Şarkının ana duygusu nedir?" }
    ];

    let questionIndex = 0;

    function startGame() {
        guideScreen.style.display = 'none';
        videoContainer.style.display = 'block';
        video.play();
    }

    video.ontimeupdate = function() {
        if (questionIndex < questionData.length) {
            if (video.currentTime >= questionData[questionIndex].time) {
                video.pause();
                if (document.fullscreenElement) document.exitFullscreen();
                questionText.innerText = questionData[questionIndex].text;
                questionBox.style.display = 'block';
                overlay.style.display = 'block';
            }
        }
    };

    // Video tamamen bittiğinde çalışır
    video.onended = function() {
        if (document.fullscreenElement) document.exitFullscreen();
        overlay.style.display = 'block';
        finishCard.style.display = 'block';
    };

    function continueVideo() {
        questionBox.style.display = 'none';
        overlay.style.display = 'none';
        questionIndex++;
        video.play();
    }
</script>

</body>
</html>
