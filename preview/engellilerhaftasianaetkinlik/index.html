<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engelliler Haftası İnteraktif Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            background-color: #1a202c; 
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }

        .emoji-float {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: float linear infinite;
            opacity: 0.7;
            filter: drop-shadow(0 0 5px rgba(255, 223, 0, 0.5));
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        #video-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            background: black;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        #question-overlay, #completion-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 50;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.5s ease;
        }

        .custom-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(1);
        }

        .custom-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .congrats-card {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8">

    <div id="emoji-layer"></div>

    <div class="relative z-10 w-full px-4 max-w-6xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-6xl font-extrabold text-white drop-shadow-lg mb-3 tracking-tight">Engelliler Haftası</h1>
            <p class="text-yellow-300 text-xl font-semibold italic">“Sevgi varsa engel yoktur”</p>
        </header>

        <main id="video-container" class="border-4 border-white/20">
            <video id="mainVideo" playsinline>
                <source src="1.mp4" type="video/mp4">
                Tarayıcınız video etiketini desteklemiyor.
            </video>

            <div id="question-overlay">
                <div class="glass-effect p-8 max-w-lg w-full text-white text-center shadow-2xl border border-blue-400/50">
                    <h3 class="text-2xl font-bold mb-4 text-blue-300 flex items-center justify-center gap-2">
                        <span>🧠</span> Düşünelim Bakalım
                    </h3>
                    <p id="question-text" class="text-xl mb-6 leading-relaxed font-medium"></p>
                    <textarea id="answer-input" rows="3" class="w-full p-4 rounded-xl bg-white/10 border border-white/30 text-white placeholder-white/40 focus:ring-2 focus:ring-blue-400 outline-none mb-4 transition-all" placeholder="Cevabını buraya paylaş..."></textarea>
                    <button onclick="submitAnswer()" class="custom-button w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-full text-lg shadow-lg">
                        Devam Et ➔
                    </button>
                </div>
            </div>

            <div id="completion-overlay">
                <div class="glass-effect congrats-card p-10 max-w-md w-full text-white text-center shadow-2xl border-2 border-yellow-400/50">
                    <div class="text-6xl mb-4">🏆</div>
                    <h3 class="text-4xl font-extrabold mb-4 text-yellow-400">Tebrikler!</h3>
                    <p class="text-xl mb-8 leading-relaxed">Tüm soruları cevapladın ve videoyu başarıyla tamamladın.</p>
                    <button onclick="location.reload()" class="custom-button bg-yellow-500 hover:bg-yellow-600 text-black font-extrabold py-4 px-10 rounded-full text-lg uppercase tracking-wider">
                        Tekrar Başlat
                    </button>
                </div>
            </div>

            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-6 opacity-80 hover:opacity-100 transition-opacity">
                <!-- Geri Sar -->
                <button onclick="skip(-10)" class="bg-white/10 backdrop-blur-md p-3 rounded-full border border-white/20 hover:bg-white/30 text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.334 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"></path></svg>
                </button>

                <!-- Oynat / Durdur -->
                <button id="playPauseBtn" onclick="togglePlay()" class="bg-white/20 backdrop-blur-xl p-5 rounded-full border border-white/30 hover:bg-white/40 text-white transition-all shadow-xl">
                    <svg id="playIcon" class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
                    <svg id="pauseIcon" class="w-10 h-10 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z"/></svg>
                </button>

                <!-- İleri Sar -->
                <button onclick="skip(10)" class="bg-white/10 backdrop-blur-md p-3 rounded-full border border-white/20 hover:bg-white/30 text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z"></path></svg>
                </button>
            </div>
        </main>

        <section class="mt-12 glass-effect p-8 text-white w-full border border-white/10 shadow-xl">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                <span class="bg-blue-500/30 p-2 rounded-lg">📝</span> Cevap Günlüğüm
            </h2>
            <div id="answers-log" class="space-y-4 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                <p class="text-white/50 italic text-center py-4">Henüz bir cevap verilmedi. Video ilerledikçe senin düşüncelerin burada toplanacak.</p>
            </div>
        </section>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const overlay = document.getElementById('question-overlay');
        const completionOverlay = document.getElementById('completion-overlay');
        const questionText = document.getElementById('question-text');
        const answerInput = document.getElementById('answer-input');
        const answersLog = document.getElementById('answers-log');

        const checkpoints = [
            { time: 20, text: "“Hayatı paylaşmak için engel yok.” sözünden ne anlıyorsunuz?", asked: false },
            { time: 29, text: "“Hayatın her alanında başaranlar engelleri aşanlardır.” Bu sözden çıkarılabilecek dersler nelerdir?", asked: false },
            { time: 56, text: "Engelliler Haftası 10–16 Mayıs tarihleri arasında kutlanır. Engelliler Haftası’nın amacı nedir?", asked: false }
        ];

        let currentCheckpoint = null;

        // Arka plandaki uçuşan yıldızlar
        function createStars() {
            const stars = ['⭐', '✨', '🌟', '💫'];
            const container = document.getElementById('emoji-layer');
            const starCount = 40; 

            for (let i = 0; i < starCount; i++) {
                const el = document.createElement('div');
                el.className = 'emoji-float';
                el.innerText = stars[Math.floor(Math.random() * stars.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.fontSize = (Math.random() * 15 + 15) + 'px';
                el.style.animationDuration = (Math.random() * 8 + 6) + 's';
                el.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(el);
            }
        }

        // Video oynatma/durdurma
        function togglePlay() {
            if (video.paused) {
                video.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                video.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        // Atlatma özelliği
        function skip(seconds) {
            video.currentTime += seconds;
        }

        // Video zaman takibi
        video.addEventListener('timeupdate', () => {
            const currentTime = video.currentTime;
            
            checkpoints.forEach((cp) => {
                if (!cp.asked && currentTime >= cp.time && currentTime < cp.time + 0.5) {
                    video.pause();
                    currentCheckpoint = cp;
                    showQuestion(cp.text);
                    cp.asked = true;
                    playIcon.classList.remove('hidden');
                    pauseIcon.classList.add('hidden');
                }
            });
        });

        // Video bittiğinde tebrik mesajı
        video.addEventListener('ended', () => {
            completionOverlay.style.display = 'flex';
        });

        function showQuestion(text) {
            questionText.innerText = text;
            overlay.style.display = 'flex';
            answerInput.value = "";
            answerInput.focus();
        }

        function submitAnswer() {
            const answer = answerInput.value.trim();
            if (answer === "") {
                answerInput.classList.add('ring-2', 'ring-red-500');
                setTimeout(() => answerInput.classList.remove('ring-2', 'ring-red-500'), 1500);
                return;
            }

            // Log kısmını güncelle
            if (answersLog.querySelector('p.italic')) {
                answersLog.innerHTML = "";
            }

            const logItem = document.createElement('div');
            logItem.className = 'bg-white/10 p-5 rounded-2xl border-l-4 border-yellow-400 mb-4 shadow-md transition-all hover:bg-white/20';
            logItem.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <p class="text-blue-300 text-xs font-bold uppercase tracking-widest">Soru Zamanı: ${currentCheckpoint.time}sn</p>
                    <span class="text-yellow-400 text-xs">✔ Tamamlandı</span>
                </div>
                <p class="text-white font-semibold italic mb-3">"${currentCheckpoint.text}"</p>
                <div class="bg-black/20 p-3 rounded-lg">
                    <p class="text-gray-200"><span class="text-blue-400 font-bold">Cevabın:</span> ${answer}</p>
                </div>
            `;
            answersLog.prepend(logItem);

            overlay.style.display = 'none';
            video.play();
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
        }

        window.onload = createStars;
    </script>
</body>
</html>
