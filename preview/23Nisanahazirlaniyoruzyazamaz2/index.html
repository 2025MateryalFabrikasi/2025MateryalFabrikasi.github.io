<!doctype html>
<html lang="tr" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>23 Nisan Etkinliği</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&amp;family=Nunito:wght@400;600;700&amp;display=swap"
    rel="stylesheet">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: fall linear forwards;
      opacity: 0.9;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(600px) rotate(720deg);
        opacity: 0;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(229, 57, 53, 0.3);
      }

      50% {
        box-shadow: 0 0 40px rgba(229, 57, 53, 0.6);
      }
    }

    .float-anim {
      animation: float 3s ease-in-out infinite;
    }

    .btn-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .fullscreen-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fullscreen-video audio {
      width: 90%;
      max-width: 600px;
    }

    .exit-fs-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10000;
    }
  </style>
  <style>
    body {
      box-sizing: border-box;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full overflow-auto" style="font-family: 'Nunito', sans-serif;"><!-- YÖNERGE EKRANI -->
  <div id="screen-instruction" class="h-full w-full flex flex-col items-center justify-center relative overflow-hidden"
    style="background: linear-gradient(135deg, #e53935 0%, #b71c1c 50%, #d32f2f 100%);">
    <div id="confetti-container" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
    <div class="relative z-10 flex flex-col items-center px-6 text-center max-w-2xl">
      <div class="text-6xl mb-4 float-anim">
        🇹🇷
      </div>
      <h1 id="el-title" class="text-3xl md:text-4xl font-extrabold text-white mb-6 drop-shadow-lg"
        style="font-family: 'Baloo 2', cursive;">23 Nisan Ulusal Egemenlik ve Çocuk Bayramı</h1>
      <div class="bg-white/15 backdrop-blur-md rounded-2xl p-6 md:p-8 border border-white/20 mb-8 shadow-xl">
        <div class="flex items-center gap-2 mb-4"><i data-lucide="info" class="text-yellow-300"
            style="width:24px;height:24px;"></i> <span class="text-yellow-300 font-bold text-lg"
            style="font-family:'Baloo 2',cursive;">Yönerge</span>
        </div>
        <p id="el-instruction" class="text-white text-base md:text-lg leading-relaxed">Şimdi iki arkadaşınız sizlere
          önemli bir mesaj iletecek. Lütfen onları <strong>çok dikkatli</strong> dinleyin. Dinledikten sonra size bir
          soru sorulacak. Hazır olduğunuzda aşağıdaki butona basın.</p>
      </div><button id="btn-start"
        class="btn-glow bg-white text-red-700 font-bold text-lg px-10 py-4 rounded-full shadow-lg hover:scale-105 transition-transform active:scale-95 flex items-center gap-3"
        style="font-family:'Baloo 2',cursive;"> <i data-lucide="play-circle" style="width:28px;height:28px;"></i> Tamam,
        Hazırım! </button>
      <div class="flex gap-3 mt-8 text-4xl"><span class="float-anim" style="animation-delay:0.2s">🎈</span> <span
          class="float-anim" style="animation-delay:0.6s">🎉</span> <span class="float-anim"
          style="animation-delay:1s">🌟</span> <span class="float-anim" style="animation-delay:1.4s">🎊</span>
      </div>
    </div>
  </div><!-- SES EKRANI -->
  <div id="screen-audio" class="h-full w-full hidden flex-col items-center justify-center relative"
    style="background: linear-gradient(160deg, #1a237e 0%, #283593 40%, #3949ab 100%);">
    <div class="relative z-10 flex flex-col items-center px-6 text-center max-w-2xl w-full">
      <div class="text-5xl mb-4 float-anim">
        🎬
      </div>
      <h2 class="text-2xl md:text-3xl font-extrabold text-white mb-2" style="font-family:'Baloo 2',cursive;">Video
        Zamanı!</h2>
      <p class="text-blue-200 mb-8 text-base">Arkadaşlarınızı dikkatle izleyin</p>
      <div
        class="bg-white/10 backdrop-blur-md rounded-2xl p-6 md:p-8 border border-white/20 w-full max-w-lg shadow-xl mb-6">
        <video id="main-video" controls class="w-full rounded-lg" style="max-height: 400px;">
          <source src="1.mp4" type="video/mp4"> Tarayıcınız video dosyasını desteklemiyor.
        </video>
      </div>
      <div class="flex gap-3"><button id="btn-fullscreen"
          class="bg-white/20 hover:bg-white/30 text-white font-semibold px-6 py-3 rounded-full transition flex items-center gap-2 border border-white/30">
          <i data-lucide="maximize" style="width:20px;height:20px;"></i> Tam Ekran </button>
      </div>
    </div>
  </div><!-- TAM EKRAN OVERLAY -->
  <div id="fullscreen-overlay" class="fullscreen-video hidden">
    <video id="fs-video" controls class="w-full h-full" style="object-fit: contain;">
      <source src="1.mp4" type="video/mp4">
    </video><button id="btn-exit-fs"
      class="exit-fs-btn bg-white/20 hover:bg-white/40 text-white p-3 rounded-full border border-white/30 transition">
      <i data-lucide="minimize" style="width:24px;height:24px;"></i> </button>
  </div><!-- SORU EKRANI -->
  <div id="screen-question" class="h-full w-full hidden flex-col items-center justify-center relative"
    style="background: linear-gradient(160deg, #1b5e20 0%, #2e7d32 40%, #43a047 100%);">
    <div class="relative z-10 flex flex-col items-center px-6 text-center max-w-2xl">
      <div class="text-5xl mb-4 float-anim">
      </div>
    </div>
    <script>
      const defaultConfig = {
        main_title: "23 Nisan Ulusal Egemenlik ve Çocuk Bayramı",
        instruction_text: "Şimdi iki arkadaşınız sizlere önemli bir mesaj iletecek. Lütfen onları çok dikkatli dinleyin. Dinledikten sonra size bir soru sorulacak. Hazır olduğunuzda aşağıdaki butona basın.",
        question_text: "Dinlediğiniz mesajda arkadaşlarınız sizlere ne söyledi? Cevabınızı öğretmeninize söyleyin!",
        background_color: "#e53935",
        surface_color: "#1a237e",
        text_color: "#ffffff",
        primary_action_color: "#ffffff",
        secondary_action_color: "#fdd835",
        font_family: "Nunito",
        font_size: 16
      };

      function applyConfig(config) {
        const c = { ...defaultConfig, ...config };
        document.getElementById('el-title').textContent = c.main_title;
        document.getElementById('el-instruction').innerHTML = c.instruction_text;
        document.getElementById('el-question').textContent = c.question_text;

        const font = c.font_family || defaultConfig.font_family;
        document.body.style.fontFamily = `${font}, Nunito, sans-serif`;

        const base = c.font_size || defaultConfig.font_size;
        document.getElementById('el-title').style.fontSize = `${base * 2}px`;
        document.getElementById('el-instruction').style.fontSize = `${base}px`;
        document.getElementById('el-question').style.fontSize = `${base * 1.25}px`;
      }

      // Screens
      const screens = ['screen-instruction', 'screen-audio', 'screen-question'];
      function showScreen(id) {
        screens.forEach(s => {
          const el = document.getElementById(s);
          el.classList.add('hidden');
          el.classList.remove('flex');
        });
        const target = document.getElementById(id);
        target.classList.remove('hidden');
        target.classList.add('flex');
      }

      document.getElementById('btn-start').addEventListener('click', () => showScreen('screen-audio'));
      document.getElementById('btn-replay').addEventListener('click', () => showScreen('screen-audio'));

      // Fullscreen
      const fsOverlay = document.getElementById('fullscreen-overlay');
      const fsVideo = document.getElementById('fs-video');
      const mainVideo = document.getElementById('main-video');

      document.getElementById('btn-fullscreen').addEventListener('click', () => {
        fsVideo.currentTime = mainVideo.currentTime;
        fsOverlay.classList.remove('hidden');
        if (!mainVideo.paused) { mainVideo.pause(); fsVideo.play(); }
      });
      document.getElementById('btn-exit-fs').addEventListener('click', () => {
        mainVideo.currentTime = fsVideo.currentTime;
        fsOverlay.classList.add('hidden');
        if (!fsVideo.paused) { fsVideo.pause(); mainVideo.play(); }
      });

      // Video bitince soru ekranına geç
      mainVideo.addEventListener('ended', () => {
        showScreen('screen-question');
      });
      fsVideo.addEventListener('ended', () => {
        fsOverlay.classList.add('hidden');
        showScreen('screen-question');
      });

      // Confetti
      const container = document.getElementById('confetti-container');
      const colors = ['#fdd835', '#ffffff', '#43a047', '#e53935', '#2196f3'];
      for (let i = 0; i < 40; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + '%';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (3 + Math.random() * 4) + 's';
        c.style.animationDelay = Math.random() * 5 + 's';
        c.style.animationIterationCount = 'infinite';
        c.style.width = (6 + Math.random() * 8) + 'px';
        c.style.height = (6 + Math.random() * 8) + 'px';
        container.appendChild(c);
      }

      // Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (config) => applyConfig(config),
          mapToCapabilities: (config) => ({
            recolorables: [
              { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
              { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
              { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
              { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
              { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
            ],
            borderables: [],
            fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
            fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
          }),
          mapToEditPanelValues: (config) => new Map([
            ["main_title", config.main_title || defaultConfig.main_title],
            ["instruction_text", config.instruction_text || defaultConfig.instruction_text],
            ["question_text", config.question_text || defaultConfig.question_text]
          ])
        });
      }

      applyConfig(defaultConfig);
      lucide.createIcons();
    </script>

</body>

</html>
