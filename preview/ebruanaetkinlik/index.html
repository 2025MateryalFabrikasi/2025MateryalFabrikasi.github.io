
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebru Atölyesi Etkinliği</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Comic Sans MS", cursive;
            overflow: hidden;
            /* Arka plan: Net ve orijinal 1.jpg */
            background-image: url('1.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
        }

        #game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Çerçeve: Arka plandaki renklerle uyumlu, daha yumuşak ama canlı geçiş */
        .vibrant-frame {
            background: rgba(255, 255, 255, 0.98);
            padding: 10px;
            border-radius: 15px;
            position: relative;
            border: 5px solid;
            border-image: linear-gradient(45deg, #008b8b, #ff7f50, #ffd700) 1;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* Video Kapsayıcısı: %80'den %70'e çekilerek dengelendi */
        #video-wrapper {
            display: none;
            width: 70%; 
            max-width: 950px;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
        }

        #video-wrapper:fullscreen {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .modal {
            text-align: center;
            border-radius: 20px;
        }

        /* Soru Kutusu */
        #question-box {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 310px;
            padding: 18px;
            z-index: 2147483647; 
        }

        #intro-screen {
            max-width: 480px;
            padding: 25px;
        }

        h2 { color: #008b8b; margin-top: 0; font-size: 1.7rem; }

        /* Soru Metni: Siyah ve 12pt */
        #question-text {
            color: black !important;
            font-size: 12pt !important;
            margin-bottom: 18px;
            font-weight: normal;
            line-height: 1.5;
        }

        p.desc { font-size: 1rem; color: #333; margin-bottom: 20px; line-height: 1.6; }

        button {
            background: linear-gradient(135deg, #008b8b 0%, #20b2aa 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1.15rem;
            border-radius: 25px;
            cursor: pointer;
            font-family: "Comic Sans MS", cursive;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="intro-screen" class="modal vibrant-frame">
        <h2>Ebru Atölyesine Hoş Geldin ✨</h2>
        <p class="desc">Geleneksel Ebru sanatının büyüleyici dünyasını keşfetmeye hazır mısın? Videoyu izlerken belirli noktalarda karşına çıkacak soruları yanıtla ve bu eşsiz sanatın inceliklerini bizimle birlikte öğren!</p>
        <button onclick="startGame()">Atölyeyi Başlat 🎨</button>
    </div>

    <div id="video-wrapper" class="vibrant-frame">
        <video id="myVideo" controls>
            <source src="1.mp4" type="video/mp4">
        </video>

        <div id="question-box" class="modal vibrant-frame">
            <p id="question-text"></p>
            <button onclick="resumeVideo()">Devam Et ➡️</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('myVideo');
    const introScreen = document.getElementById('intro-screen');
    const videoWrapper = document.getElementById('video-wrapper');
    const questionBox = document.getElementById('question-box');
    const questionText = document.getElementById('question-text');

    const pausePoints = [
        { time: 3, question: "Su üzerine resim yapmak sence eğlenceli midir? Neden?", asked: false },
        { time: 100, question: "Daha önce ebru yaptın mı? Ebru yapmak için hangi özelliklere sahip olmalıyız?", asked: false },
        { time: 210, question: "Ebru yapmak istesen hangi şekil veya deseni kullanırdın?", asked: false }
    ];

    function startGame() {
        introScreen.style.display = 'none';
        videoWrapper.style.display = 'block';
        video.play();
    }

    video.ontimeupdate = function() {
        pausePoints.forEach((point) => {
            if (Math.floor(video.currentTime) === point.time && !point.asked) {
                video.pause();
                point.asked = true;
                showQuestion(point.question);
            }
        });
    };

    function showQuestion(text) {
        video.controls = false;
        questionText.innerText = text;
        questionBox.style.display = 'block';
    }

    function resumeVideo() {
        questionBox.style.display = 'none';
        video.controls = true;
        video.play();
    }

    video.onended = function() {
        alert("Atölye çalışmasını tamamladın! ✨");
        location.reload();
    };
</script>

</body>
</html>
