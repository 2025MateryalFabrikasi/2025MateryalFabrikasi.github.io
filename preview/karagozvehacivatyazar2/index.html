
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ramazan Değerler Oyunu</title>
    <style>
        body {
            margin: 0;
            background: #ffbe76; /* O muhteşem zemin rengi */
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #2d3436;
            overflow: hidden;
        }

        #game-wrapper {
            width: 95%;
            max-width: 800px;
            max-height: 95vh;
            background: #ffffff;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            border: 10px solid #f0932b;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Puan Tablosu - Oyun sırasında sağ üstte görünür */
        #score-board {
            display: none;
            background: #badc58;
            color: #2d3436;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            position: absolute;
            top: 15px;
            right: 15px;
            border: 4px solid white;
            z-index: 10;
        }

        #video-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 100px rgba(0,0,0,0.6);
            z-index: 100;
            width: 70%;
            border: 8px solid #eb4d4b;
        }

        video {
            width: 100%;
            border-radius: 20px;
            background: black;
        }

        /* Görsel Boyutu Sığacak Şekilde Küçültüldü */
        .game-img {
            width: 280px; 
            max-width: 80%;
            height: auto;
            border-radius: 20px;
            border: 6px solid #ffbe76;
            margin: 10px auto;
            display: block;
        }

        .options-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .opt-btn {
            background: #686de0;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: "Comic Sans MS", cursive;
            transition: 0.3s;
            box-shadow: 0 6px 0 #4834d4;
            width: 70%;
            text-align: left;
        }

        .opt-btn:hover { transform: scale(1.02); }
        .opt-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #4834d4; }

        .feedback {
            font-size: 22px;
            margin-top: 10px;
            font-weight: bold;
            min-height: 35px;
        }

        .btn-main {
            background: #eb4d4b;
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 32px;
            border-radius: 50px;
            cursor: pointer;
            font-family: "Comic Sans MS", cursive;
            box-shadow: 0 8px 0 #c0392b;
        }

        .kandil { font-size: 50px; display: inline-block; margin: 10px; filter: grayscale(100%); transition: 1s; }
        .kandil.on { filter: grayscale(0%) drop-shadow(0 0 20px gold); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="score-board">Puan: <span id="score">0</span></div>

    <div id="area-intro">
        <h1 style="color:#eb4d4b; font-size: 45px;">🌟 Hoş Geldin! 🌟</h1>
        <p style="font-size: 24px;">Videoyu izle, bilmeceyi çöz ve sonra resimlerdeki değerlerimizi bulalım! Hazırsan ışıkları yakalım.</p>
        <button class="btn-main" onclick="startVideo()">BAŞLA! 🚀</button>
    </div>

    <div id="area-video" style="display:none; position: relative;">
        <video id="vid" controls>
            <source src="1.mp4" type="video/mp4">
        </video>
        <div id="video-modal">
            <h2 style="color:#eb4d4b; font-size: 30px;">🤔 Bilmeceyi çözdün mü?</h2>
            <p style="font-size: 20px;">Harikasın! Devam etmek için aşağıdaki butona tıkla.</p>
            <button class="btn-main" style="font-size: 20px; padding: 10px 30px;" onclick="resumeVideo()">DEVAM ET ▶️</button>
        </div>
    </div>

    <div id="area-quiz" style="display:none;">
        <img id="q-img" class="game-img" src="">
        <h2 style="color:#2d3436; font-size: 22px; margin: 10px 0;">Bu görselde hangi değerimiz anlatılıyor?</h2>
        <div class="options-box" id="q-options"></div>
        <div id="feedback-text" class="feedback"></div>
    </div>

    <div id="area-final" style="display:none;">
        <h1 style="color:#6ab04c; font-size: 50px;">🎉 TEBRİKLER! 🎉</h1>
        <p style="font-size: 28px;">Değerlerimize sahip çıkalım.</p>
        <div id="kandil-final">
            <span class="kandil">🪔</span><span class="kandil">🪔</span><span class="kandil">🪔</span>
        </div>
        <button class="btn-main" onclick="location.reload()">TEKRAR OYNA 🔄</button>
    </div>
</div>

<script>
    let score = 0;
    let step = 0;
    let videoPausedAtGoal = false;
    const video = document.getElementById('vid');
    
    const questions = [
        { img: '1.jpg', correct: 'İnanmak', options: ['İnanmak', 'Korkmak'] },
        { img: '2.jpg', correct: 'Güzel konuşmak', options: ['Güzel konuşmak', 'Bağırmak'] },
        { img: '3.jpg', correct: 'Paylaşmak', options: ['Paylaşmak', 'Beklemek'] },
        { img: '4.jpg', correct: 'Sevgi', options: ['Sevgi', 'Öfke'] },
        { img: '5.jpg', correct: 'Sağlık', options: ['Sağlık', 'Halsizlik'] },
        { img: '6.jpg', correct: 'Cömertlik', options: ['Cömertlik', 'Cimrilik'] },
        { img: '7.jpg', correct: 'Yardımlaşmak', options: ['Yardımlaşmak', 'Yalnız kalmak'] }
    ];

    function startVideo() {
        document.getElementById('area-intro').style.display = 'none';
        document.getElementById('area-video').style.display = 'block';
        video.play();
    }

    video.addEventListener('timeupdate', function() {
        if (video.currentTime >= 40 && !videoPausedAtGoal) {
            video.pause();
            videoPausedAtGoal = true;
            document.getElementById('video-modal').style.display = 'block';
        }
    });

    function resumeVideo() {
        document.getElementById('video-modal').style.display = 'none';
        video.currentTime = 40.2; 
        video.play();
    }

    video.onended = function() {
        document.getElementById('area-video').style.display = 'none';
        document.getElementById('area-quiz').style.display = 'block';
        document.getElementById('score-board').style.display = 'block';
        loadQuestion();
    };

    function loadQuestion() {
        if (step >= questions.length) {
            showFinal();
            return;
        }
        const q = questions[step];
        document.getElementById('q-img').src = q.img;
        document.getElementById('feedback-text').innerText = "";
        const optContainer = document.getElementById('q-options');
        optContainer.innerHTML = "";
        let shuffled = [...q.options].sort(() => Math.random() - 0.5);
        shuffled.forEach((opt, index) => {
            const label = index === 0 ? "A) " : "B) ";
            const btn = document.createElement('button');
            btn.innerText = label + opt;
            btn.className = 'opt-btn';
            btn.onclick = () => checkAnswer(opt, q.correct);
            optContainer.appendChild(btn);
        });
    }

    function checkAnswer(ans, correct) {
        const fb = document.getElementById('feedback-text');
        if (ans === correct) {
            score += 10;
            fb.innerHTML = "<span style='color:#6ab04c;'>⭐ Harikasın! Doğru Cevap! ⭐</span>";
            setTimeout(() => { step++; loadQuestion(); }, 1500);
        } else {
            score = Math.max(0, score - 5);
            fb.innerHTML = "<span style='color:#eb4d4b;'>😮 Bir daha denemeye ne dersin?</span>";
        }
        document.getElementById('score').innerText = score;
    }

    function showFinal() {
        document.getElementById('area-quiz').style.display = 'none';
        document.getElementById('area-final').style.display = 'block';
        document.querySelectorAll('.kandil').forEach(k => k.classList.add('on'));
    }
</script>

</body>
</html>
