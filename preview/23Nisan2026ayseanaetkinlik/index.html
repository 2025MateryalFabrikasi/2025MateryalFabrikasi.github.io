<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23 Nisan Coşkusu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            overflow: hidden;
            background-color: white;
            transition: background 0.5s ease;
        }

        body.bg-intro { background: url('1.png') center/cover no-repeat; }
        body.bg-video { background: white; }
        body.bg-celebration { background: url('11.jpg') center/cover no-repeat; }
        body.bg-end { background: url('1.png') center/cover no-repeat; }

        #game-container {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        .panel {
            background: rgba(255, 255, 255, 0.98);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            max-width: 450px;
            width: 80%;
            z-index: 100;
            border: 5px solid #e31e24;
            display: none;
        }

        #intro-screen { display: block; }
        h2 { color: #e31e24; font-size: 1.8rem; margin-top: 0; }
        p { font-size: 1.2rem; color: #333; line-height: 1.6; }

        button {
            background: #e31e24; color: white; border: none;
            padding: 12px 30px; font-size: 1.2rem; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 0 #b31419; margin-top: 20px;
            font-family: "Comic Sans MS", sans-serif;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); background: #ff1e26; }

        #video-wrapper {
            display: none; position: relative; width: 85%; max-width: 900px;
            border: 10px solid #e31e24; border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6); overflow: hidden; background: black;
            z-index: 10;
        }
        video { width: 100%; display: block; }

        #question-overlay {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: white;
            padding: 25px; border-radius: 20px; text-align: center;
            width: 75%; max-width: 400px; border: 6px solid #e31e24; z-index: 110;
        }

        /* --- KUTLU OLSUN YAZISI --- */
        #big-label {
            display: none; position: absolute; bottom: 8%; left: 50%;
            transform: translateX(-50%); font-size: 5rem; font-weight: bold;
            color: #e31e24; 
            text-shadow: 0 0 20px white, 4px 4px 0px white;
            z-index: 95; white-space: nowrap;
            animation: pulse-glow 1.5s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            50% { transform: translateX(-50%) scale(1.1); opacity: 1; text-shadow: 0 0 40px white, 4px 4px 0px white; }
        }

        /* --- PARLAK VE KÜÇÜK PARÇACIKLAR --- */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 90;
            box-shadow: 0 0 8px 2px white;
        }

        .confetti {
            position: absolute;
            background: white;
            opacity: 1; /* Daha belirgin */
            pointer-events: none;
            z-index: 85;
            box-shadow: 0 0 5px rgba(255,255,255,0.8); /* Parlama efekti */
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
            25% { transform: translateY(20vh) translateX(20px) rotate(90deg); }
            50% { transform: translateY(50vh) translateX(-20px) rotate(180deg); }
            100% { transform: translateY(110vh) translateX(0) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="bg-intro">

<div id="game-container">
    <div id="intro-screen" class="panel">
        <h2>Merhaba Küçük Kahraman!</h2>
        <p>Meclisimizin nasıl açıldığını öğrenmeye hazır mısın? Videoyu izle, soruları bil ve muhteşem bir kutlamaya ulaş!</p>
        <button onclick="startGame()">Başlayalım!</button>
    </div>

    <div id="video-wrapper">
        <video id="myVideo" controls><source src="1.mp4" type="video/mp4"></video>
        <div id="question-overlay">
            <div id="question-text"></div>
            <button onclick="resumeVideo()">Devam Et</button>
        </div>
    </div>

    <div id="big-label">Kutlu olsun.</div>

    <div id="end-screen" class="panel">
        <h2>TEBRİKLER! 🎉</h2>
        <p><b>"En büyük bayram bugün.<br>Ata'mızdan armağan.<br>Kutlu olsun."</b></p>
        <button onclick="location.reload()">Başa Dön</button>
    </div>

    <audio id="finishAudio"><source src="1.mp3" type="audio/mpeg"></audio>
</div>

<script>
    const v = document.getElementById('myVideo');
    const a = document.getElementById('finishAudio');
    
    const qs = [
        {t: 60, q: "23 Nisan neden önemlidir? Düşüncelerini bizimle paylaşır mısın?"},
        {t: 99, q: "Türkiye Büyük Millet Meclisi ne zaman ve kim tarafından açılmıştır?"},
        {t: 225, q: "Dinlediğin/izlediğin bu metinde neler hissettin? Duygularını bizimle paylaşır mısın?"},
        {t: 300, q: "Atatürk'ün çocuklara armağan ettiği bu bayramda en çok ne yapmayı seviyorsun?"}
    ];
    
    let cur = 0;
    let effectInterval;

    function startGame() {
        document.body.className = 'bg-video';
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('video-wrapper').style.display = 'block';
        v.play();
    }

    v.ontimeupdate = () => {
        if(cur < qs.length && v.currentTime >= qs[cur].t && v.currentTime < qs[cur].t + 0.5) {
            v.pause(); v.controls = false;
            document.getElementById('question-text').innerHTML = `<p>${qs[cur].q}</p>`;
            document.getElementById('question-overlay').style.display = 'block';
        }
    };

    function resumeVideo() {
        document.getElementById('question-overlay').style.display = 'none';
        v.controls = true; cur++; v.currentTime += 0.6; v.play();
    }

    v.onended = () => {
        document.getElementById('video-wrapper').style.display = 'none';
        document.body.className = 'bg-celebration';
        document.getElementById('big-label').style.display = 'block';
        a.play();
        
        // --- SÜPER YOĞUN EFEKT DÖNGÜSÜ ---
        effectInterval = setInterval(() => {
            launchFirework();
            // Her döngüde 15 tane küçük konfeti üret (Çok daha yoğun)
            for(let i=0; i<15; i++) createSmallConfetti();
        }, 300); // Daha sık patlama ve üretim

        a.onended = () => {
            clearInterval(effectInterval);
            document.getElementById('big-label').style.display = 'none';
            document.body.className = 'bg-end';
            document.getElementById('end-screen').style.display = 'block';
        };
    };

    function launchFirework() {
        const x = Math.random() * 80 + 10;
        const y = Math.random() * 40 + 10;
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 300 + 100;
            p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
            p.style.left = x + 'vw'; p.style.top = y + 'vh';
            const s = Math.random() * 4 + 2 + 'px'; // Parçacıklar küçültüldü
            p.style.width = s; p.style.height = s;
            p.style.animation = `explode ${Math.random() * 0.5 + 0.8}s ease-out forwards`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1500);
        }
    }

    function createSmallConfetti() {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-2vh';
        // Daha küçük ve belirgin kareler
        const s = Math.random() * 5 + 3 + 'px'; 
        c.style.width = s; c.style.height = (Math.random() > 0.5 ? s : '2px');
        c.style.animation = `confetti-fall ${Math.random() * 2 + 1.5}s linear forwards`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3500);
    }
</script>
</body>
</html>
