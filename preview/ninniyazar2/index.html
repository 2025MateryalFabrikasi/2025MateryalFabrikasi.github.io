
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninni Tamamlama Oyunu</title>
    <style>
        body {
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            background-color: #dfd3c3;
            background-image: url('1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
            font-size: 14pt;
        }

        #game-container {
            width: 95%;
            max-width: 900px;
            height: 90vh;
            background: #f4ece1;
            padding: 25px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            border: 1px solid #d7c4a3;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .hidden { display: none !important; }

        #intro-screen, #video-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }

        #intro-screen {
            background: transparent;
        }
        
        /* Yönerge ekranındaki renkli çerçeve (Aynı kaldı) */
        #intro-screen div {
            background-color: rgba(255, 255, 255, 0.8) !important;
            border: 5px solid #ff6b6b !important;
            border-radius: 15px !important;
            padding: 20px !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2) !important;
            color: #3e2723;
        }

        /* YENİ: Antrasit çerçeve ve Sarı ışık efekti */
        video {
            width: 90%;
            max-height: 80vh;
            border: 12px solid #2f3640; /* Antrasit renk */
            border-style: outset;
            border-radius: 15px;
            background-color: #000;
            /* Sarı ışık (glow) efekti */
            box-shadow: 0 0 20px #ffcc00, 0 0 40px #ffcc00, 0 0 60px rgba(255, 204, 0, 0.5);
        }

        #header-area { flex-shrink: 0; margin-bottom: 10px; text-align: center; }
        
        #game-instruction {
            font-size: 12pt;
            color: #8b4513;
            margin-bottom: 8px;
            font-weight: bold;
        }

        #keywords-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(255,255,255,0.4);
            border-radius: 10px;
            border: 1px solid rgba(139, 69, 19, 0.2);
        }

        .keyword {
            background-color: #a67c52;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: grab;
            font-weight: bold;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            font-size: 13pt;
        }

        #scrollable-lyrics {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            border-top: 1px solid rgba(139, 69, 19, 0.1);
        }

        .lyrics-box {
            text-align: center;
            line-height: 2.5;
            color: #5d4037;
        }

        .drop-target {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 100px;
            height: 32px;
            border-bottom: 2px dashed #8b4513;
            margin: 0 4px;
            vertical-align: baseline;
            position: relative;
            background: rgba(139, 69, 19, 0.03);
            transform: translateY(4px);
        }

        .drop-target::after {
            content: "...";
            color: #c3b091;
            font-size: 12pt;
            position: absolute;
        }

        .correct-drop {
            background-color: transparent;
            border-bottom: 2px solid #2e7d32;
            color: #2e7d32;
            font-weight: bold;
            transform: translateY(0);
        }

        .correct-drop::after { content: ""; }

        .btn-start, .btn-restart {
            background-color: #8b4513;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 15pt;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 20px;
        }

        #congrats-card {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 320px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 3000;
            opacity: 0;
            transition: 0.4s;
            text-align: center;
            pointer-events: none;
        }
        #congrats-card.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

        .confetti { position: absolute; width: 8px; height: 8px; z-index: 1000; animation: explode 1s forwards; }
        @keyframes explode { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)); opacity: 0; } }
        .sad-emoji-popup { position: fixed; font-size: 40px; pointer-events: none; z-index: 2000; animation: fadeUp 1s forwards; }
        @keyframes fadeUp { 0% { opacity:1; } 100% { opacity:0; transform: translateY(-40px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="intro-screen">
        <div> 
            <h2>Canım Çocuklar, Hoş Geldiniz!</h2>
            <p>Şimdi birlikte güzel bir <strong>ninni</strong> dinleyeceğiz. <br>
            Ardından ninnideki gizli kelimeleri yerleştireceğiz.</p>
        </div>
        <button class="btn-start" onclick="startVideo()">Başlayalım</button>
    </div>

    <div id="video-screen" class="hidden">
        <video id="game-video" controls>
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <div id="play-screen" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
        <div id="header-area">
            <div id="score-board" style="font-weight: bold; color: #5d4037; margin-bottom: 5px;">Puan: <span id="score">0</span></div>
            <div id="game-instruction">Kelimeleri sürükleyerek boşluklara yerleştirin:</div>
            <div id="keywords-container"></div>
        </div>
        <div id="scrollable-lyrics">
            <div class="lyrics-box" id="lyrics-container"></div>
        </div>
    </div>
</div>

<div id="congrats-card">
    <div style="font-size: 40px;">🌟</div>
    <h2 style="color: #8b4513;">Harika!</h2>
    <p>Ninninin tüm eksiklerini tamamladın.</p>
    <button class="btn-restart" onclick="location.reload()">Tekrar Oyna</button>
</div>

<script>
    let score = 0;
    const words = [
        { id: 1, text: "Eşek" }, { id: 2, text: "burnunla" },
        { id: 3, text: "Çeşme" }, { id: 4, text: "kuyruğunla" },
        { id: 5, text: "Kamçı" }, { id: 6, text: "gözünle" },
        { id: 7, text: "Fincan" }
    ];

    function startVideo() {
        document.getElementById('game-container').style.background = "#f4ece1";
        document.getElementById('game-container').style.border = "1px solid #d7c4a3";
        document.getElementById('game-container').style.boxShadow = "0 0 20px rgba(0,0,0,0.2)";
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('video-screen').classList.remove('hidden');
        const video = document.getElementById('game-video');
        video.currentTime = 5;
        video.play();
        video.ontimeupdate = function() {
            if (video.currentTime >= 120) { video.pause(); showGame(); }
        };
        video.onended = showGame;
    }

    function showGame() {
        document.getElementById('video-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');
        setupGame();
    }

    function setupGame() {
        const container = document.getElementById('keywords-container');
        const lyricsBox = document.getElementById('lyrics-container');
        
        container.innerHTML = "";
        let lyricsHtml = `
            <span class="drop-target" data-id="1" ondragover="allowDrop(event)" ondrop="drop(event)"></span> senin ağzınla <br> Fırın mı yapayım? <br>
            Fırınlı dağlar, sümbüllü bağlar <br> Ben ner'de kalayım, oy? <br><br>
            Eşek, senin <span class="drop-target" data-id="2" ondragover="allowDrop(event)" ondrop="drop(event)"></span> <br> <span class="drop-target" data-id="3" ondragover="allowDrop(event)" ondrop="drop(event)"></span> mi yapayım? <br>
            Çeşmeli dağlar, sümbüllü bağlar <br> Ben ner'de kalayım, oy? <br><br>
            Eşek, senin <span class="drop-target" data-id="4" ondragover="allowDrop(event)" ondrop="drop(event)"></span> <br> <span class="drop-target" data-id="5" ondragover="allowDrop(event)" ondrop="drop(event)"></span> mı yapayım? <br>
            Kamçılı dağlar, sümbüllü bağlar <br> Ben ner'de kalayım, oy? <br><br>
            Eşek, senin <span class="drop-target" data-id="6" ondragover="allowDrop(event)" ondrop="drop(event)"></span> <br> <span class="drop-target" data-id="7" ondragover="allowDrop(event)" ondrop="drop(event)"></span> mı yapayım? <br>
            Fincanlı dağlar, sümbüllü bağlar <br> Ben ner'de kalayım, oy?
        `;
        lyricsBox.innerHTML = lyricsHtml;

        const shuffled = [...words].sort(() => Math.random() - 0.5);
        shuffled.forEach(word => {
            const div = document.createElement('div');
            div.className = 'keyword';
            div.textContent = word.text;
            div.draggable = true;
            div.id = `word-${word.id}`;
            div.ondragstart = (e) => e.dataTransfer.setData('text', e.target.id);
            container.appendChild(div);
        });
    }

    function allowDrop(e) { e.preventDefault(); }

    function drop(e) {
        e.preventDefault();
        const draggedId = e.dataTransfer.getData('text');
        const draggedElement = document.getElementById(draggedId);
        const targetId = e.target.getAttribute('data-id');
        const wordData = words.find(w => `word-${w.id}` === draggedId);

        if (wordData && wordData.id == targetId && !e.target.classList.contains('correct-drop')) {
            e.target.textContent = wordData.text;
            e.target.classList.add('correct-drop');
            draggedElement.style.visibility = 'hidden';
            score += 10;
            document.getElementById('score').textContent = score;
            createConfetti();
            if(score === words.length * 10) setTimeout(() => document.getElementById('congrats-card').classList.add('show'), 800);
        } else {
            showSadEmoji(e.clientX, e.clientY);
        }
    }

    function createConfetti() {
        const container = document.getElementById('game-container');
        for (let i = 0; i < 25; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.backgroundColor = ['#FFD700', '#FF4500', '#00BFFF', '#32CD32'][Math.floor(Math.random() * 4)];
            c.style.setProperty('--dx', (Math.random() - 0.5) * 400 + 'px');
            c.style.setProperty('--dy', (Math.random() - 0.5) * 400 + 'px');
            c.style.left = '50%'; c.style.top = '50%';
            container.appendChild(c);
            setTimeout(() => c.remove(), 1000);
        }
    }

    function showSadEmoji(x, y) {
        const emoji = document.createElement('div');
        emoji.className = 'sad-emoji-popup';
        emoji.textContent = '😢';
        emoji.style.left = x + 'px'; emoji.style.top = y + 'px';
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 1000);
    }

    window.onload = function() {
        document.getElementById('game-container').style.background = "transparent";
        document.getElementById('game-container').style.border = "none";
        document.getElementById('game-container').style.boxShadow = "none";
    };
</script>

</body>
</html>
