
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Farkı Bul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b; 
            touch-action: manipulation;
        }
        
        .canvas-container { position: relative; cursor: crosshair; touch-action: none; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .drawing-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <audio id="instructionAudio1"><source src="1.mp3" type="audio/mpeg"></audio>

    <!-- Sayfa 1: 7 Fark -->
    <div id="page1" class="w-full max-w-6xl flex flex-col items-center">
        <h1 class="text-3xl md:text-5xl font-bold text-orange-500 mb-6 text-center">7 Farkı Bulalım</h1>
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 w-full mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
            <button onclick="document.getElementById('instructionAudio1').play()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-3 hover:bg-indigo-700 transition-all">
                <span class="text-2xl">🔊</span> Dinle: Nasıl Oynanır?
            </button>

            <div class="flex gap-3">
                <div onclick="setColor('#ef4444', this)" class="w-10 h-10 rounded-full bg-red-500 cursor-pointer border-4 border-white shadow-md active-color" style="border-color: #1e293b;"></div>
                <div onclick="setColor('#3b82f6', this)" class="w-10 h-10 rounded-full bg-blue-500 cursor-pointer border-4 border-white shadow-md"></div>
                <div onclick="setColor('#22c55e', this)" class="w-10 h-10 rounded-full bg-green-500 cursor-pointer border-4 border-white shadow-md"></div>
            </div>
            
            <button onclick="clearCanvas()" class="text-slate-500 font-bold underline">Resmi Temizle</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 w-full">
            <div class="canvas-container bg-white">
                <img src="11.jpg" id="refImg" class="w-full h-auto block">
                <canvas id="canvasRef" class="drawing-canvas"></canvas>
            </div>
            <div class="canvas-container bg-white border-4 border-orange-400">
                <img src="1.jpg" id="targetImg" class="w-full h-auto block">
                <canvas id="canvasTarget" class="drawing-canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        let currentColor = '#ef4444';

        // --- ÇİZİM SİSTEMİ ---
        const canvasRef = document.getElementById('canvasRef');
        const canvasTarget = document.getElementById('canvasTarget');
        const imgRef = document.getElementById('refImg');
        const imgTarget = document.getElementById('targetImg');
        let drawing = false;

        function resize() {
            [canvasRef, canvasTarget].forEach((c, i) => {
                const img = i === 0 ? imgRef : imgTarget;
                if(img.clientWidth) {
                    c.width = img.clientWidth; c.height = img.clientHeight;
                }
            });
        }
        imgRef.onload = resize; imgTarget.onload = resize; window.onresize = resize;

        function setupCanvas(canvas) {
            const ctx = canvas.getContext('2d');
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                return { x, y };
            };
            const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            const move = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineWidth = 6; ctx.lineCap='round'; ctx.strokeStyle=currentColor; ctx.lineTo(p.x, p.y); ctx.stroke(); };
            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
            canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move);
        }
        setupCanvas(canvasRef); setupCanvas(canvasTarget);
        window.addEventListener('mouseup', () => drawing = false); window.addEventListener('touchend', () => drawing = false);

        function setColor(color, el) {
            currentColor = color;
            document.querySelectorAll('[onclick^="setColor"]').forEach(d => d.style.borderColor = 'white');
            el.style.borderColor = '#1e293b';
        }
        function clearCanvas() { 
            canvasRef.getContext('2d').clearRect(0,0,canvasRef.width, canvasRef.height);
            canvasTarget.getContext('2d').clearRect(0,0,canvasTarget.width, canvasTarget.height);
        }
    </script>
</body>
</html>
