<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Ramazan Kültürümüzü Tanıyalım</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fffdf5;
            text-align: center;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            max-width: 1000px;
            width: 100%;
        }

        /* Görseli Büyüttük */
        #big-image {
            width: 550px;
            height: 350px;
            border: 10px solid #d35400;
            border-radius: 25px;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Tanım seçeneklerini büyüttük ve sığacak şekilde düzenledik */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 25px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 12px;
            transition: 0.3s;
            line-height: 1.4;
        }

        .btn:hover {
            background: #d35400;
            transform: scale(1.02);
        }

        .correct {
            background-color: #27ae60 !important;
            border: 4px solid #1e8449;
        }

        .wrong {
            background-color: #c0392b !important;
        }

        #next-btn {
            margin-top: 20px;
            padding: 20px 50px;
            font-size: 20px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 12px;
            display: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="intro">
        <h1 style="font-size: 3em;">🌙 Ramazan Kültürümüz</h1>
        <p style="font-size: 1.5em;">Resme bak, en uygun tanımı seç!</p>
        <button class="btn" style="width: 250px; font-size: 20px;" onclick="start()">Oyuna Başla</button>
    </div>

    <div id="game" style="display:none;">
        <img id="big-image" src="" alt="Etkinlik Görseli">
        <div id="options" class="options-grid"></div>
        <button id="next-btn" onclick="nextQuestion()">Sıradaki Görsel</button>
    </div>

    <audio id="successSound" src="https://actions.google.com/sounds/v1/ui/positive_generate.ogg"></audio>
    <audio id="errorSound" src="https://actions.google.com/sounds/v1/ui/alarm_clock.ogg"></audio>

    <script>
        const gameData = [
            { id: 1, text: "İslam’ın beş şartından biridir. İmsak vaktinden iftar vaktine kadar yapılan ibadet." },
            { id: 2, text: "Ramazan ayında her gün Kur’an’ı karşılıklı okuyup dinleyerek hatim indirmek." },
            { id: 3, text: "Ramazan ayının sevincini halka duyurmak amacıyla camilerin iki minaresi arasına ışıklandırılarak asılan yazı." },
            { id: 4, text: "Ramazan ayı boyunca yatsı namazından sonra kılınan namaz." },
            { id: 5, text: "Ramazan ayının sonunda belli bir mala sahip her Müslümanın vermesi vacip olan sadaka." },
            { id: 6, text: "Oruca hazırlanmak için imsak vakti girmeden önce yenilen yemek." },
            { id: 7, text: "Orucu açma vakti." },
            { id: 8, text: "Ramazan ayında iftar sofralarında oruç açarken yenilen tatlı ve besleyici bir meyve." },
            { id: 9, text: "Ramazan ayında özellikle iftar sofralarında yenilen, yuvarlak ve yumuşak bir ekmek." },
            { id: 10, text: "Ramazan gecelerinde oynatılan geleneksel Türk gölge oyununun iki kahramanı." },
            { id: 11, text: "Genellikle birinci, ikinci ve dördüncü dizeleri uyaklı olan, hecenin yedili ölçüsüyle söylenen halk şiiri." }
        ];

        let index = 0;

        function start() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            document.getElementById('big-image').src = `${index + 1}.jpg`;
            document.getElementById('next-btn').style.display = 'none';
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            let choices = [gameData[index]];
            while (choices.length < 4) {
                let random = gameData[Math.floor(Math.random() * gameData.length)];
                if (!choices.includes(random)) choices.push(random);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = c.text;
                btn.onclick = () => check(c.id === gameData[index].id, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function check(isCorrect, btn) {
            if (isCorrect) {
                document.getElementById('successSound').play();
                btn.classList.add('correct');
                document.getElementById('next-btn').style.display = 'inline-block';
                document.querySelectorAll('.btn').forEach(b => b.disabled = true);
            } else {
                document.getElementById('errorSound').play();
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function nextQuestion() {
            index++;
            if (index < gameData.length) updateUI();
            else alert("Tebrikler, tüm Ramazan görevlerini başarıyla tamamladın!");
        }
    </script>
</body>

</html>
