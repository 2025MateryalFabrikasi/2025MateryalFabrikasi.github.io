<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eşleştirme Oyunu</title>
    <style>
        :root {
            --mavi: #a2d2ff; --pembe: #ffafcc; --yesil: #52b788;
            --font: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
        }
        body {
            font-family: var(--font); background: #f0faff; margin: 0;
            display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
        }

        /* Yönerge Ekranı */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--mavi); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .instruction-card {
            background: white; padding: 40px; border-radius: 40px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .start-btn {
            background: var(--yesil); color: white; border: none; padding: 20px 60px;
            font-size: 28px; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 0 #2d6a4f; margin-top: 20px;
        }
        .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2d6a4f; }

        /* Oyun Sahnesi */
        #game-stage { display: none; flex-direction: column; justify-content: space-between; width: 100%; max-width: 1000px; height: 100%; padding: 20px; box-sizing: border-box; }
        .score-board { font-size: 32px; color: #ff477e; text-align: center; }

        /* Üst Bölüm: Resimler */
        .image-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .drop-target { width: 220px; height: 220px; background: white; border: 5px dashed #cbd5e1; border-radius: 35px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .drop-target img { width: 90%; height: 90%; object-fit: contain; pointer-events: none; }
        .drop-target.hover { border-color: #ffd60a; background: #fffdf0; transform: scale(1.05); transition: 0.3s; }

        /* Alt Bölüm: Sesler */
        .audio-shelf { background: white; padding: 30px; border-radius: 60px 60px 0 0; display: flex; justify-content: center; gap: 30px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .audio-btn { width: 100px; height: 100px; background: var(--pembe); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: grab; font-size: 45px; box-shadow: 0 6px 0 #e089a5; transition: 0.2s; }
        
        #alert-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 50px; border-radius: 100px; color: white; font-size: 30px; display: none; z-index: 5000; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="instruction-card">
            <h1 style="color: #ff477e;">Hoş Geldin! 🎈</h1>
            <p>Hoparlörleri dinle ve doğru resmin üzerine taşı!</p>
            <button class="start-btn" id="trigger-start">OYUNU BAŞLAT 🚀</button>
        </div>
    </div>

    <div id="game-stage">
        <div class="score-board">⭐ PUANIN: <span id="puan-text">0</span> ⭐</div>
        <div class="image-row" id="img-area"></div>
        <div class="audio-shelf" id="snd-area"></div>
    </div>

    <div id="alert-msg"></div>

    <script>
        const state = { score: 0, matched: 0, ids: [1, 2, 3, 4] };

        // BUTON KONTROLÜ (Kesin çözüm)
        document.getElementById('trigger-start').addEventListener('click', function() {
            // Görünürlüğü Değiştir
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('game-stage').style.display = 'flex';
            
            // Oyunu Kur
            setup();
        });

        function setup() {
            const imgArea = document.getElementById('img-area');
            const sndArea = document.getElementById('snd-area');
            
            // Önce temizle
            imgArea.innerHTML = "";
            sndArea.innerHTML = "";

            // Resimleri Üste Diz
            [...state.ids].sort(() => Math.random() - 0.5).forEach(id => {
                const zone = document.createElement('div');
                zone.className = 'drop-target';
                zone.dataset.id = id;
                zone.innerHTML = `<img src="${id}.jpg">`;
                
                zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('hover'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('hover'));
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('hover');
                    const draggedId = e.dataTransfer.getData('text');
                    const num = draggedId.split('-')[1];

                    if (num == zone.dataset.id) {
                        state.score += 25; state.matched++;
                        document.getElementById('puan-text').innerText = state.score;
                        document.getElementById(draggedId).style.visibility = 'hidden';
                        zone.style.border = '5px solid #52b788';
                        zone.style.background = '#f0fdf4';
                        flash("HARİKA! ✨", "#52b788");
                        if(state.matched === 4) setTimeout(() => alert("TEBRİKLER! 🎉"), 500);
                    } else {
                        flash("TEKRAR DENE 🐥", "#ff477e");
                    }
                });
                imgArea.appendChild(zone);
            });

            // Sesleri Alta Diz
            [...state.ids].sort(() => Math.random() - 0.5).forEach(id => {
                const btn = document.createElement('div');
                btn.className = 'audio-btn';
                btn.draggable = true;
                btn.id = "audio-" + id;
                btn.innerHTML = '🔊';
                
                btn.onclick = () => { new Audio(id + ".mp3").play(); };
                btn.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text', e.target.id); });
                
                sndArea.appendChild(btn);
            });
        }

        function flash(t, c) {
            const m = document.getElementById('alert-msg');
            m.innerText = t; m.style.backgroundColor = c; m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 1200);
        }
    </script>
</body>
</html>
