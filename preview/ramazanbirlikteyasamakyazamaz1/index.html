<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramazan Bilmece Eşleştirme</title>
    <style>
        :root {
            --gece-mavisi: #0a192f;
            --altin: #ffcc00;
            --mor-isik: #4b0082;
            --beyaz: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1c2a48 0%, #0a192f 100%);
            color: var(--beyaz);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Yönerge Ekranı */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }

        .modal-box {
            background: var(--gece-mavisi);
            border: 4px double var(--altin);
            padding: 40px;
            border-radius: 30px;
            max-width: 600px;
            box-shadow: 0 0 30px var(--altin);
        }

        /* Oyun Alanı */
        .container {
            width: 95%;
            max-width: 1200px;
            text-align: center;
        }

        .row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--altin);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Ses Kartları (Üst Sıra) */
        .audio-card {
            width: 18%;
            height: 80px;
            font-size: 2.5rem;
        }

        /* Görsel Kartları (Alt Sıra) */
        .img-card {
            width: 18%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card:hover { transform: scale(1.05); background: rgba(255, 215, 0, 0.15); }
        .selected { border-color: #fff; box-shadow: 0 0 20px #fff; background: var(--altin) !important; color: var(--gece-mavisi); }
        .matched { opacity: 0.3; pointer-events: none; filter: grayscale(1); border-color: #444; }

        button {
            background: var(--altin);
            color: var(--gece-mavisi);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        #score-panel { font-size: 1.5rem; margin-top: 20px; color: var(--altin); font-weight: bold; }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

<canvas id="fireworksCanvas"></canvas>

<div id="intro-screen">
    <div class="modal-box">
        <h1 style="color:var(--altin)">🌙 Hoş Geldin Bilmece Meraklısı!</h1>
        <p style="font-size: 1.2rem; line-height: 1.6;">Ramazan'ın neşesini seslerde ve resimlerde aramaya hazır mısın? Kulaklarını iyice aç, ses dosyasını dinle ve bu sesin hangi resme ait olduğunu bul. 5 doğru eşleştirmeyi tamamla.</p>
        <button onclick="startGame()">Hadi Başlayalım!</button>
    </div>
</div>

<div class="container">
    <h2 style="color:var(--altin); margin-bottom: 40px;">Ramazan Sesli Bilmece Oyunu</h2>
    
    <div class="row" id="audio-row"></div>
    
    <div class="row" id="image-row"></div>

    <div id="score-panel">Doğru Sayısı: <span id="score">0</span> / 5</div>
</div>

<audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio> <audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio> <script>
    const gameData = [
        { id: 'gullac', img: 'gullac.jpg', audio: 'gullac.mp3' },
        { id: 'hurma', img: 'hurma.jpg', audio: 'hurma.mp3' },
        { id: 'mahya', img: 'mahya.jpg', audio: 'mahya.mp3' },
        { id: 'davulcu', img: 'ramazan_davulcusu.jpg', audio: 'ramazan_davulcusu.mp3' },
        { id: 'pide', img: 'ramazan-pidesi.jpg', audio: 'ramazan-pidesi.mp3' }
    ];

    let selectedAudio = null;
    let selectedImage = null;
    let score = 0;
    let currentVoice = null;

    function startGame() {
        document.getElementById('intro-screen').style.display = 'none';
        setupGame();
    }

    function setupGame() {
        const audioRow = document.getElementById('audio-row');
        const imageRow = document.getElementById('image-row');

        // Sesleri ve Görselleri karıştır
        const shuffledAudio = [...gameData].sort(() => Math.random() - 0.5);
        const shuffledImg = [...gameData].sort(() => Math.random() - 0.5);

        shuffledAudio.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card audio-card';
            div.innerHTML = '🔊';
            div.onclick = () => {
                if(currentVoice) currentVoice.pause();
                currentVoice = new Audio(item.audio);
                currentVoice.play();
                selectItem('audio', item.id, div);
            };
            audioRow.appendChild(div);
        });

        shuffledImg.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card img-card';
            div.innerHTML = `<img src="${item.img}" onerror="this.src='https://via.placeholder.com/150?text=Görsel+Yok'">`;
            div.onclick = () => selectItem('image', item.id, div);
            imageRow.appendChild(div);
        });
    }

    function selectItem(type, id, el) {
        if(type === 'audio') {
            document.querySelectorAll('.audio-card').forEach(c => c.classList.remove('selected'));
            selectedAudio = { id, el };
        } else {
            document.querySelectorAll('.img-card').forEach(c => c.classList.remove('selected'));
            selectedImage = { id, el };
        }
        el.classList.add('selected');

        if(selectedAudio && selectedImage) {
            if(selectedAudio.id === selectedImage.id) {
                document.getElementById('sfx-correct').play();
                selectedAudio.el.classList.add('matched');
                selectedImage.el.classList.add('matched');
                score++;
                document.getElementById('score').innerText = score;
                if(score === 5) triggerFireworks();
            } else {
                document.getElementById('sfx-wrong').play();
                setTimeout(() => {
                    selectedAudio.el.classList.remove('selected');
                    selectedImage.el.classList.remove('selected');
                }, 500);
            }
            selectedAudio = null;
            selectedImage = null;
        }
    }

    function triggerFireworks() {
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for(let i=0; i<100; i++) {
            particles.push({
                x: canvas.width/2,
                y: canvas.height/2,
                vx: (Math.random()-0.5)*10,
                vy: (Math.random()-0.5)*10,
                color: `hsl(${Math.random()*360}, 100%, 50%)`,
                size: Math.random()*5 + 2
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 25, 47, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.1;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
        alert("🎉 Tebrikler! Bilmeceleri başarıyla çözdün. Hayırlı Ramazanlar!");
    }
</script>
</body>
</html>
