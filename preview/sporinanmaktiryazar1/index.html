<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geleneksel Sporlarımız - Flashcard Oyunu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f39c12;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f0f4f8;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* --- Giriş Yönerge Ekranı --- */
        #intro-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .intro-icon {
            font-size: 4rem;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .instruction-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            border-left: 5px solid var(--primary-color);
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* --- Oyun Panelleri --- */
        #quiz-screen, #result-screen {
            display: none;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .lives { color: var(--danger-color); }
        .score { color: var(--primary-color); }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--success-color);
            transition: width 0.3s ease;
        }

        .card-display {
            background: #fff;
            border: 3px solid var(--primary-color);
            border-radius: 15px;
            margin-bottom: 20px;
            padding: 10px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-display img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
            object-fit: contain;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-btn, .start-btn, .restart-btn {
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-weight: 600;
        }

        .option-btn {
            background: #f1f3f5;
            color: var(--text-color);
            border: 2px solid transparent;
        }

        .option-btn:hover { background: #e9ecef; }

        .start-btn, .restart-btn {
            background: var(--success-color);
            color: white;
            padding: 15px 40px;
            margin-top: 10px;
        }

        .start-btn:hover { background: #27ae60; transform: scale(1.05); }

        .correct { background: var(--success-color) !important; color: white; }
        .wrong { background: var(--danger-color) !important; color: white; }

        #fireworks {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s; }
    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>

    <div id="game-container">
        <div id="intro-screen">
            <div class="intro-icon"><i class="fas fa-archway"></i></div>
            <h2>Hoş Geldiniz!</h2>
            <div class="instruction-box">
                <strong>Nasıl Oynanır?</strong><br>
                * Ekranda geleneksel Türk sporlarına ait görseller gösterilecektir.<br>
                * Görselin hangi spora ait olduğunu altındaki seçeneklerden bulmalısın.<br>
                * Her doğru cevap sana <strong>20 puan</strong> kazandırır.<br>
                * Toplam <strong>3 can</strong> hakkın var, dikkatli ol!
            </div>
            <button class="start-btn" onclick="startGame()">Oyunu Başlat <i class="fas fa-play"></i></button>
        </div>

        <div id="quiz-screen">
            <div class="stats-bar">
                <div class="score"><i class="fas fa-star"></i> <span id="score-val">0</span></div>
                <div class="lives"><i class="fas fa-heart"></i> <span id="lives-val">3</span></div>
            </div>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="card-display">
                <img id="question-image" src="" alt="Soru">
            </div>
            <div id="options-container" class="options-grid"></div>
        </div>

        <div id="result-screen">
            <h1 id="result-title">Oyun Bitti!</h1>
            <p id="result-text"></p>
            <div id="final-icon" style="font-size: 4rem; margin: 20px 0;"></div>
            <button class="restart-btn" onclick="location.reload()">Tekrar Oyna</button>
        </div>
    </div>

    <script>
        /*******************************************************
         * DATA - Görsel ve İsim Eşleşmeleri
         *******************************************************/
        const GAME_DATA = [
            { id: 1, name: "Okçuluk", image: "1.jpg" },
            { id: 2, name: "Cirit", image: "2.jpg" },
            { id: 3, name: "Yağlı Güreş", image: "3.jpg" },
            { id: 4, name: "Halat Çekme", image: "4.jpg" },
            { id: 5, name: "Geleneksel Kızak", image: "5.jpg" }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let lives = 3;
        let shuffledQuestions = [];

        const introScreen = document.getElementById('intro-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionImg = document.getElementById('question-image');
        const optionsContainer = document.getElementById('options-container');
        const progressBar = document.getElementById('progress-bar');

        function startGame() {
            introScreen.style.display = 'none';
            quizScreen.style.display = 'block';
            shuffledQuestions = [...GAME_DATA].sort(() => Math.random() - 0.5);
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestionIndex >= shuffledQuestions.length) {
                endGame(true);
                return;
            }

            const currentQ = shuffledQuestions[currentQuestionIndex];
            questionImg.src = currentQ.image;
            optionsContainer.innerHTML = '';
            
            // Seçenekleri oluştur (Her zaman tüm sporlar listelenir)
            GAME_DATA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = item.name;
                btn.onclick = () => checkAnswer(item.name, currentQ.name, btn);
                optionsContainer.appendChild(btn);
            });

            progressBar.style.width = `${(currentQuestionIndex / shuffledQuestions.length) * 100}%`;
        }

        function checkAnswer(selected, correct, btn) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.style.pointerEvents = 'none');

            if (selected === correct) {
                btn.classList.add('correct');
                score += 20;
                document.getElementById('score-val').innerText = score;
                setTimeout(() => {
                    currentQuestionIndex++;
                    showQuestion();
                }, 800);
            } else {
                btn.classList.add('wrong');
                document.getElementById('game-container').classList.add('shake');
                lives--;
                document.getElementById('lives-val').innerText = lives;
                
                setTimeout(() => {
                    document.getElementById('game-container').classList.remove('shake');
                    if (lives <= 0) {
                        endGame(false);
                    } else {
                        buttons.forEach(b => {
                            b.style.pointerEvents = 'auto';
                            b.classList.remove('wrong');
                        });
                    }
                }, 800);
            }
        }

        function endGame(isWin) {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const icon = document.getElementById('final-icon');
            
            if (isWin) {
                title.innerText = "Tebrikler!";
                text.innerText = `Tüm sporları başarıyla tanıdın! Toplam Puanın: ${score}`;
                icon.innerHTML = "🏆";
                startFireworks();
            } else {
                title.innerText = "Canın Bitti!";
                text.innerText = "Üzülme, tekrar deneyerek öğrenebilirsin.";
                icon.innerHTML = "🎮";
            }
        }

        /* Havai Fişek Mantığı (Basitleştirilmiş) */
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function startFireworks() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            function animate() {
                ctx.fillStyle = 'rgba(240, 244, 248, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (Math.random() < 0.1) {
                    const x = Math.random() * canvas.width;
                    const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    for (let i = 0; i < 20; i++) {
                        particles.push({
                            x, y: canvas.height, 
                            vx: Math.random() * 4 - 2, 
                            vy: Math.random() * -10 - 5,
                            alpha: 1, color
                        });
                    }
                }
                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.alpha -= 0.01;
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
                    if (p.alpha <= 0) particles.splice(i, 1);
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
