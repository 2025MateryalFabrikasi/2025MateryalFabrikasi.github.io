<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramazan Gelenekleri Oyunu</title>
    <style>
        :root {
            --ana-renk: #0f172a;
            --altin: #fbbf24;
            --yesil: #10b981;
            --beyaz: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--beyaz);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* Sadece dikey kaydırma */
        }

        /* Yönerge Ekranı */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--beyaz);
            color: #1e293b;
            padding: 40px;
            border-radius: 30px;
            max-width: 650px;
            width: 90%;
            text-align: center;
            border: 10px solid var(--altin);
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.4);
        }

        .modal p {
            line-height: 1.8;
            font-size: 1.25rem;
            margin-bottom: 30px;
        }

        .start-btn {
            background: var(--yesil);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        /* Ana Oyun Alanı: Soldan Sağa Yerleşim */
        .game-wrapper {
            display: flex;
            /* Soldan sağa ana yapı */
            flex: 1;
            padding: 20px;
            gap: 30px;
        }

        /* Görseller Alanı (Sol Taraf) */
        .image-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            /* Sığmayınca alta geçer ama soldan sağa dizilir */
            gap: 20px;
            justify-content: flex-start;
            align-content: flex-start;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            width: calc(33.333% - 20px);
            /* Yan yana 3 tane büyük görsel */
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .card img {
            width: 100%;
            height: 250px;
            /* Görselleri devasa yaptık */
            object-fit: contain;
            background: #fff;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .drop-zone {
            width: 100%;
            height: 60px;
            border: 3px dashed var(--altin);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--altin);
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.2);
        }

        /* İsimler Sütunu (Sağ Taraf) */
        .label-column {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            height: fit-content;
            position: sticky;
            /* Kaydırırken ekranla gelir */
            top: 20px;
        }

        .label {
            background: var(--altin);
            color: #000;
            padding: 15px;
            border-radius: 10px;
            cursor: grab;
            font-weight: bold;
            text-align: center;
            font-size: 1rem;
            box-shadow: 0 5px 0 #b45309;
            user-select: none;
        }

        .correct {
            background: var(--yesil) !important;
            color: white;
            border: none;
            box-shadow: none;
        }

        .wrong {
            background: #ef4444 !important;
        }

        @media (max-width: 1100px) {
            .card {
                width: calc(50% - 20px);
            }

            /* Orta ekranlarda 2'li dizim */
        }

        @media (max-width: 750px) {
            .game-wrapper {
                flex-direction: column;
            }

            .card {
                width: 100%;
            }

            .label-column {
                width: 100%;
                position: relative;
                order: -1;
            }
        }
    </style>
</head>

<body>

    <div id="overlay">
        <div class="modal">
            <h2>🌙 Ramazan Gelenekleri</h2>
            <p>Ramazan ayının dinimizde büyük bir önemi ve diğer aylar arasında seçkin bir yeri vardır. Kur’an-ı Kerim
                bu ayda indirilmeye başlanmıştır. Ramazan geleneklerini yansıtan görselleri inceleyiniz ve doğru
                isimlerle eşleştiriniz.</p>
            <button class="start-btn" onclick="startGame()">Başla!</button>
        </div>
    </div>

    <div class="game-wrapper">
        <div class="image-container" id="image-container"></div>

        <div class="label-column" id="label-column"></div>
    </div>

    <script>
        const data = [
            { id: "ramazan_pidesi", text: "Ramazan Pidesi" },
            { id: "hurma", text: "Hurma" },
            { id: "sahur", text: "Sahur" },
            { id: "mahya", text: "Mahya" },
            { id: "ramazan_davulcusu", text: "Ramazan Davulcusu" },
            { id: "kandil_simidi", text: "Kandil Simidi" },
            { id: "gullac", text: "Güllaç" },
            { id: "hacivat_karagoz", text: "Hacivat Karagöz" },
            { id: "iftar_sofrasi", text: "İftar Sofrası" }
        ];

        function speak(txt) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'tr-TR';
            window.speechSynthesis.speak(msg);
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            speak("Haydi başlayalım! İsimleri görsellerin altındaki kutulara sürükle.");
        }

        const container = document.getElementById('image-container');
        const labelCol = document.getElementById('label-column');

        // Görselleri yerleştir
        [...data].sort(() => Math.random() - 0.5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
            <img src="${item.id}.jpg" alt="${item.text}">
            <div class="drop-zone" data-id="${item.id}">İsmi Buraya Bırak</div>
        `;
            container.appendChild(div);
        });

        // İsimleri sağa yerleştir
        [...data].sort(() => Math.random() - 0.5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'label';
            div.draggable = true;
            div.id = `label-${item.id}`;
            div.innerText = item.text;
            div.dataset.id = item.id;

            div.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text', e.target.dataset.id);
            });

            labelCol.appendChild(div);
        });

        // Bırakma işlemi
        container.addEventListener('dragover', (e) => e.preventDefault());
        container.addEventListener('drop', (e) => {
            const zone = e.target.closest('.drop-zone');
            if (!zone) return;

            const draggedId = e.dataTransfer.getData('text');
            const zoneId = zone.dataset.id;
            const targetLabel = document.getElementById(`label-${draggedId}`);

            if (draggedId === zoneId) {
                zone.innerText = targetLabel.innerText;
                zone.classList.add('correct');
                targetLabel.style.visibility = 'hidden';
                speak("Doğru!");
            } else {
                zone.classList.add('wrong');
                speak("Bu olmadı, tekrar dene.");
                setTimeout(() => zone.classList.remove('wrong'), 800);
            }
        });
    </script>

</body>

</html>
