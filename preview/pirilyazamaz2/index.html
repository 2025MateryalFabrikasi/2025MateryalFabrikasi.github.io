
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Süper Sporcu Oyunu 🏆</title>
    <style>
        /* TASARIM AYARLARI */
        body {
            font-family: "Comic Sans MS", cursive;
            background: #87CEEB;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* --- YÖNERGE EKRANI (İSTEDİĞİNİZ İLK TASARIM) --- */
        #intro {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .card {
            background: white; padding: 40px; border-radius: 50px;
            border: 10px solid #f1c40f; text-align: center;
            max-width: 500px; box-shadow: 0 20px 0 rgba(0,0,0,0.2);
        }

        .btn {
            background: #ff7675; color: white; border: none;
            padding: 20px 60px; font-size: 30px; border-radius: 50px;
            cursor: pointer; box-shadow: 0 8px 0 #d63031; font-family: inherit;
        }

        /* --- OYUN ALANI --- */
        #game { display: none; flex-direction: column; height: 100%; padding: 20px; box-sizing: border-box; }

        .stats { font-size: 28px; font-weight: bold; background: white; border-radius: 20px; padding: 10px; display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 5px solid #3498db; }

        .zones { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 45%; }

        .box { background: white; border: 6px dashed #333; border-radius: 30px; display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; text-align: center; }

        .kol { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 10px; }
        .mini { width: 50px; height: 50px; border: 1px solid #ccc; border-radius: 8px; }

        /* MERKEZDEKİ BÜYÜK RESİM */
        .stage { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        
        #item {
            width: 250px; height: 250px; background: white; border: 10px solid #3498db;
            border-radius: 40px; display: flex; justify-content: center; align-items: center;
            cursor: grab; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            font-weight: bold; font-size: 20px;
        }

        #item img { max-width: 90%; max-height: 90%; pointer-events: none; }

        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; display: none; z-index: 10000; text-shadow: 3px 3px 0 #000; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="card">
            <h1 style="color:#6c5ce7; font-size: 40px;">MACERA BAŞLIYOR!</h1>
            <p style="font-size: 22px;">Resimleri yakala ve doğru kutuya sürükle!</p>
            <button class="btn" onclick="start()">OYUNA BAŞLA! 🚀</button>
        </div>
    </div>

    <div id="game">
        <div class="stats">
            <span>PUAN: <span id="score">0</span></span>
            <span>KALAN: <span id="rem">14</span></span>
        </div>

        <div class="zones">
            <div class="box" ondragover="event.preventDefault()" ondrop="drop('h')" style="border-color:#ff4757; color:#ff4757;">
                <h3>Hareketsiz kaldığında nasıl hissedersin? 🐢</h3>
                <div id="kh" class="kol"></div>
            </div>
            <div class="box" ondragover="event.preventDefault()" ondrop="drop('s')" style="border-color:#2ecc71; color:#2ecc71;">
                <h3>Spor yaptığında nasıl hissedersin? 🦁</h3>
                <div id="ks" class="kol"></div>
            </div>
        </div>

        <div class="stage">
            <div id="item" draggable="true" ondragstart="event.dataTransfer.setData('t','1')"></div>
        </div>
    </div>

    <div id="msg"></div>

    <script>
        var p = 0, i = 0, cur = null, list = [];

        // 1-8 Spor (s), 9-14 Hareketsiz (h)
        for(var n=1; n<=8; n++) list.push({id:n, s: n+'.jpg', t:'s'});
        for(var n=9; n<=14; n++) list.push({id:n, s: n+'.jpg', t:'h'});
        list.sort(function(){ return 0.5 - Math.random() });

        function start() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            next();
        }

        function next() {
            if(i < list.length) {
                cur = list[i];
                document.getElementById('rem').innerText = list.length - i;
                var kap = document.getElementById('item');
                kap.style.display = 'flex';
                // Resim yolu hatasına karşı hem resim hem yazı gösteren güvenli yapı
                kap.innerHTML = '<img src="' + cur.s + '" onerror="this.style.display=\'none\'; this.parentNode.innerHTML=\'GÖRSEL ' + cur.id + '\'">';
            } else {
                alert("TEBRİKLER! OYUNU BİTİRDİN! PUANIN: " + p);
                location.reload();
            }
        }

        function drop(target) {
            if(cur.t === target) {
                p += 20;
                document.getElementById('score').innerText = p;
                
                // Kutunun içine küçük resim/numara ekle
                var div = document.createElement('div');
                div.className = 'mini';
                div.style.background = 'white';
                div.style.display = 'flex';
                div.style.alignItems = 'center';
                div.style.justifyContent = 'center';
                div.style.fontSize = '12px';
                div.innerHTML = '<img src="'+cur.s+'" style="width:100%;height:100%" onerror="this.parentNode.innerText=\''+cur.id+'\'">';
                document.getElementById(target === 's' ? 'ks' : 'kh').appendChild(div);

                i++;
                showMsg("HARİKA! 🎉", "#2ecc71");
                document.getElementById('item').style.display = 'none';
                setTimeout(next, 500);
            } else {
                showMsg("TEKRAR DENE! 😮", "#ff4757");
            }
        }

        function showMsg(txt, clr) {
            var m = document.getElementById('msg');
            m.innerText = txt; m.style.color = clr; m.style.display = 'block';
            setTimeout(function(){ m.style.display='none' }, 800);
        }
    </script>
</body>
</html>
