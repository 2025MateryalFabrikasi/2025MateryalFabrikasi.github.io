<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sağlıklı Yaşam Eşleştirme Oyunu</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #0288d1;
            --bg-color: #f1f8e9;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Arka Planda Uçuşan Yiyecekler */
        .bg-element {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .food-drop {
            position: absolute;
            font-size: 2.5rem;
            animation: fall 12s linear infinite;
            opacity: 0.15;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        .container {
            max-width: 900px;
            width: 95%;
            margin: 30px auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .desc {
            color: #555;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        /* Görsel Alanı - Büyütüldü */
        .image-card {
            flex: 1;
            max-width: 350px;
            /* Genişlik artırıldı */
            height: 220px;
            /* Yükseklik artırıldı */
            border: 4px solid #eee;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            transition: transform 0.2s;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Görselin bozulmadan sığmasını sağlar */
        }

        /* Ses Butonu */
        .audio-card {
            flex: 1;
            height: 120px;
            background: var(--secondary-color);
            color: white;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(2, 136, 209, 0.3);
        }

        .selected {
            border-color: var(--secondary-color) !important;
            box-shadow: 0 0 20px rgba(2, 136, 209, 0.5);
            transform: scale(1.02);
        }

        .matched {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(1);
        }

        .btn-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        #success-msg {
            display: none;
            font-size: 2rem;
            color: var(--primary-color);
            margin-top: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>

    <div class="bg-element" id="bgLayer"></div>

    <div class="container">
        <h1>🍎 Sağlıklı Yaşam Eşleştirme</h1>
        <p class="desc">Tanımları dikkatle dinle, görselleri incele. Ardından eşleştir!</p>

        <div class="game-grid">
            <div id="game-rows"></div>
        </div>

        <div id="success-msg">🎇 Harika! Hepsini Başardın! 🎇</div>
    </div>

    <script>
        const count = 6;
        let selectedImg = null;
        let selectedAudio = null;
        let matchedCount = 0;

        // Arka plan animasyonu
        const foods = ['🍏', '🥕', '🍐', '🍓', '🍋', '🥦', '🍉', '🥗'];
        const bgLayer = document.getElementById('bgLayer');
        for (let i = 0; i < 20; i++) {
            const div = document.createElement('div');
            div.className = 'food-drop';
            div.innerText = foods[Math.floor(Math.random() * foods.length)];
            div.style.left = Math.random() * 100 + 'vw';
            div.style.animationDelay = Math.random() * 10 + 's';
            bgLayer.appendChild(div);
        }

        // Karıştırma
        const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
        const imgIds = shuffle(Array.from({ length: count }, (_, i) => i + 1));
        const audioIds = shuffle(Array.from({ length: count }, (_, i) => i + 1));

        const rowsContainer = document.getElementById('game-rows');

        // Satırları oluştur (Görsel ve Ses Yan Yana)
        for (let i = 0; i < count; i++) {
            const row = document.createElement('div');
            row.className = 'row';

            // Görsel Kartı
            const imgCard = document.createElement('div');
            imgCard.className = 'image-card';
            imgCard.dataset.id = imgIds[i];
            imgCard.innerHTML = `<img src="${imgIds[i]}.jpg" alt="Sağlık ${imgIds[i]}">`;
            imgCard.onclick = () => {
                document.querySelectorAll('.image-card').forEach(c => c.classList.remove('selected'));
                imgCard.classList.add('selected');
                selectedImg = imgCard;
                checkMatch();
            };

            // Ses Kartı
            const audCard = document.createElement('button');
            audCard.className = 'audio-card';
            audCard.dataset.id = audioIds[i];
            audCard.innerHTML = `<span class="btn-icon">🔊</span> Tanımı Dinle <audio id="aud-${audioIds[i]}" src="${audioIds[i]}.mp3"></audio>`;
            audCard.onclick = () => {
                document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
                document.getElementById(`aud-${audioIds[i]}`).play();
                document.querySelectorAll('.audio-card').forEach(c => c.classList.remove('selected'));
                audCard.classList.add('selected');
                selectedAudio = audCard;
                checkMatch();
            };

            row.appendChild(imgCard);
            row.appendChild(audCard);
            rowsContainer.appendChild(row);
        }

        function checkMatch() {
            if (selectedImg && selectedAudio) {
                if (selectedImg.dataset.id === selectedAudio.dataset.id) {
                    selectedImg.classList.add('matched');
                    selectedAudio.classList.add('matched');
                    matchedCount++;

                    if (matchedCount === count) {
                        finish();
                    }
                }

                // Seçimi sıfırla (Kısa bir gecikmeyle)
                setTimeout(() => {
                    if (selectedImg) selectedImg.classList.remove('selected');
                    if (selectedAudio) selectedAudio.classList.remove('selected');
                    selectedImg = null;
                    selectedAudio = null;
                }, 500);
            }
        }

        function finish() {
            document.getElementById('success-msg').style.display = 'block';
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#2e7d32', '#81c784', '#0288d1', '#ffeb3b']
            });

            // Sürekli havai fişek etkisi
            let end = Date.now() + (5 * 1000);
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>

</html>
