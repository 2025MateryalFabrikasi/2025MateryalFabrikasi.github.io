<!doctype html>
<html class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minyatür Keşif Oyunu</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Amiri', serif;
    }

    /* Animasyonlu arka plan - Sürekli renk değişimi */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, #1a0f2e, #2d1b4a, #3d2863, #4a2678, #2d1b4a);
      background-size: 500% 500%;
      animation: colorShift 12s ease infinite;
      z-index: -2;
    }

    @keyframes colorShift {
      0% {
        background-position: 0% 50%;
      }

      25% {
        background-position: 100% 50%;
      }

      50% {
        background-position: 100% 100%;
      }

      75% {
        background-position: 0% 100%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Parlayan yıldız efektleri */
    .star-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #ffd700;
      border-radius: 50%;
      animation: twinkle 4s infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }

    .hotspot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.7);
      border: 3px solid #d4af37;
      cursor: pointer;
      position: absolute;
      transform: translate(-50%, -50%);
      animation: pulse 2s infinite;
      transition: transform 0.2s;
    }

    .hotspot:hover {
      transform: translate(-50%, -50%) scale(1.3);
    }

    .hotspot.found {
      background: rgba(34, 197, 94, 0.8);
      border-color: #16a34a;
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6);
      }

      50% {
        box-shadow: 0 0 0 12px rgba(212, 175, 55, 0);
      }
    }

    /* Modal bilgi kutusu */
    .info-modal {
      animation: slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-overlay {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      animation: fadeInOverlay 0.3s ease;
    }

    @keyframes fadeInOverlay {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .overlay-bg {
      background: rgba(30, 20, 10, 0.95);
    }

    /* Havai fişek efektleri */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      animation: confettiFall 3s ease-in forwards;
    }

    @keyframes confettiFall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
  <style>
    body {
      box-sizing: border-box;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full overflow-auto relative">
  <div class="animated-bg"></div>
  <div class="star-field" id="star-field"></div>
  <div id="app" class="h-full w-full flex flex-col items-center justify-center p-4 relative z-10">
    <!-- Video Yönerge Modal -->
    <div id="instructions" class="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
      <div
        class="bg-white/90 backdrop-blur-md p-6 rounded-2xl border-4 border-amber-700 shadow-2xl max-w-2xl w-full flex flex-col items-center">
        <h1 id="title-text" class="text-2xl font-bold text-amber-700 mb-4">🎨 Minyatür Keşif Oyunu</h1>
        <div
          class="w-full max-w-md mb-6 aspect-video bg-black rounded-lg overflow-hidden border-2 border-amber-500 shadow-inner">
          <video id="intro-video" class="w-full h-full object-cover" preload="auto" playsinline controls>
            <source src="1.mp4" type="video/mp4">
            Tarayıcınız video oynatmayı desteklemiyor.
          </video>
        </div>
        <button onclick="startGame()"
          class="bg-gradient-to-r from-amber-700 to-amber-800 hover:from-amber-800 hover:to-amber-900 text-white font-bold text-lg px-8 py-3 rounded-xl transition transform hover:scale-105 shadow-lg">
          ✨ Tamam, Başlayalım!
        </button>
      </div>
    </div>
  </div><!-- Oyun Alanı -->
  <div id="game-area" class="hidden w-full max-w-screen-2xl mx-auto">
    <div class="flex justify-between items-center mb-4 px-2">
      <h2 id="game-title" class="text-2xl font-bold text-amber-200 drop-shadow-lg">🎨 Minyatür Keşif Oyunu</h2><span
        id="score"
        class="bg-gradient-to-r from-amber-600 to-amber-700 text-amber-100 px-4 py-2 rounded-full text-lg font-bold shadow-lg">0
        / 7</span>
    </div>
    <div class="relative inline-block w-full rounded-xl overflow-hidden border-4 border-amber-700 shadow-2xl"><img
        src="1.jpg" alt="Minyatür görseli" class="w-full h-auto block" loading="lazy"
        onerror="console.error('Image failed:', this.src); this.style.background='linear-gradient(135deg,#92400e,#78350f)'; this.alt='Görsel yüklenemedi';">
      <!-- Hotspots -->
      <div class="hotspot" style="top:20%;left:35%;" onclick="showInfo(0)"></div>
      <div class="hotspot" style="top:40%;left:55%;" onclick="showInfo(1)"></div>
      <div class="hotspot" style="top:60%;left:25%;" onclick="showInfo(2)"></div>
      <div class="hotspot" style="top:50%;left:75%;" onclick="showInfo(3)"></div>
      <div class="hotspot" style="top:75%;left:50%;" onclick="showInfo(4)"></div>
      <div class="hotspot" style="top:30%;left:70%;" onclick="showInfo(5)"></div>
      <div class="hotspot" style="top:65%;left:70%;" onclick="showInfo(6)"></div>
    </div>
  </div><!-- Bilgi Modal - Ekranın Üzerinde -->
  <div id="info-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
    <div
      class="info-modal bg-gradient-to-br from-amber-50 to-amber-100 border-4 border-amber-700 rounded-2xl max-w-2xl w-full p-8 shadow-2xl relative">
      <div class="absolute top-4 right-4 text-3xl" id="info-emoji">
        💡
      </div>
      <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 text-5xl" id="point-number">
        1
      </div>
      <h3 id="info-number" class="text-amber-700 font-bold text-sm mb-4 uppercase tracking-wide">Bilgi 1 / 7</h3>
      <audio id="info-audio" controls class="w-full mb-6 rounded-lg border-2 border-amber-700 shadow-md">
        <source id="audio-source" type="audio/mpeg"> Tarayıcınız ses oynatmayı desteklemiyor.
      </audio>
      <p class="text-amber-900 text-center text-lg mb-6 text-opacity-70">🔊 Sesi dinlemek için yukarıdaki oynatıcıyı
        kullanın</p>
      <div class="flex gap-3 justify-end"><button onclick="closeInfo()"
          class="bg-amber-200 hover:bg-amber-300 text-amber-900 font-bold px-6 py-2 rounded-lg transition">←
          Geri</button> <button id="next-btn" onclick="nextInfo()"
          class="bg-gradient-to-r from-amber-700 to-amber-800 hover:from-amber-800 hover:to-amber-900 text-white font-bold px-6 py-2 rounded-lg transition">Sonraki
          →</button>
      </div>
    </div>
  </div><!-- Kazanma Mesajı -->
  <div id="win-msg" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
    <div
      class="info-modal bg-gradient-to-br from-green-50 to-emerald-50 border-4 border-green-600 rounded-2xl max-w-lg w-full p-8 text-center shadow-2xl">
      <p class="text-6xl mb-4">🏆</p>
      <p class="text-3xl font-bold text-green-800 mb-2">Tebrikler!</p>
      <p class="text-xl text-green-700 mb-2">Tüm noktaları buldun ve minyatür sanatını öğrendin!</p>
      <p class="text-2xl font-bold text-green-600 mb-6">Tamamladın! 🎉</p>
      <button onclick="location.reload()"
        class="bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white font-bold px-6 py-3 rounded-lg transition">
        Tekrar Oyna
      </button>
    </div>
  </div>
  <script>
    const infos = [
      { text: "Bilgi 1", audioFile: "1.mp3" },
      { text: "Bilgi 2", audioFile: "2.mp3" },
      { text: "Bilgi 3", audioFile: "3.mp3" },
      { text: "Bilgi 4", audioFile: "4.mp3" },
      { text: "Bilgi 5", audioFile: "5.mp3" },
      { text: "Bilgi 6", audioFile: "6.mp3" },
      { text: "Bilgi 7", audioFile: "7.mp3" }
    ];

    const emojis = ["🎨", "📖", "🖼️", "✨", "👑", "📜", "💎"];

    let found = new Set();
    let currentInfoIndex = -1;

    // Yıldız alanını oluştur
    function createStarField() {
      const starField = document.getElementById('star-field');
      for (let i = 0; i < 40; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 4 + 's';
        star.style.animationDuration = (Math.random() * 3 + 2) + 's';
        starField.appendChild(star);
      }
    }

    function startGame() {
      const video = document.getElementById('intro-video');
      if (video) video.pause();
      document.getElementById('instructions').classList.add('hidden');
      document.getElementById('app').classList.add('hidden'); // Giriş ekranını tamamen gizle
      document.getElementById('game-area').classList.remove('hidden');
      createStarField();
    }

    function showInfo(index) {
      if (found.has(index)) return; // Zaten bulunmışsa tekrar açma

      const hotspots = document.querySelectorAll('.hotspot');
      hotspots[index].classList.add('found');
      found.add(index);
      document.getElementById('score').textContent = found.size + ' / 7';

      currentInfoIndex = index;
      document.getElementById('info-number').textContent = `Bilgi ${index + 1} / 7`;
      document.getElementById('point-number').textContent = emojis[index];

      // Ses dosyasını ayarla ve oynat
      const audioSource = document.getElementById('audio-source');
      audioSource.src = infos[index].audioFile;
      const audio = document.getElementById('info-audio');
      audio.load();
      audio.play();

      // Son bilgi için "Sonraki" butonunu "Bitti" yap
      const nextBtn = document.getElementById('next-btn');
      if (found.size === 7) {
        nextBtn.textContent = 'Tamamla ✓';
        nextBtn.onclick = () => showWinMessage();
      } else {
        nextBtn.textContent = 'Sonraki →';
        nextBtn.onclick = () => nextInfo();
      }

      document.getElementById('info-modal').classList.remove('hidden');
    }

    function closeInfo() {
      document.getElementById('info-modal').classList.add('hidden');
    }

    function nextInfo() {
      closeInfo();
      if (found.size === 7) {
        showWinMessage();
      }
    }

    function showWinMessage() {
      closeInfo();
      document.getElementById('win-msg').classList.remove('hidden');
      launchConfetti();
    }

    // Havai fişek patlatma fonksiyonu
    function launchConfetti() {
      const colors = ['🎉', '🎊', '⭐', '✨', '🌟', '💫', '🎈', '🎁'];
      const confettiCount = 50;

      for (let i = 0; i < confettiCount; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.textContent = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.top = '-10px';
          confetti.style.fontSize = Math.random() * 20 + 20 + 'px';
          confetti.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
          confetti.style.animationDelay = Math.random() * 0.5 + 's';
          document.body.appendChild(confetti);

          setTimeout(() => confetti.remove(), 5000);
        }, i * 30);
      }
    }

    // Element SDK
    const defaultConfig = {
      game_title: 'Minyatür Keşif Oyunu',
      background_color: '#451a03',
      surface_color: '#fffbeb',
      text_color: '#78350f',
      primary_action: '#b45309',
      secondary_action: '#d4af37'
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const title = config.game_title || defaultConfig.game_title;
        document.getElementById('title-text').textContent = '🎨 ' + title;
        document.getElementById('game-title').textContent = '🎨 ' + title;
        document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
        document.querySelectorAll('.bg-amber-50').forEach(el => el.style.backgroundColor = config.surface_color || defaultConfig.surface_color);
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ["game_title", config.game_title || defaultConfig.game_title]
      ])
    });

    lucide.createIcons();
  </script>

</body>

</html>
