<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vücudumuzun Süper Güçleri</title>
    <style>
        :root {
            --ana-mavi: #3498db;
            --arka-plan: #f0f9ff;
            --basari-yesili: #2ecc71;
            --hata-kirmizisi: #ff4757;
            --turuncu: #ff9f43;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--arka-plan);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Yönerge Ekranı */
        #yonerge-ekrani {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            border: 5px solid var(--ana-mavi);
            z-index: 1000;
        }

        .basla-btn {
            background: var(--turuncu);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #e67e22;
            margin-top: 20px;
            font-family: 'Comic Sans MS', cursive;
        }

        /* Oyun Alanı */
        #oyun-alani {
            display: none;
            width: 95%;
            max-width: 1100px;
            padding: 20px;
        }

        .puan-tablosu {
            background: white;
            padding: 10px;
            border-radius: 20px;
            font-size: 1.4rem;
            color: var(--ana-mavi);
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid var(--ana-mavi);
        }

        /* Resim Alanı (2 Sıra) */
        .resim-izgarasi {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .hedef-kutu {
            background: white;
            border: 3px dashed #bdc3c7;
            border-radius: 20px;
            padding: 10px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            transition: all 0.3s;
        }

        .hedef-kutu img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s;
            margin-bottom: 10px;
        }

        .hedef-kutu img:active { transform: scale(2); z-index: 100; }

        .hedef-kutu.ustunde { border-color: var(--ana-mavi); background: #ebf5fb; }
        .hedef-kutu.tamam { border-style: solid; border-color: var(--basari-yesili); background: #fafffa; }

        /* Yerleşen Metin Stili */
        .yerlesen-metin {
            background: var(--ana-mavi);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 11pt;
            text-align: center;
            width: 90%;
            animation: bounceIn 0.5s;
        }

        /* Metin Kartları (Alt Bölüm) */
        .metin-alani {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            min-height: 100px;
        }

        .metin-karti {
            background: var(--ana-mavi);
            color: white;
            padding: 10px;
            border-radius: 10px;
            width: 160px;
            cursor: grab;
            font-size: 11pt; /* 11 Punto */
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none;
        }

        /* Geri Bildirim Mesajı */
        #mesaj {
            position: fixed;
            top: 20px;
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            display: none;
            z-index: 2000;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }

        @media (max-width: 800px) {
            .resim-izgarasi { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div id="yonerge-ekrani">
        <h1>🦸‍♂️ Süper Vücut Görevi!</h1>
        <p>Vücudumuzun içindeki kahramanları tanımaya hazır mısın? Aşağıdaki <b>mavi kartları</b> oku ve doğru resmin üzerine sürükle.</p>
        <p>Eğer doğru eşleştirirsen kartın resmin altına yerleşecek! Resimleri büyütmek için üzerine tıklayıp tutabilirsin.</p>
        <button class="basla-btn" onclick="oyunuBaslat()">MACERAYI BAŞLAT 🚀</button>
    </div>

    <div id="oyun-alani">
        <div class="puan-tablosu">✨ Toplanan Yıldızlar (Puan): <span id="puan-degeri">0</span></div>
        
        <div class="resim-izgarasi" id="hedefler"></div>

        <div class="metin-alani" id="kartlar"></div>
    </div>

    <div id="mesaj"></div>

    <script>
        const veri = [
            { id: "4", resim: "4.jpg", metin: "Kanı vücuda pompalar ve daha güçlü atarım." },
            { id: "5", resim: "5.jpg", metin: "Daha çok içime hava dolar, rahat nefes alırım." },
            { id: "6", resim: "6.jpg", metin: "Çalıştıkça güçlenirim." },
            { id: "3", resim: "3.jpg", metin: "Yediğiniz yemekleri daha kolay sindiririm." },
            { id: "7", resim: "7.jpg", metin: "Daha sağlam ve dayanıklı olurum. Boyunuzu uzatırım." },
            { id: "1", resim: "1.jpg", metin: "Daha hızlı odaklanırım. Öğrenmeni kolaylaştırırım, sana mutluluk veririm." },
            { id: "2", resim: "2.jpg", metin: "Tertemiz, pırıl pırıl olurum. Hem kendimi hem seni güzelleştiririm." }
        ];

        let puan = 0;
        let eslesen = 0;

        function oyunuBaslat() {
            document.getElementById('yonerge-ekrani').style.display = 'none';
            document.getElementById('oyun-alani').style.display = 'block';
            kurulum();
        }

        function kurulum() {
            const hedefKutusu = document.getElementById('hedefler');
            const kartKutusu = document.getElementById('kartlar');

            // Hedefleri karıştır ve oluştur
            [...veri].sort(() => Math.random() - 0.5).forEach(item => {
                hedefKutusu.innerHTML += `
                    <div class="hedef-kutu" data-id="${item.id}" ondrop="birak(event)" ondragover="uzerinde(event)" ondragleave="ayril(event)">
                        <img src="${item.resim}" alt="vücut bölümü">
                        <div class="yerlesim-alani"></div>
                    </div>
                `;
            });

            // Kartları karıştır ve oluştur
            [...veri].sort(() => Math.random() - 0.5).forEach(item => {
                kartKutusu.innerHTML += `
                    <div class="metin-karti" id="kart-${item.id}" draggable="true" ondragstart="surukle(event)" data-id="${item.id}" data-text="${item.metin}">
                        ${item.metin}
                    </div>
                `;
            });
        }

        function surukle(ev) {
            ev.dataTransfer.setData("id", ev.target.id);
        }

        function uzerinde(ev) {
            ev.preventDefault();
            if (!ev.currentTarget.classList.contains('tamam')) {
                ev.currentTarget.classList.add('ustunde');
            }
        }

        function ayril(ev) {
            ev.currentTarget.classList.remove('ustunde');
        }

        function birak(ev) {
            ev.preventDefault();
            const hedef = ev.currentTarget;
            hedef.classList.remove('ustunde');

            if (hedef.classList.contains('tamam')) return;

            const gelenId = ev.dataTransfer.getData("id");
            const kart = document.getElementById(gelenId);
            
            if (kart.getAttribute('data-id') === hedef.getAttribute('data-id')) {
                // DOĞRU
                hedef.classList.add('tamam');
                const metin = kart.getAttribute('data-text');
                
                // Metni resmin altına yerleştir
                hedef.querySelector('.yerlesim-alani').innerHTML = `<div class="yerlesen-metin">${metin}</div>`;
                
                kart.remove(); // Eski kartı listeden sil
                puan += 20;
                eslesen++;
                document.getElementById('puan-degeri').innerText = puan;
                bildirim("Harikasın! Doğru eşleşme ✨", "var(--basari-yesili)");
                
                if(eslesen === veri.length) {
                    setTimeout(() => { alert("TEBRİKLER KAHRAMAN! 🎉 Vücudunu başarıyla keşfettin!"); }, 600);
                }
            } else {
                // YANLIŞ
                bildirim("Opps! Bu bilgi bu resme ait değil. 💪", "var(--hata-kirmizisi)");
            }
        }

        function bildirim(mesaj, renk) {
            const kutu = document.getElementById('mesaj');
            kutu.innerText = mesaj;
            kutu.style.background = renk;
            kutu.style.display = 'block';
            setTimeout(() => { kutu.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
