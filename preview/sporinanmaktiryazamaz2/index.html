<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spor Kavramları Eşleştirme</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --accent: #fdbb2d;
            --success: #2ecc71;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', sans-serif;
            background: #0f2027;
            background: linear-gradient(to right, #2c5364, #203a43, #0f2027);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Arka Plan Emojileri */
        .emoji-bg {
            position: absolute;
            top: -50px;
            font-size: 2rem;
            animation: fall linear infinite;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        /* Yönerge */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            border: 5px solid var(--accent);
        }

        /* Oyun Alanı */
        .main-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 98vw;
            height: 90vh;
            z-index: 10;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            height: 45%;
            /* Sayfanın yarısı görsellere, yarısı seslere */
        }

        .card {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Görsel Kartları */
        .img-card {
            cursor: grab;
            overflow: hidden;
        }

        .img-card:hover {
            transform: scale(1.03);
            border-color: var(--accent);
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Ses Kartları */
        .audio-card {
            cursor: pointer;
            background: var(--accent);
            color: #000;
            font-size: 1.2rem;
            text-align: center;
        }

        .audio-card:hover {
            background: #ffa000;
        }

        .correct {
            background: var(--success) !important;
            border-color: white !important;
            color: white !important;
            pointer-events: none;
        }

        .matched-img {
            opacity: 0.2;
            filter: grayscale(1);
            pointer-events: none;
        }

        button.btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <div class="modal">
            <h1>🏆 EŞLEŞTİRME OYUNU</h1>
            <p>Spordaki önemli kavramlara ait görselleri doğru ses dosyalarıyla eşleştir.Önce sesleri dinle, ardından
                görseli doğru sesin üzerine bırak.</p>
            <button class="btn" onclick="startGame()">BAŞLA</button>
        </div>
    </div>

    <div class="main-container" id="gameArea">
        <div class="row" id="imgRow"></div>
        <div class="row" id="audRow"></div>
    </div>

    <script>
        const ids = [3, 4, 5, 6, 7, 8];
        let score = 0;

        function createEmojis() {
            const icons = ['⚽', '🏀', '🏐', '🎾', '🏆', '🥇', '🏹', '🥊'];
            setInterval(() => {
                const e = document.createElement('div');
                e.className = 'emoji-bg';
                e.innerText = icons[Math.floor(Math.random() * icons.length)];
                e.style.left = Math.random() * 100 + 'vw';
                e.style.animationDuration = (Math.random() * 2 + 4) + 's';
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 5000);
            }, 400);
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            initGame();
        }

        function initGame() {
            const imgRow = document.getElementById('imgRow');
            const audRow = document.getElementById('audRow');

            // Görselleri oluştur (Sıralı)
            ids.forEach(id => {
                const card = document.createElement('div');
                card.className = 'card img-card';
                card.draggable = true;
                card.id = `img-box-${id}`;
                card.innerHTML = `<img src="${id}.jpg">`;
                card.ondragstart = (e) => e.dataTransfer.setData("text", id);
                imgRow.appendChild(card);
            });

            // Sesleri oluştur (Tamamen Rastgele)
            const shuffledAudios = [...ids].sort(() => Math.random() - 0.5);
            shuffledAudios.forEach((id, index) => {
                const card = document.createElement('div');
                card.className = 'card audio-card';
                card.innerHTML = `<span>DİNLE ${index + 1}</span><br><small>🔊</small>`;

                // Tıklayınca ses çal
                card.onclick = () => { new Audio(`${id}.mp3`).play(); };

                // Sürükle bırak mantığı
                card.ondragover = (e) => e.preventDefault();
                card.ondrop = (e) => {
                    const draggedId = e.dataTransfer.getData("text");
                    if (draggedId == id) {
                        card.classList.add('correct');
                        card.innerHTML = "TAMAM! ✅";
                        document.getElementById(`img-box-${draggedId}`).classList.add('matched-img');
                        score++;
                        if (score === ids.length) celebrate();
                    }
                };
                audRow.appendChild(card);
            });
        }

        function celebrate() {
            const end = Date.now() + (4 * 1000);
            const colors = ['#fdbb2d', '#ffffff', '#2ecc71'];

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        createEmojis();
    </script>
</body>

</html>
