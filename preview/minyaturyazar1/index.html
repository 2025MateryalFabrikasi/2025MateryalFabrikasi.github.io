<!doctype html>
<html class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minyatür Keşif Oyunu</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Amiri', serif;
    }

    /* Animasyonlu arka plan */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a0f0a 0%, #2d1b10 25%, #3d2415 50%, #2d1b10 75%, #1a0f0a 100%);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      z-index: -2;
    }

    @keyframes gradientFlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Parlayan yıldız efektleri */
    .star-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #ffd700;
      border-radius: 50%;
      animation: twinkle 4s infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }

    .hotspot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.7);
      border: 3px solid #d4af37;
      cursor: pointer;
      position: absolute;
      transform: translate(-50%, -50%);
      animation: pulse 2s infinite;
      transition: transform 0.2s;
    }

    .hotspot:hover {
      transform: translate(-50%, -50%) scale(1.3);
    }

    .hotspot.found {
      background: rgba(34, 197, 94, 0.8);
      border-color: #16a34a;
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6);
      }

      50% {
        box-shadow: 0 0 0 12px rgba(212, 175, 55, 0);
      }
    }

    /* Modal bilgi kutusu */
    .info-modal {
      animation: slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-overlay {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      animation: fadeInOverlay 0.3s ease;
    }

    @keyframes fadeInOverlay {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .overlay-bg {
      background: rgba(30, 20, 10, 0.95);
    }
  </style>
  <style>
    body {
      box-sizing: border-box;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full overflow-auto relative">
  <div class="animated-bg"></div>
  <div class="star-field" id="star-field"></div>
  <audio id="bg-music" loop src="1.mp3"></audio>
  <div id="app" class="h-full w-full flex flex-col items-center justify-center p-4 relative z-10">
    <!-- Video Yönerge Modal -->
    <div id="instructions" class="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
      <div
        class="bg-gradient-to-br from-amber-50 to-amber-100 border-4 border-amber-700 rounded-2xl max-w-lg w-full p-8 text-center shadow-2xl relative">
        <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 text-4xl">
          🎬
        </div>
        <h1 id="title-text" class="text-3xl font-bold text-amber-900 mb-6 mt-2">Minyatür Keşif Oyunu</h1>
        <video controls class="w-full rounded-lg mb-6 border-2 border-amber-700 shadow-lg" style="max-height: 300px;">
          <source src="1.mp4" type="video/mp4"> Tarayıcınız video oynatmayı desteklemiyor.
        </video><button onclick="startGame()"
          class="bg-gradient-to-r from-amber-700 to-amber-800 hover:from-amber-800 hover:to-amber-900 text-white font-bold text-lg px-8 py-3 rounded-xl transition transform hover:scale-105 shadow-lg">✨
          Tamam, Başlayalım!</button>
      </div>
    </div><!-- Oyun Alanı -->
    <div id="game-area" class="hidden w-full max-w-3xl">
      <div class="flex justify-between items-center mb-4 px-2">
        <h2 id="game-title" class="text-2xl font-bold text-amber-200 drop-shadow-lg">🎨 Minyatür Keşif Oyunu</h2><span
          id="score"
          class="bg-gradient-to-r from-amber-600 to-amber-700 text-amber-100 px-4 py-2 rounded-full text-lg font-bold shadow-lg">0
          / 7</span>
      </div>
      <div class="relative inline-block w-full rounded-xl overflow-hidden border-4 border-amber-700 shadow-2xl">
        <img src="1.jpg" alt="Minyatür görseli" class="w-full h-auto block" loading="lazy"
          onerror="console.error('Image failed:', this.src); this.style.background='linear-gradient(135deg,#92400e,#78350f)'; this.alt='Görsel yüklenemedi';">
        <!-- Hotspots -->
        <div class="hotspot" style="top:20%;left:35%;" onclick="showInfo(0)"></div>
        <div class="hotspot" style="top:40%;left:55%;" onclick="showInfo(1)"></div>
        <div class="hotspot" style="top:60%;left:25%;" onclick="showInfo(2)"></div>
        <div class="hotspot" style="top:50%;left:75%;" onclick="showInfo(3)"></div>
        <div class="hotspot" style="top:75%;left:50%;" onclick="showInfo(4)"></div>
        <div class="hotspot" style="top:30%;left:70%;" onclick="showInfo(5)"></div>
        <div class="hotspot" style="top:65%;left:70%;" onclick="showInfo(6)"></div>
      </div>
    </div><!-- Bilgi Modal - Ekranın Üzerinde -->
    <div id="info-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
      <div
        class="info-modal bg-gradient-to-br from-amber-50 to-amber-100 border-4 border-amber-700 rounded-2xl max-w-2xl w-full p-8 shadow-2xl relative">
        <div class="absolute top-4 right-4 text-3xl" id="info-emoji">
          💡
        </div>
        <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 text-5xl" id="point-number">
          1
        </div>
        <h3 id="info-number" class="text-amber-700 font-bold text-sm mb-2 uppercase tracking-wide">Bilgi 1 / 7</h3>
        <p id="info-text" class="text-amber-900 text-xl leading-relaxed mb-6 min-h-24"></p>
        <div class="flex gap-3 justify-end">
          <button onclick="closeInfo()"
            class="bg-amber-200 hover:bg-amber-300 text-amber-900 font-bold px-6 py-2 rounded-lg transition">←
            Geri</button> <button id="next-btn" onclick="nextInfo()"
            class="bg-gradient-to-r from-amber-700 to-amber-800 hover:from-amber-800 hover:to-amber-900 text-white font-bold px-6 py-2 rounded-lg transition">Sonraki
            →</button>
        </div>
      </div>
    </div><!-- Kazanma Mesajı -->
    <div id="win-msg" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
      <div
        class="info-modal bg-gradient-to-br from-green-50 to-emerald-50 border-4 border-green-600 rounded-2xl max-w-lg w-full p-8 text-center shadow-2xl">
        <p class="text-6xl mb-4">🏆</p>
        <p class="text-3xl font-bold text-green-800 mb-2">Tebrikler!</p>
        <p class="text-xl text-green-700 mb-4">Tüm noktaları buldun ve minyatür sanatını öğrendin!</p><button
          onclick="location.reload()"
          class="bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white font-bold px-6 py-3 rounded-lg transition">Tekrar
          Oyna</button>
      </div>
    </div>
  </div>
  <script>
    const infos = [
      "Minyatür, çok ince işlenmiş, küçük boyutlu, kendine has boyama tekniği olan geleneksel bir resim sanatıdır. Bu sanatı yapan kişilere nakkaş denir.",
      "Minyatürler, kitaplardaki metinleri görselleştirmek amacıyla uygulandığından çok küçük boyutludur.",
      "Minyatürde ışık-gölge, oran-orantı ve perspektif kuralları uygulanmaz. Uzaklık, renkle ya da gölge ile ifade edilmez.",
      "Minyatürde ayrıntı çok fazladır. Ağaçlar, çiçekler, figürler ve iç mekânlar tüm detaylarıyla verilir.",
      "Minyatürde altın ve gümüş sıklıkla kullanılır. Padişahın tahtı altınla renklendirilir, doğada ise gümüş tercih edilir.",
      "Renkler gerçeğe bağlı kalmaz: kayalar pembe, atlar mavi, dağlar eflatun ve sarıya boyanabilir. Kullanılan renkler canlı ve parlaktır.",
      "Geçmişte minyatürler tarihî olayları, seferleri ve kişileri yansıtırdı. Sultan yer alıyorsa içerik ve figürler ön plana çıkarılır, doğa arka planda kalırdı."
    ];

    const emojis = ["🎨", "📖", "🖼️", "✨", "👑", "📜", "💎"];

    let found = new Set();
    let currentInfoIndex = -1;

    // Yıldız alanını oluştur
    function createStarField() {
      const starField = document.getElementById('star-field');
      for (let i = 0; i < 40; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 4 + 's';
        star.style.animationDuration = (Math.random() * 3 + 2) + 's';
        starField.appendChild(star);
      }
    }

    function startGame() {
      document.getElementById('instructions').classList.add('hidden');
      document.getElementById('game-area').classList.remove('hidden');

      const bgMusic = document.getElementById('bg-music');
      if (bgMusic) {
        bgMusic.play().catch(e => console.log("Müzik başlatılamadı:", e));
      }

      createStarField();
    }

    function showInfo(index) {
      if (found.has(index)) return; // Zaten bulunmışsa tekrar açma

      const hotspots = document.querySelectorAll('.hotspot');
      hotspots[index].classList.add('found');
      found.add(index);
      document.getElementById('score').textContent = found.size + ' / 7';

      currentInfoIndex = index;
      document.getElementById('info-number').textContent = `Bilgi ${index + 1} / 7`;
      document.getElementById('point-number').textContent = emojis[index];
      document.getElementById('info-text').textContent = infos[index];

      // Son bilgi için "Sonraki" butonunu "Bitti" yap
      const nextBtn = document.getElementById('next-btn');
      if (found.size === 7) {
        nextBtn.textContent = 'Tamamla ✓';
        nextBtn.onclick = () => showWinMessage();
      } else {
        nextBtn.textContent = 'Sonraki →';
        nextBtn.onclick = () => nextInfo();
      }

      document.getElementById('info-modal').classList.remove('hidden');
    }

    function closeInfo() {
      document.getElementById('info-modal').classList.add('hidden');
    }

    function nextInfo() {
      closeInfo();
      if (found.size === 7) {
        showWinMessage();
      }
    }

    function showWinMessage() {
      closeInfo();
      document.getElementById('win-msg').classList.remove('hidden');
    }

    // Element SDK
    const defaultConfig = {
      game_title: 'Minyatür Keşif Oyunu',
      background_color: '#451a03',
      surface_color: '#fffbeb',
      text_color: '#78350f',
      primary_action: '#b45309',
      secondary_action: '#d4af37'
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const title = config.game_title || defaultConfig.game_title;
        document.getElementById('title-text').textContent = '🎨 ' + title;
        document.getElementById('game-title').textContent = '🎨 ' + title;
        document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
        document.querySelectorAll('.bg-amber-50').forEach(el => el.style.backgroundColor = config.surface_color || defaultConfig.surface_color);
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ["game_title", config.game_title || defaultConfig.game_title]
      ])
    });

    lucide.createIcons();
  </script>

</body>

</html>
