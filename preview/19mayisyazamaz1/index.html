
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Mayıs Balon Patlatma Etkinliği</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* Görselin tam sığması için 100% 100% kullanıldı */
            background-image: url('1.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            font-family: 'Arial', sans-serif;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding-bottom: 100px;
        }

        .balloon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: float 3s ease-in-out infinite;
        }

        .balloon {
            width: 100px;
            height: 130px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            cursor: pointer;
            position: relative;
            box-shadow: inset -10px -10px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .balloon:hover {
            transform: scale(1.1);
        }

        .balloon::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 12px solid inherit;
            filter: brightness(0.8);
        }

        .string {
            width: 2px;
            height: 80px;
            background: rgba(255, 255, 255, 0.7);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Ses Kontrol Paneli Tasarımı */
        #audio-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 200;
            width: 90%;
            max-width: 500px;
            border: 2px solid #ef4444;
        }

        .pop-effect {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, white, transparent);
            border-radius: 50%;
            animation: pop 0.3s ease-out forwards;
            pointer-events: none;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .win-screen {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Üst Başlık -->
    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-white/90 px-6 py-2 rounded-full border-2 border-red-500 shadow-lg text-center pointer-events-none">
        <h1 class="text-xl font-black text-red-600 uppercase">19 Mayıs Balon Patlatma</h1>
        <p id="status-text" class="text-xs font-bold text-gray-500">Önce yönergeyi dinle, sonra balonları patlat!</p>
    </div>

    <!-- Oyun Alanı -->
    <div id="game-container">
        <!-- Balonlar JS ile eklenecek -->
    </div>

    <!-- Ses Kontrol Paneli (1.mp3 Yönerge İçin) -->
    <div id="audio-panel">
        <button id="play-pause-btn" class="text-red-600 hover:text-red-700">
            <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        
        <div class="flex items-center gap-2 text-red-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        </div>

        <input type="range" id="seek-slider" value="0" max="100">
        
        <span id="time-display" class="text-xs font-bold text-gray-600 w-12 text-center">00:00</span>
    </div>

    <!-- Başarı Ekranı -->
    <div id="win-screen" class="win-screen">
        <span class="text-9xl mb-4">🎉</span>
        <h2 class="text-5xl font-black text-red-600 mb-4">TEBRİKLER!</h2>
        <p class="text-2xl text-slate-700 font-bold mb-8">Tüm görevleri tamamladın!</p>
        <button onclick="location.reload()" class="bg-red-600 text-white px-10 py-4 rounded-full text-xl font-black shadow-lg hover:bg-red-700 transition-colors">YENİDEN BAŞLAT</button>
    </div>

    <!-- Ses Elementleri -->
    <audio id="instruction-audio" src="1.mp3" preload="auto"></audio>
    <audio id="effect-audio" preload="auto"></audio>
    <audio id="pop-sound" src="correct.mp3" preload="auto"></audio>

    <script>
        const gameContainer = document.getElementById('game-container');
        const instructionAudio = document.getElementById('instruction-audio');
        const effectAudio = document.getElementById('effect-audio');
        const popSound = document.getElementById('pop-sound');
        const statusText = document.getElementById('status-text');
        const winScreen = document.getElementById('win-screen');

        // Ses Kontrol Paneli Elemanları
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const seekSlider = document.getElementById('seek-slider');
        const timeDisplay = document.getElementById('time-display');

        const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
        const balloonAudios = ['a.mp3', 'b.mp3', 'c.mp3', 'd.mp3', 'e.mp3', 'f.mp3'];
        
        let poppedCount = 0;
        let isEffectPlaying = false;

        // --- Yönerge Ses Kontrol Paneli İşlemleri ---
        playPauseBtn.onclick = () => {
            if (instructionAudio.paused) {
                instructionAudio.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                instructionAudio.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        };

        instructionAudio.ontimeupdate = () => {
            const value = (instructionAudio.currentTime / instructionAudio.duration) * 100;
            seekSlider.value = value || 0;
            
            const mins = Math.floor(instructionAudio.currentTime / 60);
            const secs = Math.floor(instructionAudio.currentTime % 60);
            timeDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        };

        seekSlider.oninput = () => {
            const time = (seekSlider.value / 100) * instructionAudio.duration;
            instructionAudio.currentTime = time;
        };

        instructionAudio.onended = () => {
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            seekSlider.value = 0;
        };

        // --- Oyun İşlemleri ---
        function createBalloon(index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'balloon-wrapper';
            wrapper.style.animationDelay = `${index * 0.5}s`;

            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.backgroundColor = colors[index];
            
            const string = document.createElement('div');
            string.className = 'string';

            balloon.onclick = () => {
                if (isEffectPlaying) return; 
                popBalloon(balloon, index);
            };

            wrapper.appendChild(balloon);
            wrapper.appendChild(string);
            gameContainer.appendChild(wrapper);
        }

        function popBalloon(element, index) {
            // Patlama sesi ve görsel efekti
            popSound.currentTime = 0;
            popSound.play().catch(() => {});

            const rect = element.getBoundingClientRect();
            const effect = document.createElement('div');
            effect.className = 'pop-effect';
            effect.style.left = `${rect.left}px`;
            effect.style.top = `${rect.top}px`;
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 300);

            // Balonu kaldır
            element.parentElement.style.visibility = 'hidden';
            
            // Eşleşen ses dosyasını çal (a.mp3, b.mp3 vb.)
            playEffect(index);
        }

        function playEffect(index) {
            isEffectPlaying = true;
            statusText.innerText = "Bilgi seslendiriliyor...";
            statusText.className = "text-xs font-bold text-blue-600 animate-pulse";

            // Yönerge çalıyorsa duraklat
            instructionAudio.pause();
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');

            effectAudio.src = balloonAudios[index];
            effectAudio.play().catch(e => {
                console.error("Ses hatası:", e);
                onEffectEnded();
            });

            effectAudio.onended = onEffectEnded;
        }

        function onEffectEnded() {
            isEffectPlaying = false;
            poppedCount++;
            statusText.innerText = "Harika! Bir sonraki balonu seç.";
            statusText.className = "text-xs font-bold text-green-600";

            if (poppedCount >= balloonAudios.length) {
                setTimeout(() => {
                    winScreen.style.display = 'flex';
                }, 1000);
            }
        }

        function initGame() {
            gameContainer.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                createBalloon(i);
            }
        }

        window.onload = initGame;
    </script>
</body>
</html>
