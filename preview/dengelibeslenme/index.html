<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dengeli Beslenme Etkinliği</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Ana Kapsayıcı */
        #activity-container {
            position: relative;
            max-width: 900px;
            width: 100%;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        #instruction {
            background: #f1f8e9;
            padding: 15px;
            border-left: 6px solid #43a047;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 16px;
            color: #2e7d32;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        /* Video alanı */
        video {
            width: 100%;
            display: block;
        }

        /* Soru Katmanı - Tam Ekran Uyumlu */
        #question-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1000;
        }

        .question-box {
            padding: 30px;
            max-width: 80%;
        }

        h2 {
            color: #81c784;
            margin-bottom: 20px;
        }

        p#question-text {
            font-size: 1.6rem;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        /* Butonlar */
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-fullscreen {
            background: #388e3c;
            color: white;
            margin-top: 15px;
        }

        .btn-resume {
            background: #ffd600;
            color: #000;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* Tam ekranda beyaz zemin ve ortalama */
        #activity-container:fullscreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
            width: 100vw;
            height: 100vh;
            max-width: none;
        }
    </style>
</head>

<body>

    <div id="activity-container">
        <div id="instruction">
            <strong>Yönerge:</strong> "Dengeli Beslenme" hakkında hazırlanan videoyu dikkatle izleyiniz. Belirlenen
            duraklama noktalarında size sorulacak soruları cevaplayınız.
        </div>

        <div class="video-wrapper">
            <video id="myVideo" controls controlsList="nodownload">
                <source src="dengelibeslenme.mp4" type="video/mp4">
            </video>

            <div id="question-overlay">
                <div class="question-box">

                    <p id="question-text"></p>
                    <button class="btn btn-resume" onclick="resumeVideo()">Cevapladım, Devam Et</button>
                </div>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="btn btn-fullscreen" onclick="toggleFullScreen()">Tam Ekran Modunda Başlat</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('activity-container');
        const video = document.getElementById('myVideo');
        const overlay = document.getElementById('question-overlay');
        const qText = document.getElementById('question-text');

        const pausePoints = [
            { time: 18, question: "Dengeli beslenme nedir?" },
            { time: 34, question: "Sizin için 'ideal bir kahvaltı' hangi lezzetlerden oluşur?" },
            { time: 41, question: "Öğle ve akşam yemeklerinde hangi Türk yemeklerini tercih edersiniz?" },
            { time: 70, question: "Bir gün boyunca yediklerinizi düşünün. Dengeli beslendiğinizi düşünüyor musunuz? Neden?" }
        ];

        let lastPausedTime = -1;

        video.addEventListener('timeupdate', () => {
            let currentTime = Math.floor(video.currentTime);
            let point = pausePoints.find(p => p.time === currentTime);

            if (point && currentTime !== lastPausedTime) {
                video.pause();
                // Video durduğunda süreci görmeye devam etmek için controls açık kalıyor
                qText.innerText = point.question;
                overlay.style.display = 'flex';
                lastPausedTime = currentTime;
            }
        });

        function resumeVideo() {
            overlay.style.display = 'none';
            video.play();
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                container.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>

</html>
