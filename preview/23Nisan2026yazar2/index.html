<!doctype html>
<html lang="tr" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>23 Nisan Balon Patlatma</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&amp;family=Nunito:wght@400;700;900&amp;display=swap"
    rel="stylesheet">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .game-wrapper {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0a1628 0%, #1a2a5e 30%, #2e4a8a 60%, #4a7ab5 85%, #7ec8e3 100%);
      position: relative;
      font-family: 'Baloo 2', cursive;
    }

    .balloon {
      position: absolute;
      bottom: -120px;
      cursor: pointer;
      transition: transform 0.1s;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
      z-index: 10;
    }

    .balloon:hover {
      transform: scale(1.12);
    }

    .balloon:active {
      transform: scale(0.95);
    }

    .balloon svg {
      width: 70px;
      height: 90px;
    }

    @keyframes floatUp {
      0% {
        bottom: -120px;
        opacity: 0;
      }

      5% {
        opacity: 1;
      }

      95% {
        opacity: 1;
      }

      100% {
        bottom: 110%;
        opacity: 0;
      }
    }

    @keyframes pop {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      30% {
        transform: scale(1.6);
        opacity: 0.7;
      }

      100% {
        transform: scale(0);
        opacity: 0;
      }
    }

    .balloon.popping {
      animation: pop 0.35s ease-out forwards !important;
      pointer-events: none;
    }

    .pop-particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 20;
    }

    @keyframes particleBurst {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(var(--dx), var(--dy)) scale(0);
        opacity: 0;
      }
    }

    .quote-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 100;
      pointer-events: none;
      animation: quoteIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes quoteIn {
      0% {
        transform: translate(-50%, -50%) scale(0) rotate(-5deg);
        opacity: 0;
      }

      100% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes quoteOut {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -50%) scale(0.8) translateY(-30px);
        opacity: 0;
      }
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% {
        opacity: 0.2;
        transform: scale(0.8);
      }

      100% {
        opacity: 0.9;
        transform: scale(1.2);
      }
    }

    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 14px;
      z-index: 90;
      pointer-events: none;
    }

    @keyframes confettiFall {
      0% {
        top: -10px;
        opacity: 1;
        transform: rotateZ(0deg) rotateY(0deg);
      }

      100% {
        top: 110%;
        opacity: 0.6;
        transform: rotateZ(720deg) rotateY(360deg);
      }
    }

    .score-pop {
      position: absolute;
      pointer-events: none;
      z-index: 30;
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 28px;
      color: #ffe033;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      animation: scorePop 0.8s ease-out forwards;
    }

    @keyframes scorePop {
      0% {
        transform: translateY(0) scale(0.5);
        opacity: 1;
      }

      100% {
        transform: translateY(-60px) scale(1.2);
        opacity: 0;
      }
    }

    .moon {
      position: absolute;
      top: 6%;
      right: 8%;
      width: 70px;
      height: 70px;
      background: radial-gradient(circle at 35% 35%, #fff8dc, #f0d060);
      border-radius: 50%;
      box-shadow: 0 0 40px 15px rgba(240, 208, 96, 0.3);
      z-index: 1;
    }

    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 50px;
      z-index: 1;
    }
  </style>
  <style>
    body {
      box-sizing: border-box;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full">
  <div class="game-wrapper" id="gameWrapper"><!-- Moon -->
    <div class="moon"></div><!-- Clouds -->
    <div class="cloud" style="width:180px;height:50px;top:15%;left:5%;"></div>
    <div class="cloud" style="width:140px;height:40px;top:25%;left:60%;"></div>
    <div class="cloud" style="width:200px;height:55px;top:40%;left:30%;"></div><!-- Stars container -->
    <div id="starsContainer"></div><!-- Balloons container -->
    <div id="balloonsContainer" style="position:absolute;inset:0;overflow:hidden;"></div><!-- Top bar -->
    <header style="position:absolute;top:0;left:0;right:0;z-index:50;padding:16px 20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <h1 id="gameTitle"
          style="margin:0;font-size:clamp(18px,4vw,28px);font-weight:800;color:#ffe033;text-shadow:0 2px 8px rgba(0,0,0,0.5);letter-spacing:1px;">
          🎈 23 Nisan Balon Patlatma</h1>
        <div style="display:flex;gap:12px;align-items:center;">
          <div
            style="background:rgba(0,0,0,0.35);backdrop-filter:blur(8px);border-radius:16px;padding:6px 16px;display:flex;align-items:center;gap:6px;">
            <span style="font-size:18px;">⭐</span> <span id="scoreDisplay"
              style="font-size:20px;font-weight:800;color:#ffe033;">0</span>
          </div>
          <div
            style="background:rgba(0,0,0,0.35);backdrop-filter:blur(8px);border-radius:16px;padding:6px 16px;display:flex;align-items:center;gap:6px;">
            <span style="font-size:18px;">⏱️</span> <span id="timerDisplay"
              style="font-size:20px;font-weight:700;color:#7ec8e3;">60</span>
          </div><button id="musicToggle" onclick="toggleMusic()"
            style="background:rgba(0,0,0,0.35);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;"
            title="Müzik Aç/Kapat"> 🔊 </button>
        </div>
      </div>
    </header><!-- Start screen -->
    <div id="startScreen"
      style="position:absolute;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;background:rgba(10,22,40,0.85);backdrop-filter:blur(6px);">
      <div style="text-align:center;padding:30px;">
        <div style="font-size:72px;margin-bottom:12px;">
          🎈🎉
        </div>
        <h2
          style="font-family:'Baloo 2',cursive;font-size:clamp(28px,6vw,48px);font-weight:800;color:#ffe033;margin:0 0 8px;text-shadow:0 3px 12px rgba(0,0,0,0.5);">
          23 Nisan Kutlu Olsun!</h2>
        <p
          style="font-family:'Nunito',sans-serif;color:#b0d4f1;font-size:clamp(14px,3vw,18px);margin:0 0 28px;max-width:400px;">
          Balonları patlatarak 23 Nisan hakkında bilgiler öğren ve puan topla!</p><button onclick="startGame()"
          style="font-family:'Baloo 2',cursive;font-size:22px;font-weight:700;padding:14px 48px;border:none;border-radius:50px;background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:white;cursor:pointer;box-shadow:0 6px 24px rgba(238,90,36,0.5);transition:all 0.2s;">
          🎮 Oyuna Başla </button>
      </div>
    </div><!-- End screen -->
    <div id="endScreen"
      style="position:absolute;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(10,22,40,0.88);backdrop-filter:blur(6px);">
      <div style="text-align:center;padding:30px;">
        <div style="font-size:64px;margin-bottom:10px;">
          🏆
        </div>
        <h2
          style="font-family:'Baloo 2',cursive;font-size:clamp(26px,5vw,42px);font-weight:800;color:#ffe033;margin:0 0 6px;">
          Süre Doldu!</h2>
        <p style="font-family:'Nunito',sans-serif;color:#b0d4f1;font-size:18px;margin:0 0 8px;">Toplam Puanın:</p>
        <div id="finalScore"
          style="font-family:'Baloo 2',cursive;font-size:56px;font-weight:800;color:#7ec8e3;margin:0 0 24px;">
          0
        </div><button onclick="restartGame()"
          style="font-family:'Baloo 2',cursive;font-size:20px;font-weight:700;padding:12px 44px;border:none;border-radius:50px;background:linear-gradient(135deg,#6dd5fa,#2980b9);color:white;cursor:pointer;box-shadow:0 6px 24px rgba(41,128,185,0.5);transition:all 0.2s;">
          🔄 Tekrar Oyna </button>
      </div>
    </div><!-- Quote popup container -->
    <div id="quoteContainer"></div><!-- Audio -->
    <audio id="bgMusic" loop preload="auto">
      <source src="1.mp3" type="audio/mpeg">
    </audio>
  </div>
  <script>
    // 23 Nisan quotes and facts
    const quotes = [
      "23 Nisan 1920'de TBMM açılarak millet egemenliği ilan edildi! 🇹🇷",
      "\"Egemenlik kayıtsız şartsız milletindir.\" — Mustafa Kemal Atatürk",
      "23 Nisan, dünyada çocuklara armağan edilen ilk ve tek bayramdır! 🌍",
      "\"Küçük hanımlar, küçük beyler! Sizler hepiniz geleceğin bir gülü, yıldızı ve ikbal ışığısınız.\" — Atatürk ☀️",
      "23 Nisan'da dünya çocukları Türkiye'de buluşur! ",
      "Ulusal Egemenlik demek, milletin kendi kendini yönetmesi demektir! ✊",
      "\"Ey yükselen yeni nesil, gelecek sizindir!\" — Atatürk 🌟",
      "23 Nisan'da çocuklar sembolik olarak devlet yönetimine katılır! 👧👦",
      "Bu bayram, barışın ve kardeşliğin simgesidir!",
      "23 Nisan 1920, Türk tarihinin dönüm noktasıdır! 📜",
      "\"Çocuklar geleceğimizin güvencesi, yaşama sevincimizdir.\" — Atatürk 💖",
      "Milli egemenlik, milletin ortak iradesiyle doğar!",
      "23 Nisan, hem millî bayram hem uluslararası çocuk şölenidir!",
      "Dünya çocukları 23 Nisan'da el ele verir!",
      "\"Milletin istiklâlini yine milletin azim ve kararı kurtaracaktır.\" — Atatürk",
      "23 Nisan ruhu hiç sönmesin ve çocuklar hep gülsün!"
    ];

    const balloonColors = [
      { body: '#ff4757', shine: '#ff6b81', string: '#cc3a47' },
      { body: '#ffa502', shine: '#ffbe33', string: '#cc8402' },
      { body: '#2ed573', shine: '#5af08e', string: '#25aa5c' },
      { body: '#1e90ff', shine: '#54a8ff', string: '#1873cc' },
      { body: '#ff6b81', shine: '#ff8fa0', string: '#cc5567' },
      { body: '#a55eea', shine: '#c17eff', string: '#844bbb' },
      { body: '#ff4081', shine: '#ff6ea1', string: '#cc3367' },
      { body: '#00d2d3', shine: '#33e0e1', string: '#00a8a9' },
      { body: '#ffdd59', shine: '#ffe88a', string: '#ccb147' },
    ];

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let timerInterval = null;
    let balloonInterval = null;
    let quoteIndex = 0;
    let musicPlaying = false;

    const bgMusic = document.getElementById('bgMusic');

    function toggleMusic() {
      const btn = document.getElementById('musicToggle');
      if (musicPlaying) {
        bgMusic.pause();
        btn.textContent = '🔇';
        musicPlaying = false;
      } else {
        bgMusic.play().catch(() => { });
        btn.textContent = '🔊';
        musicPlaying = true;
      }
    }

    // Stars
    function createStars() {
      const c = document.getElementById('starsContainer');
      for (let i = 0; i < 50; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 60 + '%';
        s.style.animationDelay = Math.random() * 3 + 's';
        s.style.width = s.style.height = (Math.random() * 3 + 1) + 'px';
        c.appendChild(s);
      }
    }

    function createBalloonSVG(color) {
      return `<svg viewBox="0 0 70 95" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bg${color.body.slice(1)}" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="${color.shine}"/>
        <stop offset="100%" stop-color="${color.body}"/>
      </radialGradient>
    </defs>
    <ellipse cx="35" cy="38" rx="28" ry="36" fill="url(#bg${color.body.slice(1)})" stroke="${color.string}" stroke-width="0.5"/>
    <ellipse cx="26" cy="26" rx="8" ry="5" fill="rgba(255,255,255,0.3)" transform="rotate(-25 26 26)"/>
    <polygon points="35,74 30,80 40,80" fill="${color.body}"/>
    <line x1="35" y1="80" x2="35" y2="95" stroke="${color.string}" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;
    }

    function spawnBalloon() {
      if (!gameActive) return;
      const container = document.getElementById('balloonsContainer');
      const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
      const b = document.createElement('div');
      b.className = 'balloon';
      b.innerHTML = createBalloonSVG(color);

      const x = Math.random() * (container.offsetWidth - 80) + 10;
      b.style.left = x + 'px';

      const dur = 4 + Math.random() * 4;
      const sway = (Math.random() - 0.5) * 80;
      b.style.animation = `floatUp ${dur}s linear forwards`;

      b.onclick = function (e) {
        if (b.classList.contains('popping')) return;
        b.classList.add('popping');
        score += 10;
        document.getElementById('scoreDisplay').textContent = score;

        // Score pop
        const sp = document.createElement('div');
        sp.className = 'score-pop';
        sp.textContent = '+10';
        sp.style.left = (e.clientX - 20) + 'px';
        sp.style.top = (e.clientY - 20) + 'px';
        sp.style.position = 'fixed';
        document.getElementById('gameWrapper').appendChild(sp);
        setTimeout(() => sp.remove(), 800);

        // Particles
        createParticles(e.clientX, e.clientY, color.body);

        // Quote
        showQuote();

        setTimeout(() => b.remove(), 400);
      };

      container.appendChild(b);
      setTimeout(() => { if (b.parentNode) b.remove(); }, (dur + 0.5) * 1000);
    }

    function createParticles(x, y, color) {
      for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'pop-particle';
        p.style.background = color;
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.position = 'fixed';
        const angle = (i / 8) * Math.PI * 2;
        const dist = 30 + Math.random() * 40;
        p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        p.style.animation = 'particleBurst 0.5s ease-out forwards';
        document.getElementById('gameWrapper').appendChild(p);
        setTimeout(() => p.remove(), 500);
      }
    }

    function showQuote() {
      const q = quotes[quoteIndex % quotes.length];
      quoteIndex++;
      const container = document.getElementById('quoteContainer');

      // Remove old
      const old = container.querySelector('.quote-popup');
      if (old) old.remove();

      const div = document.createElement('div');
      div.className = 'quote-popup';
      div.innerHTML = `
    <div style="background:linear-gradient(135deg,rgba(15,25,60,0.95),rgba(30,50,100,0.95));border:2px solid rgba(255,224,51,0.5);border-radius:20px;padding:20px 28px;max-width:380px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.5);">
      <div style="font-size:28px;margin-bottom:8px;">🇹🇷</div>
      <p style="font-family:'Nunito',sans-serif;color:#e8f0fe;font-size:15px;line-height:1.6;margin:0;">${q}</p>
    </div>
  `;
      container.appendChild(div);

      setTimeout(() => {
        div.style.animation = 'quoteOut 0.4s ease-in forwards';
        setTimeout(() => div.remove(), 400);
      }, 2200);
    }

    function createConfetti() {
      const colors = ['#ff4757', '#ffa502', '#2ed573', '#1e90ff', '#ff6b81', '#a55eea', '#ffe033'];
      for (let i = 0; i < 40; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + '%';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animation = `confettiFall ${2 + Math.random() * 3}s linear ${Math.random() * 2}s forwards`;
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        document.getElementById('gameWrapper').appendChild(c);
        setTimeout(() => c.remove(), 6000);
      }
    }

    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('endScreen').style.display = 'none';
      score = 0;
      timeLeft = 60;
      quoteIndex = 0;
      gameActive = true;
      document.getElementById('scoreDisplay').textContent = '0';
      document.getElementById('timerDisplay').textContent = '60';

      bgMusic.play().then(() => {
        musicPlaying = true;
        document.getElementById('musicToggle').textContent = '🔊';
      }).catch(() => { });

      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);

      balloonInterval = setInterval(spawnBalloon, 800);
      spawnBalloon();
    }

    function endGame() {
      gameActive = false;
      clearInterval(timerInterval);
      clearInterval(balloonInterval);
      document.getElementById('finalScore').textContent = score;
      document.getElementById('endScreen').style.display = 'flex';
      createConfetti();
    }

    function restartGame() {
      // Clear balloons
      document.getElementById('balloonsContainer').innerHTML = '';
      startGame();
    }

    createStars();

    // Element SDK
    const defaultConfig = {
      game_title: '🎈 23 Nisan Balon Patlatma',
      background_color: '#0a1628',
      surface_color: '#1a2a5e',
      text_color: '#e8f0fe',
      primary_action_color: '#ee5a24',
      secondary_action_color: '#ffe033',
      font_family: 'Baloo 2',
      font_size: 16
    };

    function applyConfig(config) {
      const title = config.game_title || defaultConfig.game_title;
      const el = document.getElementById('gameTitle');
      if (el) el.textContent = title;

      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const accent = config.secondary_action_color || defaultConfig.secondary_action_color;
      const font = config.font_family || defaultConfig.font_family;
      const size = config.font_size || defaultConfig.font_size;

      const wrapper = document.getElementById('gameWrapper');
      wrapper.style.background = `linear-gradient(180deg, ${bg} 0%, ${surface} 50%, ${primary}33 100%)`;
      wrapper.style.fontFamily = `${font}, cursive, sans-serif`;

      document.getElementById('scoreDisplay').style.color = accent;
      const titleEl = document.getElementById('gameTitle');
      if (titleEl) {
        titleEl.style.color = accent;
        titleEl.style.fontSize = `${size * 1.6}px`;
      }
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => applyConfig(config),
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } },
          ],
          borderables: [],
          fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
          fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
        }),
        mapToEditPanelValues: (config) => new Map([
          ['game_title', config.game_title || defaultConfig.game_title]
        ])
      });
    }
