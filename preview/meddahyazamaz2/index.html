<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meddah Sesli Eşleştirme Oyunu</title>
    <style>
        /* === CSS AYARLARI === */
        :root {
            --primary-color: #d35400;
            /* Daha canlı bir turuncu */
            --secondary-color: #2980b9;
            /* Belirgin bir mavi */
            --bg-overlay: rgba(255, 253, 240, 0.92);
            /* Açık krem rengi */
            --text-color: #2c3e50;
            /* Koyu metin rengi */
            --box-bg: rgba(255, 255, 255, 0.8);
            --success-color: #27ae60;
            --error-color: #c0392b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: var(--text-color);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('iskemle.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
            z-index: -2;
        }

        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        #game-container {
            width: 98%;
            max-width: 1400px;
            height: 95vh;
            background: var(--box-bg);
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        /* === YÖNERGE EKRANI === */
        #intro-screen {
            position: absolute;
            inset: 0;
            background: rgba(255, 253, 240, 0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        #start-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5em;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.3);
        }

        #start-btn:hover {
            background: #e67e22;
            transform: scale(1.05);
        }

        /* === OYUN ALANI === */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
            position: relative;
        }

        .column {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 10px;
        }

        .column-header {
            width: 100%;
            color: var(--primary-color);
            text-align: center;
            font-weight: bold;
            font-size: 1.4em;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
        }

        /* GÖRSEL KARTLARI */
        .image-card {
            background: var(--card-bg);
            border: 3px solid #ddd;
            border-radius: 20px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .image-card:hover {
            border-color: var(--secondary-color);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .image-card img {
            width: 220px;
            height: 220px;
            object-fit: contain;
            border-radius: 15px;
        }

        .zoom-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 5px;
            border-radius: 50%;
            font-size: 14px;
            opacity: 0;
            transition: 0.3s;
        }

        .image-card:hover .zoom-hint {
            opacity: 1;
        }

        /* SES KARTLARI */
        .audio-card {
            background: var(--card-bg);
            border: 3px solid #ddd;
            border-radius: 20px;
            width: 240px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .audio-card:hover {
            border-color: var(--secondary-color);
            background: #fdfdfd;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .audio-card.playing {
            border-color: var(--secondary-color);
            background: #ebf5fb;
        }

        /* SES DALGASI EFEKTİ */
        .wave-container {
            display: none;
            gap: 3px;
            height: 15px;
            align-items: center;
        }

        .audio-card.playing .wave-container {
            display: flex;
        }

        .wave-bar {
            width: 3px;
            height: 100%;
            background: var(--secondary-color);
            animation: wave 0.5s infinite ease-in-out;
        }

        @keyframes wave {

            0%,
            100% {
                height: 4px;
            }

            50% {
                height: 15px;
            }
        }

        .audio-card span {
            font-weight: 500;
            font-size: 0.9em;
            pointer-events: none;
        }

        .dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .drag-over {
            border-color: var(--secondary-color) !important;
            background: #ebf5fb !important;
            transform: scale(1.05);
        }

        .matched {
            border-color: var(--success-color) !important;
            background: #e8f8f5 !important;
            opacity: 0.7;
            cursor: default !important;
        }

        /* DÖNÜT */
        #feedback-area {
            background: #fff;
            padding: 15px;
            text-align: center;
            font-size: 1.3em;
            border-top: 1px solid #eee;
            font-weight: bold;
        }

        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 5px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* === OKLAR (SVG) === */
        #arrow-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #arrow-canvas line {
            stroke: var(--success-color);
            stroke-width: 4;
            stroke-linecap: round;
            opacity: 0.8;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 0.8s ease-out forwards;
        }

        #arrow-canvas circle {
            fill: var(--success-color);
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Mobil Ayarlar */
        @media (max-width: 768px) {
            .image-card img {
                width: 150px;
                height: 150px;
            }

            .audio-card {
                width: 180px;
            }
        }
    </style>
</head>

<body>

    <div class="game-background"></div>
    <div class="game-overlay"></div>

    <div id="game-container">
        <div id="intro-screen">
            <h1 style="color:var(--primary-color); font-size: 3em; margin-bottom: 10px;">SESLİ MEDDAH OYUNU</h1>
            <p id="instruction-text" style="max-width: 800px; font-size: 1.4em; line-height: 1.6; color: #34495e;">
                Hoş geldin!<br>
                Meddahlık geleneği ile ilgili sesleri dinle. <br>
                <strong>Sesi tutup doğru görselin üzerine sürükle.</strong> <br>
                Görseli büyütmek için üzerine iki kez tıklayabilirsin.
            </p>
            <button id="start-btn">Oyunu Başlat</button>
        </div>

        <div id="game-area">
            <svg id="arrow-canvas"></svg>
            <div class="column-header">ÖNCE SESLERİ DİNLE</div>
            <div class="column" id="audio-col"></div>

            <div class="column-header">SONRA GÖRSELLERLE EŞLEŞTİR</div>
            <div class="column" id="img-col"></div>
        </div>

        <div id="feedback-area">
            <span id="feedback-text">Hazır mısın? Haydi başlayalım!</span>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img src="" id="big-img">
    </div>

    <script>
        const data = [
            { id: 1, name: 'Mendil', img: 'mendil.jpg', audio: 'mendil.mp3' },
            { id: 2, name: 'Sopa', img: 'sopa.jpg', audio: 'sopa.mp3' },
            { id: 3, name: 'İskemle', img: 'iskemle.jpg', audio: 'iskemle.mp3' },
            { id: 4, name: 'Meddah', img: 'meddah.jpg', audio: 'meddah.mp3' },
            { id: 5, name: 'Seyirci', img: 'seyirci.jpg', audio: 'seyirci.mp3' }
        ];

        let selection = { id: null, type: null };
        let matchedCount = 0;
        let currentAudio = null;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        function startGame() {
            window.speechSynthesis.cancel();
            document.getElementById('intro-screen').style.display = 'none';
            render();
        }

        function render() {
            const imgCol = document.getElementById('img-col');
            const audioCol = document.getElementById('audio-col');

            shuffle([...data]).forEach(item => {
                const card = document.createElement('div');
                card.className = 'audio-card';
                card.id = `audio-${item.id}`;
                card.draggable = true;
                card.innerHTML = `
                    <div class="play-btn">▶</div>
                    <div class="wave-container">
                        <div class="wave-bar" style="animation-delay:0.1s"></div>
                        <div class="wave-bar" style="animation-delay:0.2s"></div>
                        <div class="wave-bar" style="animation-delay:0.3s"></div>
                    </div>
                    <span>Sesi Sürükle</span>
                `;
                card.onclick = () => handleAudioClick(item.id, item.audio);
                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', item.id);
                    card.classList.add('dragging');
                });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));
                audioCol.appendChild(card);
            });

            shuffle([...data]).forEach(item => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.id = `img-${item.id}`;
                card.innerHTML = `
                    <img src="${item.img}" draggable="false">
                    <div class="zoom-hint">🔍</div>
                `;
                card.onclick = () => selectImg(item.id);

                // Drop Events
                card.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (!card.classList.contains('matched')) {
                        card.classList.add('drag-over');
                    }
                });
                card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
                card.addEventListener('drop', (e) => {
                    e.preventDefault();
                    card.classList.remove('drag-over');
                    const audioId = parseInt(e.dataTransfer.getData('text/plain'));
                    checkMatch(item.id, audioId);
                });

                imgCol.appendChild(card);
            });
        }

        function showBig(src) {
            document.getElementById('big-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function selectImg(id) {
            const card = document.getElementById(`img-${id}`);
            if (card.classList.contains('matched')) {
                showBig(data.find(d => d.id === id).img);
                return;
            }

            if (selection.id === id && selection.type === 'image') {
                // İkinci tıklama: Büyüt
                showBig(data.find(d => d.id === id).img);
                return;
            }

            if (selection.type === 'audio') {
                checkMatch(id, selection.id);
            } else {
                // Önceki seçimi temizle
                document.querySelectorAll('.image-card').forEach(c => {
                    if (!c.classList.contains('matched')) c.style.borderColor = '#ddd';
                });
                selection = { id: id, type: 'image' };
                card.style.borderColor = 'var(--secondary-color)';
                msg("Görsel seçildi! Şimdi bu sesin sahibi kim olabilir?", "var(--secondary-color)");
            }
        }

        function handleAudioClick(id, file) {
            const card = document.getElementById(`audio-${id}`);
            if (card.classList.contains('matched')) return;

            // Ses çalma mantığı
            if (currentAudio && !currentAudio.paused) {
                currentAudio.pause();
                document.querySelectorAll('.audio-card').forEach(c => c.classList.remove('playing'));
            }

            currentAudio = new Audio(file);
            currentAudio.play();
            card.classList.add('playing');
            currentAudio.onended = () => card.classList.remove('playing');

            if (selection.type === 'image') {
                checkMatch(selection.id, id);
            } else {
                // Önceki ses seçimini temizle (görsel olarak)
                document.querySelectorAll('.audio-card').forEach(c => {
                    if (!c.classList.contains('matched')) c.style.borderColor = '#ddd';
                });

                selection = { id: id, type: 'audio' };
                card.style.borderColor = 'var(--secondary-color)';
                msg("Ses çalınıyor... Bu ses kime ait? Yukarıdan görselini seç!", "var(--text-color)");
            }
        }

        function checkMatch(imgId, audioId) {
            const imgCard = document.getElementById(`img-${imgId}`);
            const audioCard = document.getElementById(`audio-${audioId}`);

            if (imgId === audioId) {
                msg("TEBRİKLER! Doğru eşleşme.", "var(--success-color)");
                imgCard.classList.add('matched');
                audioCard.classList.add('matched');
                imgCard.style.borderColor = 'var(--success-color)';
                audioCard.style.borderColor = 'var(--success-color)';

                // Ok Çiz
                setTimeout(() => drawConnection(imgId, audioId), 100);

                matchedCount++;
                selection = { id: null, type: null };

                if (matchedCount === data.length) {
                    msg("HARİKA! Tüm sesleri başarıyla eşleştirdin.", "var(--success-color)");
                    speak("Harika! Tüm sesleri başarıyla eşleştirdin.");
                }
            } else {
                msg("Maalesef yanlış oldu. Başka bir eşleşme dene!", "var(--error-color)");

                // Hata görsel geri bildirimi
                const selectedImgCard = document.getElementById(`img-${imgId}`);
                const selectedAudioCard = document.getElementById(`audio-${audioId}`);

                if (selectedImgCard) selectedImgCard.style.borderColor = 'var(--error-color)';
                if (selectedAudioCard) selectedAudioCard.style.borderColor = 'var(--error-color)';

                setTimeout(() => {
                    if (!selectedImgCard.classList.contains('matched')) selectedImgCard.style.borderColor = '#ddd';
                    if (!selectedAudioCard.classList.contains('matched')) selectedAudioCard.style.borderColor = '#ddd';
                    selection = { id: null, type: null };
                }, 800);
            }
        }

        const activeConnections = [];

        function drawConnection(imgId, audioId) {
            const imgCard = document.getElementById(`img-${imgId}`);
            const audioCard = document.getElementById(`audio-${audioId}`);
            const svg = document.getElementById('arrow-canvas');
            const container = document.getElementById('game-area');

            const containerRect = container.getBoundingClientRect();
            const imgRect = imgCard.getBoundingClientRect();
            const audioRect = audioCard.getBoundingClientRect();

            // Sesin altı, resmin üstü
            const x1 = audioRect.left + audioRect.width / 2 - containerRect.left;
            const y1 = audioRect.bottom - containerRect.top;
            const x2 = imgRect.left + imgRect.width / 2 - containerRect.left;
            const y2 = imgRect.top - containerRect.top;

            // Çizgi oluştur
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1);
            line.setAttribute("y1", y1);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);

            // Başlangıç ve bitiş noktaları
            const c1 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c1.setAttribute("cx", x1);
            c1.setAttribute("cy", y1);
            c1.setAttribute("r", 5);

            const c2 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c2.setAttribute("cx", x2);
            c2.setAttribute("cy", y2);
            c2.setAttribute("r", 5);

            svg.appendChild(line);
            svg.appendChild(c1);
            svg.appendChild(c2);

            activeConnections.push({ imgId, audioId, line, c1, c2 });
        }

        function updateConnections() {
            const svg = document.getElementById('arrow-canvas');
            const container = document.getElementById('game-area');
            const containerRect = container.getBoundingClientRect();

            activeConnections.forEach(conn => {
                const imgRect = document.getElementById(`img-${conn.imgId}`).getBoundingClientRect();
                const audioRect = document.getElementById(`audio-${conn.audioId}`).getBoundingClientRect();

                const x1 = audioRect.left + audioRect.width / 2 - containerRect.left;
                const y1 = audioRect.bottom - containerRect.top;
                const x2 = imgRect.left + imgRect.width / 2 - containerRect.left;
                const y2 = imgRect.top - containerRect.top;

                conn.line.setAttribute("x1", x1);
                conn.line.setAttribute("y1", y1);
                conn.line.setAttribute("x2", x2);
                conn.line.setAttribute("y2", y2);
                conn.c1.setAttribute("cx", x1);
                conn.c1.setAttribute("cy", y1);
                conn.c2.setAttribute("cx", x2);
                conn.c2.setAttribute("cy", y2);
            });
        }

        window.addEventListener('resize', updateConnections);

        function msg(t, c) {
            const f = document.getElementById('feedback-text');
            f.textContent = t;
            f.style.color = c;
        }

        window.onload = () => {
            const text = document.getElementById('instruction-text').innerText;
            speak(text);
        };

        document.getElementById('start-btn').onclick = startGame;
    </script>
</body>

</html>
