
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ramazan Bilmece Bahçesi</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: "Comic Sans MS", cursive;
            background: #fff; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* YÖNERGE EKRANI */
        #yonerge-ekrani {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        
        .nefes { width: 300px; animation: n 3s infinite ease-in-out; }
        @keyframes n { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .yonerge-baslik {
            color: #6c5ce7; margin: 20px; text-align: center; 
            font-size: 28px; line-height: 1.5;
        }

        .basla-btn {
            background: #ff7675; color: white; border: none; padding: 20px 60px;
            font-size: 30px; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 8px 0 #d63031; transition: 0.1s;
        }

        /* OYUN EKRANI */
        #oyun-ekrani { display: none; width: 100vw; height: 100vh; flex-direction: row; }
        .panel { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        .sol { background: #ffeaa7; border-right: 8px dashed white; }
        .sag { background: #fab1a0; }

        .kutu { width: 350px; height: 350px; display: flex; justify-content: center; align-items: center; }
        .maskot { max-width: 100%; max-height: 100%; object-fit: contain; background: #ffeaa7; }
        
        .ses-btn {
            font-size: 70px; background: white; padding: 10px 40px;
            border-radius: 40px; margin-top: 20px; cursor: pointer;
            box-shadow: 0 8px 0 #e17055; user-select: none;
        }

        .kart { width: 350px; height: 350px; perspective: 1000px; }
        .kart-ic { width: 100%; height: 100%; position: relative; transition: 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .don { transform: rotateY(180deg); }
        .yuz { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 40px; border: 12px solid white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .on { background: #6c5ce7; }
        .arka { background: #fab1a0; transform: rotateY(180deg); }

        .sayac {
            background: white; color: #d63031; padding: 10px 30px;
            border-radius: 30px; font-size: 24px; font-weight: bold; margin-top: 20px;
        }

        .sonraki {
            display: none; background: #00b894; color: white; border: none;
            padding: 15px 40px; border-radius: 40px; margin-top: 15px; cursor: pointer; font-size: 20px;
            box-shadow: 0 5px 0 #006266;
        }

        /* OYUN SONU TEBRİK EKRANI */
        #final-ekrani {
            position: fixed; inset: 0; background: rgba(108, 92, 231, 0.95);
            z-index: 3000; display: none; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            color: white; padding: 20px;
        }

        .final-mesaj { font-size: 40px; margin-bottom: 30px; font-weight: bold; }
        .tekrar-btn {
            background: #55efc4; color: #2d3436; border: none; padding: 15px 40px;
            font-size: 24px; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 0 #00b894;
        }
    </style>
</head>
<body>

    <div id="yonerge-ekrani">
        <img src="11.jpg" class="nefes">
        <div class="yonerge-baslik">
            🌟 <strong>Merhaba Minik Kaşif!</strong> 🌟<br>
            Ramazan bilmecelerini çözmeye hazır mısın?<br>
            Hoparlöre bas, dinle ve kartı çevir!
        </div>
        <button class="basla-btn" onclick="baslat()">HAYDİ BAŞLA! 🚀</button>
    </div>

    <div id="oyun-ekrani">
        <div class="panel sol">
            <div class="kutu"><img src="11.jpg" class="maskot"></div>
            <div class="ses-btn" onclick="sesCal()">🔊</div>
            <p style="color:#e17055; font-weight:bold;">Sesi Dinlemek İçin Tıkla!</p>
        </div>

        <div class="panel sag">
            <div class="kutu">
                <div class="kart" onclick="cevir()">
                    <div id="kart-ic" class="kart-ic">
                        <div class="yuz on"><img src="12.jpg" style="width:70%"></div>
                        <div class="yuz arka">
                            <img id="c-resim" style="max-width:85%; max-height:70%; object-fit:contain;">
                            <div id="c-ad" style="background:#d63031; color:white; padding:5px 15px; border-radius:10px; font-size:24px; margin-top:10px;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="sayac" id="sayac">1 / 10</div>
            <button id="sonraki" class="sonraki" onclick="yeni()">Sıradaki Bilmece ➔</button>
        </div>
    </div>

    <div id="final-ekrani">
        <div class="final-mesaj">🎉 Harikasın, Bilmece Kurdu! 🎉<br>Bütün bilmeceleri çözdün.</div>
        <button class="tekrar-btn" onclick="location.reload()">TEKRAR OYNA 🔄</button>
    </div>

    <audio id="player" preload="auto"></audio>

    <script>
        const data = { 1:"Hurma", 2:"Pide", 3:"İftar", 4:"Sahur", 5:"Teravih", 6:"Fitre", 7:"Mahya", 8:"Oruç", 9:"Ramazan", 10:"Güllaç" };
        let sira = 1;
        const p = document.getElementById('player');

        function baslat() {
            p.src = "11.mp3"; 
            const gecisYap = () => {
                p.pause(); p.ontimeupdate = null;
                document.getElementById('yonerge-ekrani').style.display = 'none';
                document.getElementById('oyun-ekrani').style.display = 'flex';
                yukle();
            };
            p.play().then(() => {
                p.currentTime = 50;
                p.ontimeupdate = () => { if(p.currentTime >= 76) gecisYap(); };
            }).catch(gecisYap);
        }

        function yukle() {
            document.getElementById('kart-ic').classList.remove('don');
            document.getElementById('sonraki').style.display = 'none';
            document.getElementById('c-resim').src = sira + ".jpg";
            document.getElementById('c-ad').innerText = data[sira];
            document.getElementById('sayac').innerText = sira + " / 10";
            p.src = sira + ".mp3"; p.currentTime = 0;
        }

        function sesCal() { p.play(); }
        function cevir() { 
            if(!document.getElementById('kart-ic').classList.contains('don')){
                document.getElementById('kart-ic').classList.add('don'); 
                document.getElementById('sonraki').style.display = 'block';
            }
        }

        function yeni() {
            if (sira < 10) { 
                sira++; yukle(); 
            } else { 
                oyunuBitir();
            }
        }

        function oyunuBitir() {
            // Konfeti fırlat
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 4000 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
            }, 250);

            // Tebrik ekranını göster
            document.getElementById('final-ekrani').style.display = 'flex';
        }
    </script>
</body>
</html>
