<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Mayıs Meşalesi - Cümle Bulma</title>
    <style>
        :root {
            --primary-red: #e30a17;
            --white: #ffffff;
            --accent-yellow: #ffce00;
            --dark: #2d3436;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('1.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        #game-container {
            width: 95%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(5px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 45px var(--shadow);
            text-align: center;
            position: relative;
            z-index: 10;
            display: none;
            border: 3px solid var(--primary-red);
        }

        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-red), #b90812);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            padding: 30px;
            text-align: center;
        }

        #intro-overlay h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
        }

        #intro-overlay p {
            font-size: 1.4rem;
            max-width: 700px;
            line-height: 1.8;
            margin-bottom: 35px;
            background: rgba(0, 0, 0, 0.1);
            padding: 20px;
            border-radius: 15px;
        }

        .btn {
            padding: 18px 50px;
            font-size: 1.6rem;
            background: var(--accent-yellow);
            border: none;
            border-radius: 50px;
            color: var(--dark);
            cursor: pointer;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.1) translateY(-3px);
            background: #fff;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        #header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px 25px;
            background: var(--white);
            border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        #lives-display {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary-red);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #visuals {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            min-height: 80px;
        }

        .balloon {
            width: 45px;
            height: 55px;
            background: var(--primary-red);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: relative;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation: float 4s ease-in-out infinite;
            box-shadow: inset -5px -5px 10px rgba(0, 0, 0, 0.1);
        }

        .balloon::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            width: 10px;
            height: 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 8px solid currentColor;
        }

        .balloon.popped {
            transform: scale(0) rotate(180deg);
            opacity: 0;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(5deg);
            }
        }

        #word-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 30px 0;
            min-height: 120px;
        }

        .word {
            display: flex;
            gap: 8px;
            margin: 15px 25px;
            justify-content: center;
        }

        .letter-box {
            width: 40px;
            height: 55px;
            border-bottom: 4px solid var(--primary-red);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--dark);
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .letter-box.space {
            border: none;
            width: 30px;
        }

        .letter-box.punctuation {
            border: none;
            color: var(--primary-red);
        }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
            gap: 10px;
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.03);
            padding: 20px;
            border-radius: 15px;
        }

        .key {
            padding: 12px;
            font-size: 1.3rem;
            background: var(--white);
            border: 2px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            transition: 0.2s;
            box-shadow: 0 3px 0 #ccc;
        }

        .key:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .key.correct {
            background: #4caf50;
            color: white;
            border-color: #388e3c;
            box-shadow: 0 3px 0 #2e7d32;
        }

        .key.wrong {
            background: #f44336;
            color: white;
            border-color: #d32f2f;
            box-shadow: 0 3px 0 #c62828;
        }

        .key:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        #result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #result-modal h2 {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            z-index: 300;
            animation: confetti-fall linear forwards;
            pointer-events: none;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .letter-box {
                width: 22px;
                height: 35px;
                font-size: 1.2rem;
                border-bottom-width: 3px;
            }

            .word {
                gap: 4px;
                margin: 8px 15px;
            }

            .key {
                font-size: 1rem;
                padding: 8px;
            }

            #intro-overlay h1 {
                font-size: 2.2rem;
            }

            #result-modal h2 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>

    <div id="intro-overlay">
        <h1>🇹🇷 19 MAYIS COŞKUSU</h1>
        <p>
            Gizli cümleyi bulmak için harfleri tahmin et. Tam <strong>10 adet</strong> renkli balonun var. Her yanlış
            tahmininde bir balon patlar. Dikkatli ol, tüm balonlar sönmeden meşaleyi yak!
        </p>
        <button class="btn" onclick="startGame()">OYUNA BAŞLA</button>
    </div>

    <div id="game-container">
        <div id="header-info">
            <div id="lives-display">🎈 Kalan Balon: <span id="lives-count">10</span></div>
            <div style="font-weight: 800; color: #666; letter-spacing: 1px;"></div>
        </div>

        <div id="visuals">
            <!-- Balonlar JS ile yüklenecek -->
        </div>

        <div id="word-display">
            <!-- Kelimeler JS ile yüklenecek -->
        </div>

        <div id="keyboard">
            <!-- Tuşlar JS ile yüklenecek -->
        </div>
    </div>

    <div id="result-modal">
        <h2 id="result-title">HARİKA! 🎉</h2>
        <p id="result-msg" style="font-size: 1.8rem; margin-bottom: 30px;">Cümleyi başarıyla tamamladın!</p>
        <button class="btn" onclick="location.reload()">TEKRAR OYNA</button>
    </div>

    <script>
        const sentence = "19 Mayıs, bağımsızlık meşalesinin yakıldığı gündür. Kutlu olsun.";
        const alphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
        let lives = 10;
        let guessedLetters = [];

        const introOverlay = document.getElementById('intro-overlay');
        const gameContainer = document.getElementById('game-container');
        const visualsDiv = document.getElementById('visuals');
        const wordDisplay = document.getElementById('word-display');
        const keyboard = document.getElementById('keyboard');
        const livesCountSpan = document.getElementById('lives-count');
        const resultModal = document.getElementById('result-modal');
        const resultTitle = document.getElementById('result-title');
        const resultMsg = document.getElementById('result-msg');

        function startGame() {
            introOverlay.style.display = 'none';
            gameContainer.style.display = 'block';
            initGame();
        }

        function initGame() {
            // Balonları oluştur
            visualsDiv.innerHTML = '';
            const balloonColors = ['#e30a17', '#ffce00', '#2196f3', '#4caf50', '#9c27b0', '#ff9800', '#00bcd4', '#e91e63'];
            for (let i = 0; i < 10; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.id = `balloon-${i}`;
                const color = balloonColors[i % balloonColors.length];
                balloon.style.backgroundColor = color;
                balloon.style.color = color; // For the pseudo-element triangle
                balloon.style.animationDelay = (i * 0.25) + 's';
                visualsDiv.appendChild(balloon);
            }

            // Klavyeyi oluştur
            keyboard.innerHTML = '';
            [...alphabet].forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.textContent = char;
                btn.onclick = () => handleGuess(char, btn);
                keyboard.appendChild(btn);
            });

            renderWord();
        }

        function renderWord() {
            wordDisplay.innerHTML = '';
            let isWon = true;
            const punctuations = [',', '.', '!', '?', '-', ';'];

            // Cümleyi kelimelere böl (boşluklara göre)
            const words = sentence.split(' ');

            words.forEach((wordText, wordIndex) => {
                const wordDiv = document.createElement('div');
                wordDiv.className = 'word';

                [...wordText].forEach(char => {
                    const box = document.createElement('div');
                    const upperChar = char.toLocaleUpperCase('tr-TR');

                    if (punctuations.includes(char) || !isNaN(char)) {
                        box.className = 'letter-box punctuation';
                        box.textContent = char;
                    } else {
                        box.className = 'letter-box';
                        if (guessedLetters.includes(upperChar)) {
                            box.textContent = char;
                        } else {
                            box.textContent = '';
                            isWon = false;
                        }
                    }
                    wordDiv.appendChild(box);
                });

                wordDisplay.appendChild(wordDiv);
            });

            if (isWon) {
                setTimeout(() => showResult(true), 500);
            }
        }

        function handleGuess(letter, btn) {
            btn.disabled = true;
            const upperLetter = letter.toLocaleUpperCase('tr-TR');
            const upperSentence = sentence.toLocaleUpperCase('tr-TR');

            if (upperSentence.includes(upperLetter)) {
                guessedLetters.push(upperLetter);
                btn.classList.add('correct');
                renderWord();
            } else {
                lives--;
                btn.classList.add('wrong');
                updateLives();
            }
        }

        function updateLives() {
            livesCountSpan.textContent = lives;

            // Balon patlatma efekti
            const balloonToPop = document.getElementById(`balloon-${lives}`);
            if (balloonToPop) {
                balloonToPop.classList.add('popped');
            }

            if (lives <= 0) {
                setTimeout(() => showResult(false), 500);
            }
        }

        function showResult(isWin) {
            resultModal.style.display = 'flex';
            if (isWin) {
                resultTitle.textContent = "TEBRİKLER! 🇹🇷";
                resultMsg.innerHTML = `Cümleyi başarıyla buldun:<br><br>"${sentence}"`;
                // Yoğun konfeti yağmuru
                for (let i = 0; i < 8; i++) {
                    setTimeout(createConfettiStorm, i * 400);
                }
            } else {
                resultTitle.textContent = "BALONLAR BİTTİ! 🎈";
                resultTitle.style.color = "#ff5252";
                resultMsg.innerHTML = `Pes etme, tekrar dene!<br><br>Doğru Cümle:<br><small>${sentence}</small>`;
            }
        }

        function createConfettiStorm() {
            const colors = ['#e30a17', '#ffffff', '#ffce00', '#2196f3', '#4caf50', '#ff9800'];
            for (let i = 0; i < 60; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                const duration = 2 + Math.random() * 3;
                conf.style.animationDuration = duration + 's';
                conf.style.animationDelay = Math.random() * 0.5 + 's';

                // Rastgele şekiller (kare/daire)
                if (Math.random() > 0.5) conf.style.borderRadius = '50%';

                document.body.appendChild(conf);

                // Temizlik
                setTimeout(() => conf.remove(), duration * 1000);
            }
        }
    </script>
</body>

</html>
