
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hacivat ve Karagöz ile Ramazan Macerası</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            background-color: #fce7bc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 90%;
            max-width: 800px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 20px;
            text-align: center;
            border: 8px solid #e67e22;
            position: relative;
        }

        /* YÖNERGE EKRANI - HAREKETLİ VE RENKLİ */
        .header-title {
            color: #d35400;
            font-size: 32px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn-start {
            background-color: #27ae60;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px #1e8449;
            transition: 0.2s;
        }

        #video-area { display: none; width: 100%; }
        video { width: 100%; border-radius: 15px; background-color: #000; }

        /* OYUN ALANI */
        #quiz-area { display: none; }
        .puan-tablosu {
            background: #f1c40f;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .main-img { width: 250px; border-radius: 15px; margin-bottom: 10px; }

        .soru-metni {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 30px;
            min-height: 80px;
        }

        .cevap-kutulari { display: flex; justify-content: center; gap: 40px; }
        .kutular {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            cursor: pointer;
            border: 5px solid transparent;
            color: white;
        }
        .btn-yesil { background-color: #2ecc71; border-color: #27ae60; }
        .btn-kirmizi { background-color: #e74c3c; border-color: #c0392b; }

        /* FİNAL */
        #final-area { display: none; }
        .kandil { font-size: 50px; filter: grayscale(1); transition: 1.5s; display: inline-block; margin: 0 10px; }
        .kandil-on { filter: grayscale(0) drop-shadow(0 0 15px gold); }
        #feedback { font-size: 22px; margin-top: 20px; font-weight: bold; }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; display: none; z-index: 100; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="game-container">
    <div id="intro-area">
        <h1 class="header-title">🌟 Merhaba Arkadaşım! 🌟</h1>
        <img src="1.jpg" width="250" style="margin: 20px;">
        <p style="font-size: 20px;">Hacivat ve Karagöz ile Ramazan neşesine katılmaya hazır mısın?<br>Önce videomuzu izleyelim!</p>
        <button class="btn-start" onclick="baslatVideo()">BAŞLA! 🎬</button>
    </div>

    <div id="video-area">
        <video id="hacivatVideo" controls>
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <div id="quiz-area">
        <div class="puan-tablosu">Puan: <span id="puan">0</span></div><br>
        <img src="2.jpg" class="main-img">
        <div class="soru-metni" id="soru-metni"></div>
        <div class="cevap-kutulari">
            <div class="kutular btn-yesil" onclick="cevapKontrol(true)">✔</div>
            <div class="kutular btn-kirmizi" onclick="cevapKontrol(false)">✖</div>
        </div>
        <div id="feedback"></div>
    </div>

    <div id="final-area">
        <div class="kandil-container">
            <span class="kandil">🪔</span><span class="kandil">🪔</span><span class="kandil">🪔</span>
        </div>
        <h1 style="color: #d35400; font-size: 40px;">TEBRİK EDERİM! 🎉</h1>
        <p style="font-size: 28px;">Paylaşmak güzeldir.</p>
        <button class="btn-start" onclick="location.reload()">TEKRAR OYNA 🔄</button>
    </div>
</div>

<script>
    let puan = 0;
    let mevcutSoruIndex = 0;
    const vid = document.getElementById('hacivatVideo');

    // Düzeltilmiş Sorular
    const sorular = [
        { metin: "1. Paylaşmak komşu pidesinin susamlı kısmının tadına bakmaktır.", cevap: false },
        { metin: "2. Ramazan'da paylaşmak çok önemlidir.", cevap: true },
        { metin: "3. Kapımızı çalanlar borç ister, diye açmamalıyız.", cevap: false },
        { metin: "4. Sevap kebaptır.", cevap: false },
        { metin: "5. Ramazan sabırdır, şükürdür, paylaşmaktır.", cevap: true },
        { metin: "6. Ramazan'da sabretmek iftarda üç kişilik yemek yemektir.", cevap: false },
        { metin: "7. Ramazan'da yardımlaşmak bizi mutlu eder.", cevap: true },
        { metin: "8. Ramazan'ın bereketi paylaşmakla olur.", cevap: true },
        { metin: "9. Ramazan pidesi sıcaktır ama paylaşınca kalpleri ısıtır.", cevap: true },
        { metin: "10. İftar vaktini beklemek sabretmeyi öğretir.", cevap: true }
    ];

    function baslatVideo() {
        document.getElementById('intro-area').style.display = 'none';
        document.getElementById('video-area').style.display = 'block';
        vid.play();
    }

    vid.ontimeupdate = function() {
        if (vid.currentTime >= 195) { // 3:15 dakikada dur
            vid.pause();
            oyunuBaslat();
        }
    };

    function oyunuBaslat() {
        document.getElementById('video-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        soruGoster();
    }

    function soruGoster() {
        if (mevcutSoruIndex < sorular.length) {
            document.getElementById('soru-metni').innerText = sorular[mevcutSoruIndex].metin;
            document.getElementById('feedback').innerText = "";
        } else {
            oyunBitir();
        }
    }

    function cevapKontrol(secim) {
        const dogruCevap = sorular[mevcutSoruIndex].cevap;
        const feedback = document.getElementById('feedback');
        if (secim === dogruCevap) {
            puan += 10;
            feedback.style.color = "#27ae60";
            feedback.innerText = "🌟 Aferin! Doğru cevap.";
        } else {
            puan = Math.max(0, puan - 5);
            feedback.style.color = "#e74c3c";
            feedback.innerText = "😮 Yanlış oldu, tekrar düşün!";
        }
        document.getElementById('puan').innerText = puan;
        mevcutSoruIndex++;
        setTimeout(soruGoster, 1200);
    }

    function oyunBitir() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('final-area').style.display = 'block';
        document.getElementById('canvas').style.display = 'block';
        const kandiller = document.querySelectorAll('.kandil');
        kandiller.forEach((k, i) => { setTimeout(() => k.classList.add('kandil-on'), i * 500); });
        konfetiPatlat();
    }

    function konfetiPatlat() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                r: Math.random() * 6 + 4,
                d: Math.random() * 10,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                tilt: Math.random() * 10 - 10
            });
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p) => {
                ctx.beginPath(); ctx.lineWidth = p.r; ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                ctx.stroke();
                p.y += Math.cos(p.d) + 3;
                p.tilt = Math.sin(p.d) * 15;
                if (p.y > canvas.height) p.y = -10;
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
