
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Neşeli Gökyüzü Korosu</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Comic Sans MS', cursive; background: #87CEEB; }
        #game-container { width: 100vw; height: 100vh; background-image: url('1.jpg'); background-size: cover; position: relative; display: none; }
        #bg-extra { position: absolute; width: 380px; height: auto; right: 0; bottom: 0; z-index: 5; pointer-events: none; mix-blend-mode: multiply; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #6dd5ed 0%, #2193b0 100%); display: flex; justify-content: center; align-items: center; z-index: 200; text-align: center; }
        .modal { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 40px; border: 10px solid #ffcc00; max-width: 600px; }
        .btn { padding: 15px 50px; font-size: 26px; background: #2ecc71; border: none; border-radius: 50px; cursor: pointer; color: white; font-weight: bold; margin-top: 25px; transition: 0.2s; }
        #video-wrapper { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 500px; height: 281px; z-index: 100; border: 8px solid #ff9f43; border-radius: 20px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #custom-controls { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; padding: 5px 10px; z-index: 101; }
        #progress-container { flex-grow: 1; height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin: 0 10px; cursor: pointer; }
        #progress-bar { width: 0%; height: 100%; background: #2ecc71; border-radius: 4px; }
        #video-time { color: white; font-size: 11px; font-family: monospace; }
        
        .cloud { position: absolute; width: 280px; height: 150px; background-image: url('3.jpg'); background-size: 100% 100%; display: flex; justify-content: center; align-items: center; text-align: center; padding: 10px 40px; box-sizing: border-box; font-size: 12pt; font-weight: bold; color: #2c3e50; z-index: 150; mix-blend-mode: multiply; transition: none; }
        #uclak { position: absolute; width: 180px; z-index: 160; mix-blend-mode: multiply; pointer-events: none; }
        #score-board { position: absolute; top: 25px; left: 25px; background: #fff; padding: 10px 30px; border-radius: 40px; font-size: 28px; font-weight: bold; border: 5px solid #ff9f43; z-index: 170; }
        .feedback { position: absolute; font-size: 60px; z-index: 180; animation: feedbackAnim 0.6s forwards; }
        @keyframes feedbackAnim { 0% { opacity: 1; transform: scale(0.5); } 100% { opacity: 0; transform: translateY(-50px) scale(1.2); } }
    </style>
</head>
<body>

<div id="intro-screen" class="overlay">
    <div class="modal">
        <h2>🎵 Neşeli Gökyüzü Korosu 🎵</h2>
        <p>Merhaba Küçük Pilot! <br><br><b>Şarkıyı dinle, senin için belirlediğim doğru kelimeleri topla!</b></p>
        <button class="btn" onclick="startGame()">UÇUŞA GEÇ! ✈️</button>
    </div>
</div>

<div id="finish-screen" class="overlay" style="display:none;">
    <div class="modal">
        <h2>🌟 Tebrikler Pilot! 🌟</h2>
        <p id="final-score-text" style="font-size: 32px; color: #2ecc71;"></p>
        <button class="btn" onclick="location.reload()">TEKRAR OYNA 🔄</button>
    </div>
</div>

<div id="game-container">
    <img src="4.jpg" id="bg-extra">
    <div id="score-board">Puan: 0</div>
    <div id="video-wrapper">
        <video id="myVideo" preload="auto"><source src="1.mp4" type="video/mp4"></video>
        <div id="custom-controls">
            <div id="video-time">00:00 / 03:19</div>
            <div id="progress-container" onclick="seekVideo(event)"><div id="progress-bar"></div></div>
        </div>
    </div>
    <img src="2.jpg" id="uclak" alt="Uçak">
</div>

<script>
    const plane = document.getElementById('uclak');
    const video = document.getElementById('myVideo');
    const progressBar = document.getElementById('progress-bar');
    const videoTimeText = document.getElementById('video-time');
    
    let score = 0; 
    let spawnedKeys = new Set(); 
    let gameActive = false;
    let cloudQueue = []; 
    let lastCloudSpawnTime = 0;

    const syncCorrectWords = [
        { time: 20, t: "bizim sokakta şenlik var" }, { time: 24, t: "adam oluvermiş çocuklar" },
        { time: 33, t: "geçmiş olsun" }, { time: 36, t: "kınalar yakalım elimize" }, 
        { time: 139, t: "kınalar yakalım elimize" }, { time: 43, t: "sahip olalım dilimize" }, 
        { time: 141, t: "sahip olalım dilimize" }, { time: 50, t: "müsaadenizle çocuklar" }, 
        { time: 150, t: "müsaadenizle çocuklar" }, { time: 56, t: "iş başa düştü çocuklar" }, 
        { time: 155, t: "iş başa düştü çocuklar" }, { time: 67, t: "inceldiği yerden kopsun" },
        { time: 75, t: "değerler oldu tepetaklak" }, { time: 79, t: "el salla" }, 
        { time: 97, t: "el salla" }, { time: 160, t: "el salla" }, { time: 84, t: "kol salla" }, 
        { time: 101, t: "kol salla" }, { time: 164, t: "kol salla" }, { time: 90, t: "sağ gösterip sol salla" }, 
        { time: 109, t: "sağ gösterip sol salla" }, { time: 171, t: "sağ gösterip sol salla" },
        { time: 94, t: "bir omuz at sağdan solla" }, { time: 112, t: "bir omuz at sağdan solla" }, 
        { time: 176, t: "bir omuz at sağdan solla" }, { time: 119, t: "tepeden tırnağa zarafet" },
        { time: 131, t: "hayır mı şer mi" }, { time: 133, t: "sabrın sonu selamet" }
    ];

    const wrongWords = ["bal böceği", "afiyet olsun", "düğün", "sararıp soldum", "kim çözecek"];

    function startGame() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        gameActive = true; video.play(); update();
        setInterval(() => { 
            if(gameActive && !video.paused && video.currentTime >= 20) {
                cloudQueue.push({ text: wrongWords[Math.floor(Math.random()*wrongWords.length)], isCorrect: false });
            }
        }, 5000); 
    }

    function update() {
        if(!gameActive) return;
        let ct = video.currentTime;
        if (ct >= 199) { 
            gameActive = false; video.pause();
            document.getElementById('final-score-text').innerText = "Toplam Puanın: " + score;
            document.getElementById('finish-screen').style.display = 'flex';
            return; 
        }
        progressBar.style.width = (ct / 199 * 100) + "%";
        videoTimeText.innerText = (Math.floor(ct/60)).toString().padStart(2,'0') + ":" + (Math.floor(ct%60)).toString().padStart(2,'0') + " / 03:19";
        
        if (!video.paused) {
            syncCorrectWords.forEach((word, i) => {
                if (Math.abs(ct - word.time) < 0.25 && !spawnedKeys.has("w"+i)) {
                    spawnedKeys.add("w"+i); 
                    cloudQueue.push({ text: word.t, isCorrect: true });
                }
            });

            let now = Date.now();
            if (cloudQueue.length > 0 && now - lastCloudSpawnTime > 2500) {
                let nextCloud = cloudQueue.shift();
                createCloudElement(nextCloud.text, nextCloud.isCorrect);
                lastCloudSpawnTime = now;
            }
        }
        requestAnimationFrame(update);
    }

    function createCloudElement(text, isCorrect) {
        const cloud = document.createElement('div');
        cloud.className = 'cloud'; cloud.innerText = text;
        cloud.style.top = (window.innerHeight - 250) + 'px';
        cloud.style.right = '-350px';
        document.getElementById('game-container').appendChild(cloud);

        let curRight = -350;
        let moveInt = setInterval(() => {
            if (video.paused) return;
            curRight += 4;
            cloud.style.right = curRight + 'px';
            if (isColliding(plane, cloud)) {
                showFeedback(isCorrect);
                score += isCorrect ? 10 : -5;
                document.getElementById('score-board').innerText = "Puan: " + score;
                cloud.remove(); clearInterval(moveInt);
            }
            if (curRight > window.innerWidth + 400) { 
                cloud.remove(); clearInterval(moveInt); 
            }
        }, 20);
    }

    function showFeedback(isCorrect) {
        const f = document.createElement('div'); f.className = 'feedback';
        f.innerText = isCorrect ? '✔️' : '❌';
        const rect = plane.getBoundingClientRect();
        f.style.left = (rect.left + 50) + 'px';
        f.style.top = (rect.top - 20) + 'px';
        document.getElementById('game-container').appendChild(f);
        setTimeout(() => f.remove(), 600);
    }

    function isColliding(a, b) {
        let aR = a.getBoundingClientRect(); let bR = b.getBoundingClientRect();
        return !(aR.top > bR.bottom || aR.bottom < bR.top || aR.right < bR.left || aR.left > bR.right);
    }

    function seekVideo(e) {
        const rect = document.getElementById('progress-container').getBoundingClientRect();
        video.currentTime = ((e.clientX - rect.left) / rect.width) * 199;
        spawnedKeys.clear(); 
        cloudQueue = [];
        document.querySelectorAll('.cloud').forEach(c => c.remove());
    }

    document.addEventListener('mousemove', (e) => {
        if(gameActive) { 
            plane.style.top = (e.clientY - 90) + 'px'; 
            plane.style.left = (e.clientX - 90) + 'px'; 
        }
    });
</script>
</body>
</html>
