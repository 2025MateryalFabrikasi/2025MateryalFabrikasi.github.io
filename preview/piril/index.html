
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pırıl ile Neşeli Spor Macerası!</title>
    <style>
        :root {
            --ana-renk: #FF6B6B;
            --yesil: #4CAF50;
            --mavi: #2196F3;
            --sari: #FFD93D;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', sans-serif;
            background-color: #FFF9E3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 20px 0px #FFD93D;
            text-align: center;
            border: 6px solid var(--ana-renk);
        }

        #intro-screen { display: block; }

        .icon-row {
            display: flex;
            justify-content: center; gap: 20px;
            margin: 20px 0; font-size: 3rem;
        }

        .instruction-card {
            background: #F0FFF0;
            border-radius: 20px;
            padding: 20px;
            border: 3px dashed var(--yesil);
            margin-bottom: 25px;
        }

        video {
            width: 100%;
            border-radius: 20px;
            display: none; /* Başlangıçta gizli */
            border: 4px solid #333;
            background-color: #000;
        }

        #question-overlay {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            width: 85%;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            z-index: 100;
            border: 5px solid var(--mavi);
        }

        .btn-play {
            background: var(--yesil);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #2E7D32;
        }

        .opt-btn {
            display: block; width: 100%;
            background: #F8F9FA;
            border: 3px solid var(--mavi);
            padding: 15px; margin: 10px 0;
            border-radius: 15px; font-size: 1.2rem;
            cursor: pointer; font-weight: bold;
        }

        #error-log {
            display: none;
            color: #d32f2f;
            background: #ffcdd2;
            padding: 10px;
            margin-top: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="intro-screen">
        <h1>🏃‍♂️ PIRIL İLE SPOR ZAMANI! 🤸‍♀️</h1>
        <div class="icon-row"><span>⚽</span><span>🏀</span><span>🎾</span><span>🤸</span></div>
        <div class="instruction-card">
            <p><strong>Merhaba Küçük Şampiyon!</strong></p>
            <p>Pırıl bugün evde çok eğlenceli hareketler yapıyor. Senin görevin onu dikkatle izlemek! </p>
            <p>Önce Pırıl'ı dinle, sonra karşına çıkan soruları cevapla.</p>
        </div>
        <button class="btn-play" id="startBtn" onclick="startGame()">HAYDİ BAŞLA! 🚀</button>
        <div id="error-log"></div>
    </div>

    <video id="pirilVideo" preload="auto" playsinline>
        <source src="piril.mp4" type="video/mp4">
        Tarayıcın bu videoyu desteklemiyor.
    </video>

    <div id="question-overlay">
        <h2 style="color:var(--mavi)">🤔 ŞİMDİ SIRA SENDE!</h2>
        <p id="q-text" style="font-size: 1.3rem; font-weight: bold;"></p>
        <div id="q-options"></div>
        <div id="feedback-box" style="font-size:1.5rem; font-weight:bold; margin-top:10px;"></div>
    </div>
</div>

<script>
    const video = document.getElementById('pirilVideo');
    const intro = document.getElementById('intro-screen');
    const overlay = document.getElementById('question-overlay');
    const errorLog = document.getElementById('error-log');

    const START_POINT = 220; // 03:40
    const END_POINT = 597;   // 09:57

    const questions = [
        { time: START_POINT + 22, q: "1. Sağlığımız için şart olan nedir?", opts: ["a) Bilgisayarda oyun oynamak", "b) Egzersiz yapmak", "c) Sürekli uyumak"], correct: 1 },
        { time: START_POINT + 50, q: "2. Pırıl egzersiz yapmadan önce yaptığı hareketlerin adı nedir?", opts: ["a) Zıplama", "b) Isınma", "c) Üşüme"], correct: 1 },
        { time: START_POINT + 104, q: "3. Pırıl sehpanın etrafında kaç tur atmış?", opts: ["a) Üç", "b) Dört", "c) Beş"], correct: 2 },
        { time: START_POINT + 240, q: "4. Egzersiz yapmak neden önemlidir?", opts: ["a) Sağlığımızı koruruz.", "b) Daha güçlü ve enerjik oluruz.", "c) Hepsi"], correct: 2 },
        { time: START_POINT + 334, q: "5. Tek ayak üzerinde durarak ne yapmış oluruz?", opts: ["a) Dengemizi sağlarız.", "b) Daha iyi sek sek oynarız.", "c) Daha iyi zıplarız."], correct: 0 },
        { time: START_POINT + 375, q: "6. Pırıl’a göre sağlığımızın anahtarı nedir?", opts: ["a) Bol bol yemek yemek", "b) Spor yapmak", "c) Ders çalışmak"], correct: 1 }
    ];

    let currentQ = 0;

    // Hata ayıklama: Video yüklenemezse haber ver
    video.onerror = function() {
        errorLog.style.display = "block";
        errorLog.innerHTML = "❌ HATA: 'piril.mp4' dosyası bulunamadı! Lütfen video dosyasının adını ve konumunu kontrol et.";
    };

    function startGame() {
        // Videoyu görünür yap ve başlatmayı dene
        video.style.display = "block";
        video.currentTime = START_POINT;
        
        const playPromise = video.play();

        if (playPromise !== undefined) {
            playPromise.then(_ => {
                intro.style.display = 'none';
                console.log("Video başarıyla başladı.");
            }).catch(error => {
                errorLog.style.display = "block";
                errorLog.innerHTML = "❌ Oynatma engellendi: " + error.message;
                video.style.display = "none";
            });
        }
    }

    video.ontimeupdate = () => {
        if (video.currentTime >= END_POINT) {
            video.pause();
            finishGame();
        }
        if (currentQ < questions.length && video.currentTime >= questions[currentQ].time) {
            askQuestion();
        }
    };

    function askQuestion() {
        video.pause();
        const data = questions[currentQ];
        document.getElementById('q-text').innerText = data.q;
        const optsDiv = document.getElementById('q-options');
        optsDiv.innerHTML = '';
        document.getElementById('feedback-box').innerText = '';

        data.opts.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            optsDiv.appendChild(btn);
        });
        overlay.style.display = 'block';
    }

    function checkAnswer(idx) {
        const data = questions[currentQ];
        const fb = document.getElementById('feedback-box');
        if (idx === data.correct) {
            fb.style.color = "green";
            fb.innerText = "✅ Harikasın! Doğru!";
            setTimeout(() => {
                overlay.style.display = 'none';
                currentQ++;
                video.play();
            }, 2000);
        } else {
            fb.style.color = "red";
            fb.innerText = "❌ Tekrar dene bakalım! 😊";
        }
    }

    function finishGame() {
        video.style.display = 'none';
        intro.style.display = 'block';
        intro.innerHTML = `<h1>🏆 MUHTEŞEMSİN!</h1><p>Pırıl ile tüm soruları bildin!</p><button class="btn-play" onclick="location.reload()">TEKRAR OYNA</button>`;
    }
</script>
</body>
</html>
