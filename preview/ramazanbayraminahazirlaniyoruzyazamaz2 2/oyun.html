<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Bayram Sıralama Oyunu</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fffde7 0%, #fff9c4 100%);
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            color: #d35400;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .instruction {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #5d4037;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
            font-weight: 500;
        }

        /* Daha pratik ve küçük görseller için grid/flex layout */
        .game-container {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            gap: 15px;
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
            perspective: 1000px;
            overflow-x: auto;
        }

        .card {
            flex: 0 0 auto;
            width: 150px;
            cursor: grab;
            border: 4px solid #f1c40f;
            border-radius: 20px;
            overflow: hidden;
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            position: relative;
            user-select: none;
        }

        .card.dragging {
            opacity: 0.5;
            transform: scale(0.9);
            cursor: grabbing;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            pointer-events: none;
            /* Let the card handle clicks for zoom */
        }

        /* Lightbox Styles */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            backdrop-filter: blur(5px);
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .lightbox.show {
            display: flex;
        }

        .lightbox.show img {
            transform: scale(1);
        }

        .card:hover:not(.dragging) {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            border-color: #e67e22;
        }

        .btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 35px;
            font-size: 1.2em;
            font-weight: bold;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .btn:hover {
            background: #d35400;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(211, 84, 0, 0.4);
        }

        #message {
            font-size: 1.5em;
            font-weight: bold;
            margin: 30px 0;
            min-height: 40px;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>

    <h1> Bayram Sıralama Oyunu </h1>
    <p class="instruction">Ekranda bayram günüyle ilgili resimler var. Ama resimlerin sırası karışmış! Dikkatle bak.
        Bayram sabahından başlayarak resimleri doğru sıraya koy.</p>
    <p style="font-size: 0.9em; color: #7f8c8d; margin-top: -20px;">(Resimleri büyütmek için üzerlerine tıklayabilirsin.
        Sıralamak için sürükleyip bırakabilirsin.)</p>

    <div class="game-container" id="gameBoard">
        <div class="card" draggable="true" id="card3"><img src="3.jpg"></div>
        <div class="card" draggable="true" id="card1"><img src="1.jpg"></div>
        <div class="card" draggable="true" id="card6"><img src="6.jpg"></div>
        <div class="card" draggable="true" id="card2"><img src="2.jpg"></div>
        <div class="card" draggable="true" id="card4"><img src="4.jpg"></div>
        <div class="card" draggable="true" id="card5"><img src="5.jpg"></div>
    </div>

    <div id="message"></div>
    <button class="btn" onclick="checkGame()">Sıralamayı Kontrol Et!</button>

    <!-- Lightbox for Image Zoom -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="" alt="Büyütülmüş Resim">
    </div>

    <script>
        const board = document.getElementById('gameBoard');
        let draggedItem = null;

        board.addEventListener('dragstart', e => {
            draggedItem = e.target.closest('.card');
            setTimeout(() => draggedItem.classList.add('dragging'), 0);
        });

        board.addEventListener('dragend', e => {
            draggedItem.classList.remove('dragging');
        });

        board.addEventListener('dragover', e => {
            e.preventDefault();
            const target = e.target.closest('.card');
            if (target && target !== draggedItem) {
                const rect = target.getBoundingClientRect();
                const next = (e.clientX - rect.left) > (rect.width / 2);
                if (next) {
                    target.after(draggedItem);
                } else {
                    target.before(draggedItem);
                }
            }
        });

        function checkGame() {
            const currentOrder = Array.from(board.querySelectorAll('.card')).map(c => c.id);
            const correctOrder = ['card1', 'card2', 'card3', 'card4', 'card5', 'card6'];
            const msg = document.getElementById('message');

            if (JSON.stringify(currentOrder) === JSON.stringify(correctOrder)) {
                msg.style.color = "#27ae60";
                msg.innerText = "Tebrikler! Bayramın tüm adımlarını doğru sıraladın! 🎉";
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#f1c40f', '#e67e22', '#d35400']
                });
            } else {
                msg.style.color = "#c0392b";
                msg.innerText = "Henüz doğru değil... Resimleri dikkatlice incele ve tekrar sırala.";

                // Hata efekti
                msg.classList.add('shake');
                setTimeout(() => msg.classList.remove('shake'), 500);
            }
        }

        // Image Zoom Functionality
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                // Only zoom if not dragging
                if (card.classList.contains('dragging')) return;

                const imgSrc = card.querySelector('img').src;
                openLightbox(imgSrc);
            });
        });

        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = src;
            lightbox.classList.add('show');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('show');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>

</html>
