<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkü Kültürü ve Oyun</title>
    <style>
        :root {
            --cream: #fdfaf5;
            --white: #ffffff;
            --soft-gray: #f4f1ea;
            --accent-red: #d63031; /* Görseldeki nota kırmızısı */
            --text-dark: #2d3436;
            --correct-green: #27ae60;
        }

        body {
            font-family: 'Georgia', serif; /* Daha edebi bir hava için */
            background-color: var(--cream);
            background-image: url('1.jpg'); /* Arka plan görseli */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* Arka planı yumuşatan katman */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(253, 250, 245, 0.85);
            z-index: 1;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 900px;
            padding: 20px;
        }

        /* --- Giriş Ekranı (Tanım) --- */
        #intro-screen {
            background: var(--white);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border-top: 5px solid var(--accent-red);
            text-align: center;
        }

        .intro-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .intro-header h1 {
            font-size: 2.5rem;
            color: var(--text-dark);
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 10px;
        }

        .definition-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #444;
            text-align: left;
            margin: 20px 0;
        }

        .start-btn {
            background-color: var(--accent-red);
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        /* --- Oyun Ekranı --- */
        #game-screen { display: none; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        .audio-btn {
            background: var(--soft-gray);
            border: 2px solid #ddd;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .choice-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: var(--white);
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .choice-btn:hover:not(:disabled) {
            background: var(--soft-gray);
            border-color: var(--accent-red);
        }

        /* Bilgi Kutusu (Dönüt) */
        #info-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            display: none;
            z-index: 1000;
        }

        #info-box h2 { margin-top: 0; }
        .close-info {
            background: var(--text-dark);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
        }

        /* Emoji Uçuşu */
        .emoji {
            position: fixed;
            font-size: 2rem;
            z-index: 999;
            pointer-events: none;
            animation: floatUp 3s forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-500px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="content-wrapper">
    <div id="intro-screen">
        <div class="intro-header">
            <span style="font-size: 4rem; color: var(--accent-red);">∮</span>
            <h1>Türkü Nedir?</h1>
        </div>
        <div class="definition-text">
            <p>• Türk halkının geleneklerini, yaşamını ve duygularını anlatan müzik formuna <b>"türkü"</b> denir.</p>
            <p>• Türk halk müziğinde yer alan bu eserlerin genellikle sözü ve müziğinin kime ait olduğu bilinmemektedir <b>(anonim)</b>.</p>
        </div>
        <button class="start-btn" onclick="startGame()">Tamam, Oyuna Geçelim!</button>
    </div>

    <div id="game-screen">
        <h2 style="text-align:center; color: var(--text-dark); margin-bottom: 30px;">Kulağına Güven: Bu Bir Türkü mü?</h2>
        <div class="game-grid" id="gameGrid"></div>
    </div>
</div>

<div id="info-box">
    <div id="feedback-icon" style="font-size: 3rem; margin-bottom: 10px;"></div>
    <h2 id="feedback-title"></h2>
    <p id="cultural-info" style="font-style: italic; color: #555; line-height: 1.5;"></p>
    <button class="close-info" onclick="closeInfo()">Devam Et</button>
</div>

<script>
    const items = [
        { file: 'turku1.mp3', type: 'turku' },
        { file: 'sarki1.mp3', type: 'sarki' },
        { file: 'turku2.mp3', type: 'turku' },
        { file: 'sarki2.mp3', type: 'sarki' }
    ];

    const culturalFacts = [
        "Türküler, Anadolu'nun tarihsel hafızasıdır; her biri bir yaşanmışlığı anlatır.",
        "Bağlama (saz), Türk halk müziğinin temel çalgısıdır ve 'türkülerin dert ortağı' sayılır.",
        "Türküler genellikle iki bölümden oluşur: Asıl sözlerin olduğu 'bent' ve nakarat olan 'kavuştak'.",
        "Ağıtlar, ninniler ve bozlaklar; türkü kültürümüzün en derin duygusal türleridir.",
        "Türküler dilden dile aktarılarak günümüze gelmiştir, bu yüzden çoğu anonimdir.",
        "Yörelerine göre türkülerin ağız yapıları ve ritimleri farklılık gösterir."
    ];

    let activeAudio = null;

    function startGame() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        initBoard();
    }

    function initBoard() {
        const grid = document.getElementById('gameGrid');
        items.sort(() => Math.random() - 0.5).forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="audio-btn" onclick="toggleAudio('${item.file}', this)">▶</button>
                <div class="choices">
                    <button class="choice-btn" onclick="check('${item.type}', 'turku', this)">Bu bir türküdür</button>
                    <button class="choice-btn" onclick="check('${item.type}', 'degil', this)">Bu bir türkü değildir</button>
                </div>
                <audio id="audio-${idx}" src="${item.file}"></audio>
            `;
            grid.appendChild(card);
        });
    }

    function toggleAudio(file, btn) {
        const audios = document.querySelectorAll('audio');
        const clickedAudio = Array.from(audios).find(a => a.src.includes(file));

        if (activeAudio && activeAudio !== clickedAudio) {
            activeAudio.pause();
            activeAudio.currentTime = 0;
            document.querySelectorAll('.audio-btn').forEach(b => b.innerText = '▶');
        }

        if (clickedAudio.paused) {
            clickedAudio.play();
            btn.innerText = '⏸';
            activeAudio = clickedAudio;
        } else {
            clickedAudio.pause();
            btn.innerText = '▶';
            activeAudio = null;
        }
    }

    function check(actual, selected, btn) {
        const infoBox = document.getElementById('info-box');
        const isCorrect = (actual === 'turku' && selected === 'turku') || (actual === 'sarki' && selected === 'degil');
        
        if (activeAudio) activeAudio.pause();

        document.getElementById('feedback-icon').innerText = isCorrect ? "✅" : "❌";
        document.getElementById('feedback-title').innerText = isCorrect ? "Harika, Bildin!" : "Yanlış Cevap";
        document.getElementById('feedback-title').style.color = isCorrect ? "var(--correct-green)" : "var(--accent-red)";
        
        // Rastgele bilgi seç
        const randomFact = culturalFacts[Math.floor(Math.random() * culturalFacts.length)];
        document.getElementById('cultural-info').innerText = "Biliyor muydunuz? \n\n" + randomFact;

        infoBox.style.display = 'block';
        if (isCorrect) createEmojis();
        
        // Kartı kilitle
        const card = btn.closest('.card');
        card.style.opacity = '0.6';
        card.querySelectorAll('button').forEach(b => b.disabled = true);
    }

    function closeInfo() {
        document.getElementById('info-box').style.display = 'none';
    }

    function createEmojis() {
        const emojis = ['🎻', '🌾', '🎶', '🇹🇷', '🎸', '✨'];
        for (let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.className = 'emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = '100vh';
            el.style.animationDelay = Math.random() * 0.5 + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
    }
</script>

</body>
</html>
