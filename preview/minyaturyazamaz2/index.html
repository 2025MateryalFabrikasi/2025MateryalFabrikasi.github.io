<!doctype html>
<html lang="tr" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&amp;family=Amiri:wght@400;700&amp;display=swap"
    rel="stylesheet">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: auto;
    }

    /* Turkish miniature inspired background */
    .miniature-bg {
      background: linear-gradient(135deg, #1a0a2e 0%, #0d1b3e 30%, #1a2744 50%, #2d1b4e 80%, #1a0a2e 100%);
      position: relative;
    }

    .miniature-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(218, 165, 32, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(180, 40, 40, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(30, 80, 160, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Ornamental border pattern */
    .ornate-border {
      border: 3px solid transparent;
      border-image: linear-gradient(135deg, #daa520, #c0392b, #1e50a0, #2ecc71, #daa520) 1;
      box-shadow: 0 0 20px rgba(218, 165, 32, 0.15), inset 0 0 20px rgba(218, 165, 32, 0.05);
    }

    /* Floating geometric patterns */
    @keyframes floatPattern {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.15;
      }

      50% {
        transform: translateY(-20px) rotate(180deg);
        opacity: 0.25;
      }
    }

    .pattern-float {
      animation: floatPattern 8s ease-in-out infinite;
    }

    /* Texture overlay for parchment effect */
    .parchment-texture {
      position: fixed;
      inset: 0;
      opacity: 0.05;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      z-index: 1;
    }

    /* Piece tray refinements */
    .piece-tray {
      background: rgba(13, 27, 62, 0.6);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(218, 165, 32, 0.4);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      scrollbar-width: thin;
      scrollbar-color: #daa520 transparent;
    }

    .piece-tray::-webkit-scrollbar {
      width: 4px;
    }

    .piece-tray::-webkit-scrollbar-thumb {
      background: #daa520;
      border-radius: 10px;
    }

    /* Puzzle piece styles */
    .puzzle-piece {
      cursor: grab;
      transition: transform 0.2s, box-shadow 0.2s;
      user-select: none;
      touch-action: none;
    }

    .puzzle-piece:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 25px rgba(218, 165, 32, 0.4);
    }

    .puzzle-piece.dragging {
      cursor: grabbing;
      transform: scale(1.12);
      box-shadow: 0 12px 35px rgba(218, 165, 32, 0.6);
      z-index: 100;
      opacity: 0.85;
    }

    .puzzle-slot {
      transition: background 0.3s, box-shadow 0.3s;
    }

    .puzzle-slot.highlight {
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.6);
      background: rgba(46, 204, 113, 0.15);
    }

    .puzzle-slot.filled {
      background: none;
    }

    /* Firework styles */
    @keyframes firework-rise {
      0% {
        transform: translateY(100%) scale(0);
        opacity: 1;
      }

      50% {
        opacity: 1;
      }

      100% {
        transform: translateY(-50%) scale(1);
        opacity: 0;
      }
    }

    @keyframes firework-burst {
      0% {
        transform: scale(0);
        opacity: 1;
      }

      100% {
        transform: scale(3);
        opacity: 0;
      }
    }

    @keyframes sparkle {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    .firework-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: sparkle 1.2s ease-out forwards;
    }

    /* Confetti */
    @keyframes confettiFall {
      0% {
        transform: translateY(-10px) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(500px) rotate(720deg);
        opacity: 0;
      }
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confettiFall 3s ease-in forwards;
    }

    /* Star burst */
    @keyframes starPulse {

      0%,
      100% {
        transform: scale(1) rotate(0deg);
      }

      50% {
        transform: scale(1.3) rotate(180deg);
      }
    }

    /* Video screen */
    .video-screen {
      background: radial-gradient(circle, #1a2744 0%, #0d1b3e 100%);
      border: 4px solid;
      border-image: linear-gradient(135deg, #daa520, #c0392b, #1e50a0, #daa520) 1;
    }

    /* Button glow */
    @keyframes btnGlow {

      0%,
      100% {
        box-shadow: 0 0 10px rgba(218, 165, 32, 0.3);
      }

      50% {
        box-shadow: 0 0 25px rgba(218, 165, 32, 0.6), 0 0 50px rgba(218, 165, 32, 0.2);
      }
    }

    .btn-glow {
      animation: btnGlow 2s ease-in-out infinite;
    }

    /* Title shimmer */
    @keyframes shimmer {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    .title-shimmer {
      background: linear-gradient(90deg, #daa520, #f5d76e, #ffffff, #f5d76e, #daa520);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    /* Geometric decorations */
    .geo-diamond {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, rgba(218, 165, 32, 0.2), rgba(192, 57, 43, 0.2));
      transform: rotate(45deg);
      border: 1px solid rgba(218, 165, 32, 0.3);
    }

    /* Tulip SVG decoration */
    .tulip-deco {
      opacity: 0.12;
    }

    /* Progress bar */
    .progress-fill {
      transition: width 0.5s ease;
      background: linear-gradient(90deg, #c0392b, #daa520, #2ecc71);
    }

    /* Scroll hint */
    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(8px);
      }
    }

    .bounce {
      animation: bounce 1.5s ease-in-out infinite;
    }

    /* Completion overlay */
    @keyframes celebrateIn {
      0% {
        transform: scale(0.5) rotate(-10deg);
        opacity: 0;
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .celebrate-in {
      animation: celebrateIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Grid entrance */
    @keyframes gridIn {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .grid-in {
      animation: gridIn 0.5s ease-out forwards;
    }

    /* Decorative patterns */
    .pattern-star {
      position: absolute;
      opacity: 0.1;
    }

    .pattern-circle {
      position: absolute;
      border: 2px solid rgba(218, 165, 32, 0.15);
      border-radius: 50%;
    }

    /* Ottoman art patterns */
    .art-motif {
      position: absolute;
      opacity: 0.08;
      font-size: 80px;
    }

    /* Çintemani Pattern */
    .cintemani {
      width: 100px;
      height: 60px;
      position: absolute;
      opacity: 0.1;
      pointer-events: none;
    }

    /* Rumi Pattern */
    .rumi-corner {
      position: absolute;
      width: 150px;
      height: 150px;
      opacity: 0.12;
      pointer-events: none;
    }
  </style>
  <style>
    body {
      box-sizing: border-box;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="miniature-bg h-full">
  <!-- Texture Overlay -->
  <div class="parchment-texture"></div>

  <!-- Turkish Cultural Decorations -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden" aria-hidden="true" style="z-index:0;">

    <!-- Existing floating diamonds -->

    <!-- Tulip silhouettes -->
    <svg class="tulip-deco absolute top-[5%] left-[20%]" width="40" height="60" viewbox="0 0 60 80">
      <path d="M30 80 L30 35 Q15 25 10 10 Q20 20 30 15 Q40 20 50 10 Q45 25 30 35" fill="#daa520" />
    </svg>
    <svg class="tulip-deco absolute bottom-[5%] right-[20%]" width="40" height="60" viewbox="0 0 60 80">
      <path d="M30 80 L30 35 Q15 25 10 10 Q20 20 30 15 Q40 20 50 10 Q45 25 30 35" fill="#c0392b" />
    </svg>
  </div>
  <!-- Main Container -->
  <div id="app" class="relative w-full min-h-full flex flex-col items-center px-4 py-6"
    style="font-family:'Baloo 2',cursive;">
    <!-- PHASE 1: Video Introduction -->
    <div id="phase-video" class="w-full max-w-4xl flex flex-col items-center gap-6 mt-8">
      <!-- Title -->
      <h1 id="gameTitle" class="text-4xl md:text-5xl font-extrabold title-shimmer text-center tracking-wide"
        style="font-family:'Amiri',serif;">🎨 Minyatür 🎨</h1>
      <p class="text-amber-200/70 text-center text-sm" style="font-family:'Amiri',serif;">Osmanlı minyatür sanatını
        keşfet!</p><!-- Video Area -->
      <div
        class="video-screen rounded-2xl overflow-hidden w-full aspect-video flex items-center justify-center relative">
        <video id="introVideo" class="w-full h-full object-cover" preload="auto">
          <source src="1.mp4" type="video/mp4">
        </video><!-- Play overlay -->
        <div id="videoOverlay"
          class="absolute inset-0 flex flex-col items-center justify-center bg-black/50 cursor-pointer"
          onclick="playVideo()">
          <div
            class="w-20 h-20 rounded-full bg-amber-500/80 flex items-center justify-center mb-3 hover:bg-amber-400 transition-colors">
            <i data-lucide="play" style="width:40px;height:40px;color:#1a0a2e;margin-left:4px;"></i>
          </div><span class="text-amber-200 text-lg font-bold">Videoyu İzle</span>
        </div>
      </div><!-- Tamam Button --> <button id="btnTamam" onclick="startPuzzle()"
        class="btn-glow px-10 py-3 rounded-full text-xl font-bold text-[#1a0a2e] bg-gradient-to-r from-amber-400 via-yellow-300 to-amber-400 hover:from-amber-300 hover:to-amber-300 transition-all transform hover:scale-105 hidden">
        ✨ Tamam, Başlayalım! ✨ </button>
    </div><!-- PHASE 2: Puzzle Game -->
    <div id="phase-puzzle" class="w-full max-w-7xl flex flex-col items-center gap-5 mt-4 hidden">
      <h2 id="puzzleTitle" class="text-3xl md:text-4xl font-extrabold title-shimmer text-center"
        style="font-family:'Amiri',serif;">🧩 Minyatürü Tamamla! 🧩</h2><!-- Progress -->
      <div class="w-full max-w-lg">
        <div class="flex justify-between text-amber-300 text-sm mb-1">
          <span>İlerleme</span> <span id="progressText">0 / 8</span>
        </div>
        <div class="w-full h-3 bg-[#0d1b3e] rounded-full overflow-hidden border border-amber-900/50">
          <div id="progressBar" class="progress-fill h-full rounded-full" style="width:0%"></div>
        </div>
      </div><!-- Puzzle Grid - Larger -->
      <div class="ornate-border rounded-2xl p-3 bg-[#0d1b3e]/80 grid-in">
        <div id="puzzleGrid" class="grid gap-1 relative" style="width:min(90vw,550px);height:min(90vw,550px);">
          <!-- Slots generated by JS -->
        </div>
      </div><!-- Piece Trays - Repositioned to Bottom Corners -->
      <div class="fixed bottom-4 left-4 z-20 md:static md:w-full md:flex md:justify-center md:gap-4 md:mt-2">
        <!-- Left pieces tray - Fixed on mobile, Flex on desktop -->
        <div id="pieceTrayLeft"
          class="piece-tray rounded-xl p-2 flex flex-col gap-2 max-h-[60vh] overflow-y-auto w-[90px] md:w-auto md:flex-row md:max-h-none md:overflow-x-auto md:p-3">
          <!-- Left pieces generated by JS -->
        </div>
      </div>

      <div class="fixed bottom-4 right-4 z-20 md:static md:w-full md:flex md:justify-center md:gap-4 md:mt-2">
        <!-- Right pieces tray - Fixed on mobile, Flex on desktop -->
        <div id="pieceTrayRight"
          class="piece-tray rounded-xl p-2 flex flex-col gap-2 max-h-[60vh] overflow-y-auto w-[90px] md:w-auto md:flex-row md:max-h-none md:overflow-x-auto md:p-3">
          <!-- Right pieces generated by JS -->
        </div>
      </div>

      <p class="text-amber-300/60 text-center text-sm mt-2 mb-24 md:mb-0">👆 Parçaları sürükleyip bırak 👆</p>
    </div><!-- PHASE 3: Celebration -->
    <div id="phase-celebrate" class="w-full max-w-2xl flex flex-col items-center gap-6 mt-8 hidden">
      <div id="celebrateContent" class="flex flex-col items-center gap-4">
        <div class="text-6xl">
          🎉
        </div>
        <h2 id="congratsMsg" class="text-3xl md:text-4xl font-extrabold title-shimmer text-center"
          style="font-family:'Amiri',serif;">Tebrikler! Tamamladın!</h2>
        <p class="text-amber-200/70 text-center" style="font-family:'Amiri',serif;">Minyatür sanatı keşfini başarıyla
          tamamladın! ✨</p><!-- Completed image -->
        <div class="ornate-border rounded-2xl overflow-hidden">
          <div id="completedImage"
            style="width:min(80vw,400px);height:min(80vw,400px);background-size:cover;background-position:center;border-radius:12px;">
          </div>
        </div><button onclick="resetGame()"
          class="btn-glow px-8 py-3 rounded-full text-lg font-bold text-[#1a0a2e] bg-gradient-to-r from-emerald-400 via-green-300 to-emerald-400 hover:from-emerald-300 transition-all transform hover:scale-105 mt-2">
          🔄 Tekrar Oyna </button>
      </div><!-- Fireworks container -->
      <div id="fireworksContainer" class="fixed inset-0 pointer-events-none" style="z-index:999;"></div>
    </div>
  </div>
  <script>
    // ---- CONFIG ----
    const defaultConfig = {
      game_title: '🎨 Minyatür 🎨',
      congrats_text: 'Tebrikler! Tamamladın!',
      background_color: '#1a0a2e',
      surface_color: '#0d1b3e',
      text_color: '#fde68a',
      primary_action_color: '#daa520',
      secondary_action_color: '#c0392b',
      font_family: 'Baloo 2',
      font_size: 16
    };

    // ---- PUZZLE CONFIG ----
    const GRID_SIZE = 3; // 3x3 grid
    const TOTAL_PIECES = GRID_SIZE * GRID_SIZE; // 9 pieces, all fillable
    const IMAGE_SRC = '1.jpg';

    let placedPieces = 0;
    let piecesData = [];
    let currentData = [];

    // ---- VIDEO ----
    function playVideo() {
      const v = document.getElementById('introVideo');
      const o = document.getElementById('videoOverlay');
      o.style.display = 'none';
      v.play().catch(() => {
        // If video fails, show button anyway
        document.getElementById('btnTamam').classList.remove('hidden');
      });
      v.addEventListener('ended', () => {
        document.getElementById('btnTamam').classList.remove('hidden');
      });
      // Also show button after 3s in case video is short or missing
      setTimeout(() => {
        document.getElementById('btnTamam').classList.remove('hidden');
      }, 3000);
    }

    // ---- PUZZLE INIT ----
    function startPuzzle() {
      document.getElementById('phase-video').classList.add('hidden');
      document.getElementById('phase-puzzle').classList.remove('hidden');
      buildPuzzle();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function buildPuzzle() {
      const grid = document.getElementById('puzzleGrid');
      grid.innerHTML = '';
      placedPieces = 0;
      piecesData = [];
      updateProgress();

      grid.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
      grid.style.gridTemplateRows = `repeat(${GRID_SIZE}, 1fr)`;

      // Create all 9 slots (no center hole)
      for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
        const slot = document.createElement('div');
        slot.className = 'puzzle-slot rounded-lg flex items-center justify-center';
        slot.dataset.index = i;
        slot.style.border = '2px dashed rgba(218,165,32,0.3)';
        slot.style.background = 'rgba(218,165,32,0.05)';
        slot.style.position = 'relative';
        slot.style.overflow = 'hidden';

        // Drop handlers
        slot.addEventListener('dragover', onDragOver);
        slot.addEventListener('dragleave', onDragLeave);
        slot.addEventListener('drop', onDrop);
        // Touch
        slot.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        grid.appendChild(slot);
      }

      // Create all 9 pieces and distribute to left/right trays
      const indices = [];
      for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
        indices.push(i);
      }
      // Shuffle
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }

      const trayLeft = document.getElementById('pieceTrayLeft');
      const trayRight = document.getElementById('pieceTrayRight');
      trayLeft.innerHTML = '';
      trayRight.innerHTML = '';

      let isLeftTray = true;

      indices.forEach((idx, order) => {
        const row = Math.floor(idx / GRID_SIZE);
        const col = idx % GRID_SIZE;
        const piece = document.createElement('div');
        piece.className = 'puzzle-piece rounded-lg overflow-hidden';
        piece.draggable = true;
        piece.dataset.correctIndex = idx;
        piece.style.width = '90px';
        piece.style.height = '90px';
        piece.style.backgroundImage = `url(${IMAGE_SRC})`;
        piece.style.backgroundSize = `${GRID_SIZE * 100}% ${GRID_SIZE * 100}%`;
        piece.style.backgroundPosition = `${col * 100 / (GRID_SIZE - 1)}% ${row * 100 / (GRID_SIZE - 1)}%`;
        piece.style.border = '2px solid rgba(218,165,32,0.5)';
        piece.style.animationDelay = `${order * 0.08}s`;

        // Drag
        piece.addEventListener('dragstart', onDragStart);
        piece.addEventListener('dragend', onDragEnd);
        // Touch
        piece.addEventListener('touchstart', onTouchStart, { passive: false });
        piece.addEventListener('touchmove', onTouchMove, { passive: false });
        piece.addEventListener('touchend', onTouchEnd);

        // Alternate between left and right trays
        if (isLeftTray) {
          trayLeft.appendChild(piece);
        } else {
          trayRight.appendChild(piece);
        }
        isLeftTray = !isLeftTray;
      });
    }

    // ---- DRAG & DROP ----
    let draggedPiece = null;

    function onDragStart(e) {
      draggedPiece = e.target;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.puzzle-slot').forEach(s => s.classList.remove('highlight'));
    }
    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('highlight');
    }
    function onDragLeave(e) {
      e.currentTarget.classList.remove('highlight');
    }
    function onDrop(e) {
      e.preventDefault();
      const slot = e.currentTarget;
      slot.classList.remove('highlight');
      if (!draggedPiece) return;
      placePiece(draggedPiece, slot);
    }

    // ---- TOUCH SUPPORT ----
    let touchPiece = null;
    let touchClone = null;
    let touchOffsetX = 0, touchOffsetY = 0;

    function onTouchStart(e) {
      e.preventDefault();
      touchPiece = e.target.closest('.puzzle-piece');
      if (!touchPiece) return;
      const touch = e.touches[0];
      const rect = touchPiece.getBoundingClientRect();
      touchOffsetX = touch.clientX - rect.left;
      touchOffsetY = touch.clientY - rect.top;

      touchClone = touchPiece.cloneNode(true);
      touchClone.style.position = 'fixed';
      touchClone.style.zIndex = '9999';
      touchClone.style.pointerEvents = 'none';
      touchClone.style.opacity = '0.85';
      touchClone.style.left = (touch.clientX - touchOffsetX) + 'px';
      touchClone.style.top = (touch.clientY - touchOffsetY) + 'px';
      document.body.appendChild(touchClone);
      touchPiece.style.opacity = '0.3';
    }
    function onTouchMove(e) {
      e.preventDefault();
      if (!touchClone) return;
      const touch = e.touches[0];
      touchClone.style.left = (touch.clientX - touchOffsetX) + 'px';
      touchClone.style.top = (touch.clientY - touchOffsetY) + 'px';

      // Highlight slot under finger
      document.querySelectorAll('.puzzle-slot').forEach(s => s.classList.remove('highlight'));
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el) {
        const slot = el.closest('.puzzle-slot');
        if (slot) slot.classList.add('highlight');
      }
    }
    function onTouchEnd(e) {
      if (touchClone) {
        touchClone.remove();
        touchClone = null;
      }
      if (!touchPiece) return;
      touchPiece.style.opacity = '1';

      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el) {
        const slot = el.closest('.puzzle-slot');
        if (slot) placePiece(touchPiece, slot);
      }
      document.querySelectorAll('.puzzle-slot').forEach(s => s.classList.remove('highlight'));
      touchPiece = null;
    }

    function placePiece(piece, slot) {
      const correctIdx = parseInt(piece.dataset.correctIndex);
      const slotIdx = parseInt(slot.dataset.index);

      // Only allow correct placement
      if (correctIdx !== slotIdx) {
        // Wrong slot - bounce back
        piece.style.transform = 'scale(0.9)';
        setTimeout(() => piece.style.transform = '', 200);
        return;
      }

      // Already filled?
      if (slot.classList.contains('filled')) {
        piece.style.transform = 'scale(0.9)';
        setTimeout(() => piece.style.transform = '', 200);
        return;
      }

      // Correct! Place it
      const row = Math.floor(correctIdx / GRID_SIZE);
      const col = correctIdx % GRID_SIZE;
      slot.style.backgroundImage = `url(${IMAGE_SRC})`;
      slot.style.backgroundSize = `${GRID_SIZE * 100}% ${GRID_SIZE * 100}%`;
      slot.style.backgroundPosition = `${col * 100 / (GRID_SIZE - 1)}% ${row * 100 / (GRID_SIZE - 1)}%`;
      slot.style.border = '2px solid rgba(46,204,113,0.5)';
      slot.classList.add('filled');
      slot.innerHTML = '';

      piece.remove();
      placedPieces++;
      updateProgress();

      if (placedPieces === TOTAL_PIECES) {
        setTimeout(showCelebration, 600);
      }
    }

    function updateProgress() {
      document.getElementById('progressText').textContent = `${placedPieces} / ${TOTAL_PIECES}`;
      document.getElementById('progressBar').style.width = `${(placedPieces / TOTAL_PIECES) * 100}%`;
    }

    // ---- CELEBRATION ----
    function showCelebration() {
      document.getElementById('phase-puzzle').classList.add('hidden');
      document.getElementById('phase-celebrate').classList.remove('hidden');
      document.getElementById('completedImage').style.backgroundImage = `url(${IMAGE_SRC})`;
      document.getElementById('celebrateContent').classList.add('celebrate-in');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      launchFireworks();
    }

    function launchFireworks() {
      const container = document.getElementById('fireworksContainer');
      container.innerHTML = '';
      const colors = ['#daa520', '#c0392b', '#2ecc71', '#e74c3c', '#f39c12', '#1e50a0', '#9b59b6', '#ff6b6b', '#feca57'];

      // Launch multiple bursts
      for (let burst = 0; burst < 8; burst++) {
        setTimeout(() => {
          const cx = Math.random() * window.innerWidth;
          const cy = Math.random() * window.innerHeight * 0.6 + 50;
          const numParticles = 30;
          for (let i = 0; i < numParticles; i++) {
            const p = document.createElement('div');
            p.className = 'firework-particle';
            const angle = (i / numParticles) * Math.PI * 2;
            const dist = 60 + Math.random() * 100;
            p.style.left = cx + 'px';
            p.style.top = cy + 'px';
            p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDelay = Math.random() * 0.2 + 's';
            p.style.width = (4 + Math.random() * 4) + 'px';
            p.style.height = p.style.width;
            container.appendChild(p);
          }
        }, burst * 400);
      }

      // Confetti
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + '%';
          c.style.top = '-10px';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          c.style.width = (6 + Math.random() * 8) + 'px';
          c.style.height = (6 + Math.random() * 8) + 'px';
          c.style.animationDuration = (2 + Math.random() * 2) + 's';
          c.style.animationDelay = Math.random() * 0.5 + 's';
          container.appendChild(c);
        }, i * 60);
      }

      // Cleanup
      setTimeout(() => container.innerHTML = '', 6000);
    }

    function resetGame() {
      document.getElementById('phase-celebrate').classList.add('hidden');
      document.getElementById('phase-video').classList.remove('hidden');
      document.getElementById('btnTamam').classList.add('hidden');
      document.getElementById('videoOverlay').style.display = 'flex';
      document.getElementById('fireworksContainer').innerHTML = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ---- ELEMENT SDK ----
    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      document.getElementById('gameTitle').textContent = c.game_title;
      document.getElementById('congratsMsg').textContent = c.congrats_text;

      // Colors
      document.body.style.background = `linear-gradient(135deg, ${c.background_color} 0%, ${c.surface_color} 50%, ${c.background_color} 100%)`;

      // Font
      const ff = c.font_family + ", 'Baloo 2', cursive";
      document.getElementById('app').style.fontFamily = ff;

      // Font size
      const bs = c.font_size || 16;
      document.getElementById('gameTitle').style.fontSize = `${bs * 2}px`;
      document.getElementById('puzzleTitle') && (document.getElementById('puzzleTitle').style.fontSize = `${bs * 1.75}px`);
      document.getElementById('congratsMsg').style.fontSize = `${bs * 2}px`;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
          { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['game_title', config.game_title || defaultConfig.game_title],
        ['congrats_text', config.congrats_text || defaultConfig.congrats_text]
      ])
    });

    lucide.createIcons();
  </script>
