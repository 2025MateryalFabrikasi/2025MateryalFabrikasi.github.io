
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neşeli Ramazan Bilmeceleri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ana-renk: #ff7f50; 
            --yardimci-renk: #48dbfb; 
            --zemin: #f7f1e3;
            --yazi: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; }

        body {
            background-color: var(--zemin);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 0px #d1ccc0;
            text-align: center;
            border: 6px solid var(--ana-renk);
            position: relative;
        }

        /* --- GİRİŞ EKRANI --- */
        #intro-screen img {
            width: 250px;
            height: auto;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { color: var(--ana-renk); font-size: 3rem; margin-bottom: 15px; text-shadow: 2px 2px #ffeaa7; }
        .guide { font-size: 1.4rem; color: #57606f; margin-bottom: 25px; line-height: 1.6; }

        .btn-start {
            background: var(--ana-renk);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #d35400;
            transition: 0.1s;
        }

        /* --- TEBRİK MESAJI (Overlay) --- */
        #celebration {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 30px;
            border: 5px solid var(--yardimci-renk);
            z-index: 100;
            width: 80%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* --- OYUN ALANI --- */
        #game-area { display: none; }

        .card-area {
            perspective: 1000px;
            height: 500px;
            margin: 20px auto;
            width: 100%;
            max-width: 550px;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 35px;
            background: #fff;
            border: 5px dashed var(--yardimci-renk);
        }

        .card-front h2 { font-size: 2.2rem; color: #2d3436; padding: 0 20px; }

        .card-back {
            transform: rotateY(180deg);
            background: #fdfaf0;
            border-color: var(--ana-renk);
        }

        .card-back img {
            width: 90%;
            height: 350px;
            object-fit: contain;
            border-radius: 20px;
            margin-bottom: 5px;
        }

        .card-back p { font-size: 2.8rem; font-weight: bold; color: var(--ana-renk); }

        .btn-next {
            background: var(--yardimci-renk);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 0 #2980b9;
        }

        #result-screen { display: none; }
    </style>
</head>
<body>

    <audio id="bg-music" preload="auto"><source src="1.mp3" type="audio/mpeg"></audio>

    <div class="game-container">
        <div id="celebration">
            <h2 style="color: var(--ana-renk); font-size: 2.5rem;">Harikasın!</h2>
            <p style="font-size: 1.8rem; color: var(--yardimci-renk);">Bilmece Kurdu 🦊</p>
        </div>

        <div id="intro-screen">
            <h1>Bilmeceli Ramazan!</h1>
            <img src="11.jpg" alt="Ramazan Eğlencesi">
            <p class="guide">Merhaba çocuklar! <br> Davulun sesiyle bilmeceleri çözmeye hazır mısın? <br> Kartları tıkla, sürprizi gör!</p>
            <button class="btn-start" id="start-btn" onclick="baslat()">OYUNA BAŞLA!</button>
        </div>

        <div id="game-area">
            <h3 style="color: var(--yardimci-renk); font-size: 1.5rem;">Hadi Tahmin Et!</h3>
            <div class="card-area" onclick="cevir()">
                <div class="card" id="kart-objesi">
                    <div class="card-face card-front">
                        <h2 id="bilmece-metni"></h2>
                        <span style="margin-top:30px; color:#aaa; font-size:1.1rem;">(Öğrenmek için tıkla)</span>
                    </div>
                    <div class="card-face card-back">
                        <img id="cevap-resmi" src="" alt="Cevap">
                        <p id="cevap-metni"></p>
                    </div>
                </div>
            </div>
            <button class="btn-next" id="next-btn" onclick="tebrikleGec()">Sıradaki Bilmece <i class="fas fa-arrow-right"></i></button>
            <p style="margin-top:20px; color:#636e72; font-size: 1.2rem;">Kart: <span id="sayac" style="font-weight:bold; color:var(--ana-renk);">1</span> / 10</p>
        </div>

        <div id="result-screen">
            <h1 style="font-size: 5rem;">🎉</h1>
            <h2 style="color: var(--ana-renk); font-size: 3rem;">Tebrikler Kurto!</h2>
            <p style="font-size: 1.8rem;">Bütün bilmeceleri alt ettin!</p>
            <button class="btn-start" style="margin-top:30px;" onclick="location.reload()">Tekrar Oyna</button>
        </div>
    </div>

    <script>
        const VERI = [
            { q: "Küçük, tatlı, kahverengi bir meyve,\nKonuk olur iftarda her eve.", a: "Hurma", img: "1.jpg" },
            { q: "Fırından çıkar sıcak ve susamlı,\nKokusu gelir, tadı çok kıvamlı.", a: "Pide", img: "2.jpg" },
            { q: "Ezan okunur, top patlar,\nSofrada bizi lezzetler bekler.", a: "İftar", img: "3.jpg" },
            { q: "Davulcu çalar 'güm güm' diye,\nKalkarız bereketli bu yemeğe.", a: "Sahur", img: "4.jpg" },
            { q: "Camide saf tutarız yan yana,\nHuzur verir kılan her cana.", a: "Teravih Namazı", img: "5.jpg" },
            { q: "Bayram gelmeden veririz,\nPaylaştıkça hep seviniriz.", a: "Fitre", img: "6.jpg" },
            { q: "Minarelerin arasında parlar,\nGökyüzünde güzel sözler yazar.", a: "Mahya", img: "7.jpg" },
            { q: "Niyet ettim sabahleyin,\nSabırla beklerim akşama değin.", a: "Oruç", img: "8.jpg" },
            { q: "Gelince neşeyle dolar her yanı,\nOn bir ayın en sevilen sultanı.", a: "Ramazan Ayı", img: "9.jpg" },
            { q: "Sütlü, beyaz ve pek narindir,\nRamazan’ın tadı, en sevilenidir.", a: "Güllaç", img: "10.jpg" }
        ];

        let sira = 0;
        const music = document.getElementById('bg-music');
        const celebDiv = document.getElementById('celebration');

        function baslat() {
            const btn = document.getElementById('start-btn');
            btn.innerText = "Davul Çalıyor...";
            btn.disabled = true;

            // Ses dosyasını zorla başlatıyoruz (User interaction sonrası)
            music.currentTime = 50;
            const playPromise = music.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // Müzik çalmaya başladı, 26 saniye bekle (1.16'da duracak)
                    setTimeout(() => {
                        music.pause();
                        document.getElementById('intro-screen').style.display = 'none';
                        document.getElementById('game-area').style.display = 'block';
                        oyunuGuncelle();
                    }, 26000);
                }).catch(error => {
                    // Ses dosyası yoksa veya hata verirse direkt oyuna geç
                    console.log("Ses çalınamadı, oyuna geçiliyor.");
                    document.getElementById('intro-screen').style.display = 'none';
                    document.getElementById('game-area').style.display = 'block';
                    oyunuGuncelle();
                });
            }
        }

        function tebrikleGec() {
            // Sadece kart çevrilmişse tebrik et
            if (document.getElementById('kart-objesi').classList.contains('is-flipped')) {
                celebDiv.style.display = 'block';
                setTimeout(() => {
                    celebDiv.style.display = 'none';
                    sira++;
                    oyunuGuncelle();
                }, 1500);
            } else {
                alert("Önce bilmecenin cevabını görmelisin! Kartın üzerine tıkla.");
            }
        }

        function oyunuGuncelle() {
            if (sira < VERI.length) {
                const b = VERI[sira];
                document.getElementById('bilmece-metni').innerText = b.q;
                document.getElementById('cevap-resmi').src = b.img;
                document.getElementById('cevap-metni').innerText = b.a;
                document.getElementById('sayac').innerText = sira + 1;
                document.getElementById('kart-objesi').classList.remove('is-flipped');
            } else {
                document.getElementById('game-area').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
            }
        }

        function cevir() {
            document.getElementById('kart-objesi').classList.toggle('is-flipped');
        }
    </script>
</body>
</html>
