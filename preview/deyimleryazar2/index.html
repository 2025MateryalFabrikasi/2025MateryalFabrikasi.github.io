
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salyangozun Renkli Deyim Dünyası</title>
    <style>
        :root {
            --gold-color: #FFD700;
            --font-main: 'Comic Sans MS', 'Comic Sans', cursive;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            overflow: hidden;
            background: #f0f0f0;
            user-select: none;
        }

        /* --- Canlı Yönerge Ekranı --- */
        #intro-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 480px;
            background: #FFF9C4;
            z-index: 100;
            padding: 30px;
            border-radius: 40px;
            border: 8px solid #FF5722;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .start-btn {
            padding: 15px 35px;
            font-size: 20px;
            font-family: var(--font-main);
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #2E7D32;
            transition: 0.2s;
        }

        .start-btn:hover { transform: scale(1.05); }

        /* --- Oyun Alanı --- */
        #game-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            background: url('7.jpg') no-repeat center center;
            background-size: cover;
        }

        /* Yeni Estetik Çerçeve (Gökkuşağı Efektli) */
        #image-frame {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px; /* Büyütüldü */
            height: 320px; /* Büyütüldü */
            padding: 10px;
            background: linear-gradient(45deg, #f06, #9f6, #06f, #f90);
            background-size: 400% 400%;
            animation: gradient-border 5s ease infinite;
            border-radius: 30px;
            box-shadow: 0 0 35px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradient-border {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .inner-white {
            background: white;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #target-image {
            width: 95%;
            height: 95%;
            object-fit: contain;
        }

        /* Kelime Grupları */
        .phrase {
            position: absolute;
            color: #000000;
            font-size: 24px; /* Biraz büyütüldü */
            font-weight: 900;
            cursor: pointer;
            white-space: nowrap;
            top: -100px;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.9);
        }

        /* Salyangoz Karakteri (8.jpg) */
        #catcher {
            position: absolute;
            bottom: 20px;
            width: 180px; /* Büyütüldü */
            height: 180px; /* Büyütüldü */
            background: url('8.jpg') no-repeat center/contain;
            pointer-events: none;
            z-index: 5;
            mix-blend-mode: multiply; 
        }

        .stat-box {
            position: absolute;
            top: 20px;
            right: 40px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 22px;
            font-weight: bold;
            border: 4px solid #FF4081;
        }

        /* --- Renkli Baloncuk Efekti --- */
        .bubble {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            border: 2px solid white;
            animation: bubble-rise 3s linear forwards; /* Daha uzun süre (3s) */
        }

        @keyframes bubble-rise {
            0% {
                transform: translateY(0) scale(0.5) translateX(0);
                opacity: 1;
            }
            50% {
                transform: translateY(-40vh) scale(1.2) translateX(20px);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) scale(1.5) translateX(-20px);
                opacity: 0;
            }
        }

        #feedback {
            position: absolute;
            top: 15%;
            left: 55%;
            transform: translateX(-50%);
            font-size: 45px;
            font-weight: bold;
            display: none;
            z-index: 20;
            text-shadow: 3px 3px 0 white;
        }

        #end-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #FFF9C4;
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1>🐌 Süper Salyangoz İş Başında!</h1>
        <p style="font-size: 16px; color: #000;">Resme bak, doğru deyimi bul ve sevimli salyangozunla gökyüzündeki yazıları yakala! Renkli baloncukları çıkarmak için doğruyu bilmelisin!</p>
        <button class="start-btn" onclick="startGame()">Hadi Başlayalım!</button>
    </div>

    <div id="game-container">
        <div class="stat-box">💰 Altın: <span id="gold-count">0</span></div>

        <div id="image-frame">
            <div class="inner-white">
                <img id="target-image" src="1.jpg" alt="Deyim">
            </div>
        </div>
        
        <div id="feedback"></div>
        <div id="catcher"></div>
    </div>

    <div id="end-screen">
        <h1 style="color: #FF5722; font-size: 60px;">HARİKASIN! 🎉</h1>
        <p id="final-result" style="font-size: 30px; font-weight: bold;"></p>
        <button class="start-btn" onclick="location.reload()">BİR DAHA OYNA</button>
    </div>

    <script>
        const levels = [
            { img: '1.jpg', correct: 'Ağzı kulaklarına varmak', options: ['Ağzı kulaklarına varmak', 'Ağzı burnuna değmek', 'Ağzında dişini göstermek'] },
            { img: '2.jpg', correct: 'Kulağına küpe olmak', options: ['Küpe takmak', 'Kulağına küpe olmak', 'Kulağına küpe takmak'] },
            { img: '3.jpg', correct: 'Burnunun dikine gitmek', options: ['Burnu uzamak', 'Burnunun ucunu görmek', 'Burnunun dikine gitmek'] },
            { img: '4.jpg', correct: 'Sinek avlamak', options: ['Kuş avlamak', 'Sinek yakalamak', 'Sinek avlamak'] },
            { img: '5.jpg', correct: 'Ateş püskürmek', options: ['Ateş püskürmek', 'Alev çıkartmak', 'Ejderha olmak'] },
            { img: '6.jpg', correct: 'Keçileri kaçırmak', options: ['Koyunları kaçırmak', 'Keçileri kaçırmak', 'Kuzuları kaçırmak'] }
        ];

        let currentLevel = 0;
        let gold = 0;
        let gameActive = false;
        let activePhrases = [];
        const speed = 0.7; // Daha yavaş ve akıcı

        const catcher = document.getElementById('catcher');
        const gameContainer = document.getElementById('game-container');
        const feedback = document.getElementById('feedback');

        window.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            let x = e.clientX - (catcher.offsetWidth / 2);
            
            // Salyangozun hareket alanı: Ekranın ortasından sağa doğru (Resmi kapatmasın)
            const minX = 400; 
            const maxX = window.innerWidth - 200;
            if (x < minX) x = minX;
            if (x > maxX) x = maxX;

            const prevX = parseFloat(catcher.style.left || 0);
            if (x > prevX) catcher.style.transform = "scaleX(-1)";
            else catcher.style.transform = "scaleX(1)";

            catcher.style.left = x + 'px';
        });

        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            gameContainer.style.display = 'block';
            gameActive = true;
            loadLevel();
            requestAnimationFrame(gameLoop);
        }

        function loadLevel() {
            const data = levels[currentLevel];
            document.getElementById('target-image').src = data.img;
            spawnPhrases(data.options);
        }

        function spawnPhrases(options) {
            activePhrases.forEach(p => p.element.remove());
            activePhrases = [];
            const shuffled = [...options].sort(() => Math.random() - 0.5);
            
            // Kelimeler ekranın ORTA KISMINDA (450px ile ekranın sonu - 300px arası)
            const startX = 500;
            const availableWidth = window.innerWidth - startX - 300;

            shuffled.forEach((text, index) => {
                const el = document.createElement('div');
                el.className = 'phrase';
                el.innerText = text;
                
                const xPos = startX + (index * (availableWidth / 2.5));
                el.style.left = xPos + 'px';
                
                const initialY = -150 - (index * 280); 
                el.style.top = initialY + "px";
                
                gameContainer.appendChild(el);
                activePhrases.push({ element: el, text: text, y: initialY });
            });
        }

        function gameLoop() {
            if (!gameActive) return;

            activePhrases.forEach(obj => {
                obj.y += speed;
                obj.element.style.top = obj.y + 'px';

                const rect1 = obj.element.getBoundingClientRect();
                const rect2 = catcher.getBoundingClientRect();

                // Çarpışma: Kelime salyangoza değerse
                if (rect1.bottom >= rect2.top + 50 && 
                    rect1.right >= rect2.left && 
                    rect1.left <= rect2.right && 
                    rect1.top <= rect2.bottom) {
                    checkAnswer(obj.text, rect1);
                }

                if (obj.y > window.innerHeight) obj.y = -120;
            });

            requestAnimationFrame(gameLoop);
        }

        function checkAnswer(selected, phraseRect) {
            const correct = levels[currentLevel].correct;
            gameActive = false;

            if (selected === correct) {
                createBubbles(phraseRect.left + (phraseRect.width / 2), phraseRect.bottom);
                feedback.innerText = "HARİKASIN! 💰";
                feedback.style.color = "#4CAF50";
                gold += 10;
                document.getElementById('gold-count').innerText = gold;
                currentLevel++;
            } else {
                feedback.innerText = "TEKRAR DENE 😟";
                feedback.style.color = "#F44336";
            }

            feedback.style.display = 'block';
            setTimeout(() => {
                feedback.style.display = 'none';
                if (currentLevel < levels.length) {
                    loadLevel();
                    gameActive = true;
                    requestAnimationFrame(gameLoop);
                } else {
                    endGame();
                }
            }, 1500);
        }

        function createBubbles(x, y) {
            const colors = ['#FF4081', '#00BCD4', '#FFEB3B', '#7C4DFF', '#8BC34A'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.style.left = (x - 30 + Math.random() * 60) + 'px';
                    bubble.style.top = y + 'px';
                    bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    const size = 15 + Math.random() * 25;
                    bubble.style.width = size + 'px';
                    bubble.style.height = size + 'px';
                    
                    gameContainer.appendChild(bubble);
                    setTimeout(() => bubble.remove(), 3000);
                }, i * 60);
            }
        }

        function endGame() {
            gameActive = false;
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('final-result').innerText = `Toplam ${gold} altın topladın ve tüm deyimleri öğrendin!`;
        }
    </script>
</body>
</html>
