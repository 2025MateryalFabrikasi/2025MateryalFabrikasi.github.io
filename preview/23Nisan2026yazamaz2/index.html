<!doctype html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Önemli Mesaj</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Sans MS', 'Trebuchet MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Renkli gradient arka plan */
        .container {
            width: 100vw;
            height: 100vh;
            min-width: 100%;
            min-height: 100%;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 25%, #45B7D1 50%, #FFA07A 75%, #98D8C8 100%);
            background-size: 400% 400%;
            background-attachment: fixed;
            animation: gradientShift 8s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Dekoratif şekiller */
        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .bubble1 {
            width: 100px;
            height: 100px;
            background: white;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .bubble2 {
            width: 150px;
            height: 150px;
            background: white;
            bottom: 20%;
            right: 10%;
            animation-delay: 2s;
        }

        .bubble3 {
            width: 80px;
            height: 80px;
            background: white;
            top: 50%;
            left: 5%;
            animation-delay: 4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-30px);
            }
        }

        /* İçerik kutusu */
        .content-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 10;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .content-box.hidden {
            display: none;
        }

        /* Video kutusu */
        .video-box {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 30px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            z-index: 10;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .video-box.hidden {
            display: none;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 20px;
            display: block;
        }

        /* Başlık */
        h1 {
            color: #FF6B6B;
            font-size: 2.5em;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* Metin */
        .message-text {
            color: #333;
            font-size: 1.1em;
            line-height: 1.8;
            margin: 30px 0;
            font-weight: 500;
        }

        .highlight {
            color: #FF6B6B;
            font-weight: bold;
            font-size: 1.2em;
        }

        /* Buton */
        .button {
            background: linear-gradient(135deg, #FF6B6B, #FFA07A);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            font-family: 'Comic Sans MS', cursive;
            transform: scale(1);
        }

        .button:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.6);
        }

        .button:active {
            transform: scale(0.95);
        }

        /* Video kontrolü */
        .video-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .video-btn {
            background: linear-gradient(135deg, #4ECDC4, #45B7D1);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(78, 205, 196, 0.4);
            font-family: 'Comic Sans MS', cursive;
        }

        .video-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(78, 205, 196, 0.6);
        }

        .video-btn:active {
            transform: scale(0.95);
        }

        /* Emoji dekorasyonu */
        .emoji {
            font-size: 3em;
            margin: 10px;
            display: inline-block;
            animation: wave 1.5s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes wave {

            0%,
            100% {
                transform: rotate(-5deg);
            }

            50% {
                transform: rotate(5deg);
            }
        }

        .emoji.static {
            animation: wave 1.5s ease-in-out infinite;
        }
    </style>
    <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
</head>

<body>
    <div class="container"><!-- Dekoratif bubbles -->
        <div class="bubble bubble1"></div>
        <div class="bubble bubble2"></div>
        <div class="bubble bubble3"></div><!-- İlk ekran - Talimatlar -->
        <div class="content-box" id="instructionScreen">
            <div class="emoji static">
                🇹🇷
            </div>
            <h1>Merhaba!</h1>
            <div class="message-text">
                <p style="margin-bottom: 20px;"><span class="highlight">Şimdi iki arkadaşınız sizlere önemli bir mesaj
                        iletecek.</span></p>
                <p style="margin-bottom: 20px;">Lütfen onları <span class="highlight">çok dikkatli dinleyin</span>.</p>
                <p style="margin-bottom: 20px;">Dinledikten sonra size <span class="highlight">bir soru
                        sorulacak</span>.</p>
                <p style="color: #4ECDC4; font-size: 1.15em;">Hazır olduğunuzda aşağıdaki butona basın →</p>
            </div><button class="button" onclick="startVideo()"> ✓ TAMAM, HAZIRIМ! </button>
            <div style="margin-top: 40px; font-size: 2em;"><span class="emoji">🇹🇷</span> <span
                    class="emoji">🇹🇷</span> <span class="emoji">🇹🇷</span>
            </div>
        </div><!-- Video ekranı -->
        <div class="video-box hidden" id="videoScreen">
            <video id="videoPlayer" controls>
                <source src="1.mp4" type="video/mp4"> Tarayıcınız video oynatmayı desteklemiyor.
            </video>
            <div class="video-controls"><button class="video-btn" onclick="playVideo()">▶ Oynat</button> <button
                    class="video-btn" onclick="pauseVideo()">⏸ Duraklat</button> <button class="video-btn"
                    onclick="resetVideo()">↻ Baştan Başla</button>
            </div>
        </div>
    </div>
    <script>
        function startVideo() {
            const instructionScreen = document.getElementById('instructionScreen');
            const videoScreen = document.getElementById('videoScreen');
            const videoPlayer = document.getElementById('videoPlayer');

            // Ekranları değiştir
            instructionScreen.classList.add('hidden');
            videoScreen.classList.remove('hidden');

            // Videoyu otomatik oynat
            videoPlayer.play();
        }

        function playVideo() {
            document.getElementById('videoPlayer').play();
        }

        function pauseVideo() {
            document.getElementById('videoPlayer').pause();
        }

        function resetVideo() {
            const video = document.getElementById('videoPlayer');
            video.currentTime = 0;
            video.play();
        }
    </script>

</html>
