<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramazan Manisi Oyunu</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background-image: url('image_0.jpg');
            background-size: cover;
            background-attachment: fixed; /* Arka planın sabit kalması için */
            margin: 0;
            padding: 20px;
            /* overflow: hidden; kaldırıldı, böylece sayfa kaydırılabilir */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .instruction {
            font-size: 1.5em;
            color: #3e2d1a;
            margin-bottom: 20px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
        }

        video {
            width: 90%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .game-area {
            line-height: 3;
            font-size: 1.5em;
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .drop-zone {
            display: inline-block;
            width: 120px;
            height: 40px;
            border-bottom: 3px solid #8e44ad;
            margin: 0 5px;
            vertical-align: middle;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 5px;
        }

        .word-bank {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap; /* Kelimelerin alta geçebilmesi için */
            justify-content: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            margin-bottom: 50px; /* Sayfanın altında boşluk bırakır */
        }

        .word {
            padding: 10px 20px;
            background-color: #f1c40f;
            color: #000;
            font-weight: bold;
            cursor: grab;
            border-radius: 8px;
            border: 2px solid #fff;
        }
    </style>
</head>
<body>

    <div class="instruction">Videoyu izle ve eksik kelimeleri sürükle!</div>
    
    <video controls>
        <source src="1.mp4" type="video/mp4">
    </video>

    <div class="game-area">
        Çok <span class="drop-zone" data-word="şükür"></span> ediyoruz,<br>
        Orucu ettik <span class="drop-zone" data-word="eda"></span>.<br>
        Yine <span class="drop-zone" data-word="bekleriz"></span> seni,<br>
        Ya Ramazan <span class="drop-zone" data-word="elveda"></span>.
    </div>

    <div class="word-bank">
        <div class="word" draggable="true" ondragstart="drag(event)" id="eda">eda</div>
        <div class="word" draggable="true" ondragstart="drag(event)" id="şükür">şükür</div>
        <div class="word" draggable="true" ondragstart="drag(event)" id="elveda">elveda</div>
        <div class="word" draggable="true" ondragstart="drag(event)" id="bekleriz">bekleriz</div>
    </div>

    <script>
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.ondragover = (ev) => ev.preventDefault();
            zone.ondrop = (ev) => {
                ev.preventDefault();
                const data = ev.dataTransfer.getData("text");
                if (data === zone.dataset.word) {
                    zone.textContent = document.getElementById(data).textContent;
                    document.getElementById(data).style.visibility = 'hidden';
                }
            };
        });
    </script>
</body>
</html>
