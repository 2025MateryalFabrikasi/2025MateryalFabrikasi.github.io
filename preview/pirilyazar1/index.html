
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata Sporları Macerası</title>
    <style>
        :root {
            --ana-renk: #ff9f43;
            --dogru-renk: #2ecc71;
            --yanlis-renk: #ff4757;
            --arka-plan: #f0f9ff;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background-color: var(--arka-plan);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Giriş Ekranı */
        #giris-ekrani {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            border: 5px solid var(--ana-renk);
        }

        #giris-ekrani h1 { color: #2c3e50; font-size: 2.5rem; margin-top: 0; }
        #giris-ekrani p { font-size: 1.2rem; color: #576574; line-height: 1.6; }

        .basla-btn {
            background: var(--ana-renk);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #e67e22;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .basla-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #e67e22; }

        /* Oyun Alanı */
        #oyun-alani {
            display: none;
            width: 95%;
            max-width: 1100px;
            padding: 20px;
        }

        .ust-panel {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .puan-kutusu { font-size: 1.5rem; color: var(--ana-renk); font-weight: bold; }

        /* Resim Kutuları */
        .resim-konteyner {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .hedef-kutu {
            background: #fff;
            border: 4px dashed #ced6e0;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .hedef-kutu img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .hedef-kutu.ustunde { border-color: var(--ana-renk); background: #fffaf0; scale: 1.02; }
        .hedef-kutu.tamam { border-style: solid; border-color: var(--dogru-renk); background: #f1fcf5; }

        /* Metin Kartları */
        .kart-konteyner {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            padding: 20px;
            background: #dfe6e9;
            border-radius: 25px;
        }

        .bilgi-karti {
            background: white;
            padding: 20px;
            border-radius: 15px;
            cursor: grab;
            font-size: 1rem;
            color: #2d3436;
            box-shadow: 0 4px 0 #b2bec3;
            transition: transform 0.2s;
            border-top: 6px solid var(--ana-renk);
        }

        .bilgi-karti:active { cursor: grabbing; }

        /* Mesaj Balonu */
        #mesaj {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            display: none;
            z-index: 1000;
            animation: firlat 0.5s ease-out;
        }

        @keyframes firlat {
            0% { bottom: -50px; opacity: 0; }
            100% { bottom: 30px; opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <h1>🏹 Merhaba Genç Sporcu!</h1>
        <p>Tarihimizin derinliklerinden gelen muhteşem <b>Ata Sporlarımızı</b> tanımaya hazır mısın?<br><br>
        Aşağıdaki bilgi kartlarını oku ve hangi spor olduğunu tahmin edip doğru resmin üzerine sürükle. Bakalım 100 tam puan alabilecek misin?</p>
        <button class="basla-btn" onclick="oyunuBaslat()">HAYDİ BAŞLAYALIM! 🚀</button>
    </div>

    <div id="oyun-alani">
        <div class="ust-panel">
            <div style="font-size: 1.2rem;">🌟 Ata Sporları Eşleştirme</div>
            <div class="puan-kutusu">Puan: <span id="puan">0</span></div>
        </div>

        <div class="resim-konteyner" id="hedefler">
            </div>

        <div class="kart-konteyner" id="kartlar">
            </div>
    </div>

    <div id="mesaj"></div>

    <script>
        const veri = [
            { id: "1", resim: "1.jpg", metin: "Binicilik; bilinen en eski ata sporumuzdur. Atalarımız atı evcilleştirerek ata binmeye başlamış, böylece binicilik sporu zamanla ortaya çıkmıştır." },
            { id: "2", resim: "2.jpg", metin: "At üzerinde birbirine cirit (değnek) atarak takım hâlinde oynanan bir ata sporumuzdur. Cirit oyunu ve atlı cirit oyunu olarak iki farklı şekilde oynanabilir." },
            { id: "3", resim: "3.jpg", metin: "Ata sporlarımızdan biridir. Ok ve yay kullanılarak yapılan bir spordur. Ok atan okçulara kemankeş denir." },
            { id: "4", resim: "4.jpg", metin: "Çevgan; at üzerinde ucu kıvrık bir sopa ile iki takım halinde oynanan bir spordur. Amaç sopalarla topu rakip takımın kalesine atmaktır." }
        ];

        let puan = 0;
        let tamamlanan = 0;

        function oyunuBaslat() {
            document.getElementById('giris-ekrani').style.display = 'none';
            document.getElementById('oyun-alani').style.display = 'block';
            kurulum();
        }

        function kurulum() {
            const hedefKutusu = document.getElementById('hedefler');
            const kartKutusu = document.getElementById('kartlar');

            // Resimleri karıştır
            [...veri].sort(() => Math.random() - 0.5).forEach(item => {
                hedefKutusu.innerHTML += `
                    <div class="hedef-kutu" data-id="${item.id}" ondrop="birak(event)" ondragover="uzerinde(event)" ondragleave="ayril(event)">
                        <img src="${item.resim}">
                        <div class="durum-yazisi" style="color:#a4b0be">Buraya taşı!</div>
                    </div>
                `;
            });

            // Kartları karıştır
            [...veri].sort(() => Math.random() - 0.5).forEach(item => {
                kartKutusu.innerHTML += `
                    <div class="bilgi-karti" id="kart-${item.id}" draggable="true" ondragstart="surukle(event)" data-id="${item.id}">
                        ${item.metin}
                    </div>
                `;
            });
        }

        function surukle(ev) {
            ev.dataTransfer.setData("id", ev.target.id);
        }

        function uzerinde(ev) {
            ev.preventDefault();
            if (!ev.currentTarget.classList.contains('tamam')) {
                ev.currentTarget.classList.add('ustunde');
            }
        }

        function ayril(ev) {
            ev.currentTarget.classList.remove('ustunde');
        }

        function birak(ev) {
            ev.preventDefault();
            const hedef = ev.currentTarget;
            hedef.classList.remove('ustunde');

            if (hedef.classList.contains('tamam')) return;

            const gelenKartId = ev.dataTransfer.getData("id");
            const kartElementi = document.getElementById(gelenKartId);
            const kartNo = kartElementi.getAttribute('data-id');
            const hedefNo = hedef.getAttribute('data-id');

            if (kartNo === hedefNo) {
                // DOĞRU EŞLEŞME
                hedef.classList.add('tamam');
                hedef.querySelector('.durum-yazisi').innerHTML = "<b>Harika! ✨</b>";
                hedef.querySelector('.durum-yazisi').style.color = "var(--dogru-renk)";
                kartElementi.style.visibility = 'hidden';
                
                puan += 25;
                document.getElementById('puan').innerText = puan;
                geriBildirim("Süpersin! Doğru eşleştirme yaptın. 🌟", "var(--dogru-renk)");
                sesCal(kartNo);
                
                tamamlanan++;
                if(tamamlanan === 4) {
                    setTimeout(() => {
                        alert("TEBRİKLER! 🎉\nTüm ata sporlarımızı başarıyla eşleştirdin. Tam bir şampiyonsun!");
                    }, 500);
                }
            } else {
                // YANLIŞ EŞLEŞME
                geriBildirim("Küçük bir hata oldu, tekrar dene! 💪", "var(--yanlis-renk)");
            }
        }

        function geriBildirim(mesaj, renk) {
            const m = document.getElementById('mesaj');
            m.innerText = mesaj;
            m.style.backgroundColor = renk;
            m.style.display = 'block';
            setTimeout(() => { m.style.display = 'none'; }, 2000);
        }

        function sesCal(id) {
            const ses = new Audio(`${id}.mp3`);
            ses.play().catch(() => console.log("Ses dosyası bulunamadı."));
        }
    </script>
</body>
</html>
