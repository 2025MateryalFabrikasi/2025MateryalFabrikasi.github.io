    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            margin: 2rem 0;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            min-width: 250px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .filter-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .filter-select {
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            min-width: 120px;
        }

        .clear-filters {
            padding: 0.8rem 1.5rem;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            align-self: flex-end;
        }

        .clear-filters:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .material-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: cardAppear 0.5s ease-out;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .material-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            flex: 1;
        }

        .card-title h3 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 0.3rem;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tag {
            padding: 0.4rem 0.8rem;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
        }

        .tag-konu {
            background: #4CAF50;
        }

        .tag-tema {
            background: #2196F3;
        }

        .tag-seviye {
            background: #FF9800;
        }

        .tag-yas {
            background: #9C27B0;
        }

        .card-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .card-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 100px;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .download-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #45a049, #4CAF50);
            transform: translateY(-2px);
        }

        .preview-btn {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }

        .preview-btn:hover {
            background: linear-gradient(135deg, #1976D2, #2196F3);
            transform: translateY(-2px);
        }

        .pdf-btn {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }

        .pdf-btn:hover {
            background: linear-gradient(135deg, #d32f2f, #f44336);
            transform: translateY(-2px);
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: white;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .results-count {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .materials-grid {
                grid-template-columns: 1fr;
            }

            .search-box {
                flex-direction: column;
            }

            .filter-section {
                flex-direction: column;
                align-items: stretch;
            }

            .card-actions {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
            }
        }
    </style>

        async function generateAndDownloadSCORM(name, previewUrl) {
            try {
                // Mevcut sayfanın ana URL'sini alır ve önizleme URL'sini mutlak URL'ye çeviririz
                const baseUrl = window.location.href.split('/').slice(0, -1).join('/');
                const absolutePreviewUrl = baseUrl + '/' + previewUrl;

                // İframe kodunu oluşturuyoruz
                const newContent = `<iframe width="100%" height="800" src="${absolutePreviewUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="border:none;"></iframe>`;

                const zip = new JSZip();

                const response = await fetch('files/default.zip');
                if (!response.ok) {
                    throw new Error('ZIP dosyasına ulaşılamadı.');
                }
                const zipBuffer = await response.arrayBuffer();
                const zipContent = await zip.loadAsync(zipBuffer);

                if (!zipContent.files['index.html']) {
                    throw new Error('ZIP dosyasında index.html bulunamadı.');
                }

                zip.file('index.html', newContent);

                const updatedZip = await zip.generateAsync({ type: 'blob' });

                const downloadLink = document.createElement('a');
                downloadLink.href = URL.createObjectURL(updatedZip);

                // Türkçe karakterleri de destekleyen güvenli dosya adı oluşturma
                let safeName = name.replace(/[^a-zA-Z0-9çğıöşüÇĞİÖŞÜ ]/g, '').trim().replace(/\s+/g, '_');
                downloadLink.download = safeName + '_SCORM.zip';
                downloadLink.click();
            } catch (error) {
                console.error('Hata:', error);
                alert('SCORM oluşturulurken bir hata oluştu: ' + error.message);
            }
        }

        function filterMaterials() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const konuFilter = document.getElementById('konuFilter').value;
            const temaFilter = document.getElementById('temaFilter').value;
            const seviyeFilter = document.getElementById('seviyeFilter').value;
            const yasFilter = document.getElementById('yasFilter').value;

            filteredMaterials = materials.filter(material => {
                const matchesSearch = material.name.toLowerCase().includes(searchTerm) ||
                    material.description.toLowerCase().includes(searchTerm);
                const matchesKonu = !konuFilter || material.konu === konuFilter;
                const matchesTema = !temaFilter || material.tema === temaFilter;
                const matchesSeviye = !seviyeFilter || material.seviye === seviyeFilter;
                const matchesYas = !yasFilter || material.yas === yasFilter;

                return matchesSearch && matchesKonu && matchesTema && matchesSeviye && matchesYas;
            });

            renderMaterials(filteredMaterials);
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('konuFilter').value = '';
            document.getElementById('temaFilter').value = '';
            document.getElementById('seviyeFilter').value = '';
            document.getElementById('yasFilter').value = '';
            filterMaterials();
        }

        document.getElementById('searchInput').addEventListener('input', filterMaterials);
        document.getElementById('konuFilter').addEventListener('change', filterMaterials);
        document.getElementById('temaFilter').addEventListener('change', filterMaterials);
        document.getElementById('seviyeFilter').addEventListener('change', filterMaterials);
        document.getElementById('yasFilter').addEventListener('change', filterMaterials);

        renderMaterials(materials);
